schema_version: "1.1"

service:
  name: blog-site
  display_name: Decentraland Blog UI
  description: Web application that renders blog content, category and author pages, search results, and SEO metadata. Integrates with Contentful CMS for content management and Algolia for search functionality.
  owner: dapps
  repository: https://github.com/decentraland/blog-site
  language: typescript
  layer: feature-servers
  role:
    - client
  data_domain: []
  ai-agent-context: ""

domain:
  glossary:
    - term: Blog Post
      definition: Article content published on the Decentraland blog, sourced from Contentful CMS

    - term: Category
      definition: Blog post classification grouping related articles by topic

    - term: Author
      definition: Content creator attributed to blog posts

    - term: Search Index
      definition: Algolia-powered searchable index of all blog posts

  concept_relationships:
    internal:
      - from: Blog Post
        to: Category
        relationship: belongs_to
        description: Each blog post is associated with one or more categories

      - from: Blog Post
        to: Author
        relationship: belongs_to
        description: Each blog post has one or more authors

    cross_service:
      - local_concept: Blog Post
        remote_service: contentful
        remote_concept: Entry
        mapping_type: equivalent
        description: Blog posts are stored as entries in Contentful CMS

  invariants: []

  responsibilities:
    - Render blog posts with rich text content from Contentful
    - Display blog posts filtered by category
    - Display blog posts filtered by author
    - Provide search functionality using Algolia
    - Generate SEO metadata for crawlers
    - Handle sign-in redirects for authenticated features
    - Support web3 wallet integration for user profiles
    - Display user notifications

  out_of_scope:
    - Content creation and editing (handled by Contentful CMS)
    - Search indexing (handled by Algolia)
    - User profile storage (handled by Catalyst/Peer)
    - Notification delivery (handled by notifications service)

  owned_entities: []

api:
  openapi_url: ""

db:
  schema_url: ""

dependencies:
  services:
    - name: auth
      relationship: sync
      protocol: HTTP
      purpose: Login flow and authentication redirects
      critical: false

    - name: catalyst
      relationship: sync
      protocol: HTTP
      purpose: Fetch user profile information
      critical: false

  external:
    - name: Contentful CMS
      purpose: Source of blog posts, categories, and author data
      type: api

    - name: Algolia
      purpose: Blog search index and search API
      type: api

    - name: Notifications API
      purpose: Page notifications display
      type: api

    - name: Segment
      purpose: Analytics and user behavior tracking
      type: api

    - name: Magic SDK
      purpose: OAuth-based authentication
      type: api

    - name: Thirdweb
      purpose: Web3 wallet connection and authentication
      type: api

    - name: WalletConnect
      purpose: Web3 wallet connection protocol
      type: other

events:
  publishes: []
  consumes: []

configuration:
  key_env_vars:
    - name: VITE_REACT_APP_DCL_DEFAULT_ENV
      description: Default environment (dev, stg, prd)
      affects: API endpoints and configuration selection

    - name: ALGOLIA_APP_ID
      description: Algolia application ID for blog search
      affects: Search functionality

    - name: ALGOLIA_API_KEY
      description: Algolia API key for blog search
      affects: Search functionality

    - name: ALGOLIA_BLOG_INDEX
      description: Algolia index name for blog posts
      affects: Search query targeting

    - name: AUTH_URL
      description: Authentication service URL
      affects: Login and authentication flows

    - name: BLOG_BASE_URL
      description: Base URL path for blog routes
      affects: Routing and navigation

    - name: CMS_BASE_URL
      description: Contentful CMS API endpoint
      affects: Blog content fetching

    - name: MAGIC_API_KEY
      description: Magic SDK API key for OAuth authentication
      affects: Social login functionality

    - name: MANA_TOKEN_ADDRESS_ETHEREUM
      description: MANA token contract address on Ethereum
      affects: Wallet balance display

    - name: MANA_TOKEN_ADDRESS_MATIC
      description: MANA token contract address on Polygon
      affects: Wallet balance display

    - name: NOTIFICATIONS_API_URL
      description: Notifications service API endpoint
      affects: User notification display

    - name: PEER_URL
      description: Catalyst peer URL for profile operations
      affects: User profile fetching

    - name: SEGMENT_API_KEY
      description: Segment analytics write key
      affects: Analytics tracking

    - name: THIRDWEB_CLIENT_ID
      description: Thirdweb client ID for wallet connection
      affects: Web3 wallet integration

    - name: WALLET_CONNECT_PROJECT_ID
      description: WalletConnect project ID
      affects: WalletConnect integration

adrs: []
