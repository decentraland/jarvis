schema_version: "1.1"

service:
  name: client-sdk-unity
  display_name: LiveKit Client SDK Unity
  description: Decentraland fork of the LiveKit Unity SDK, enabling real-time video, audio, and data communication features within Unity applications. Provides WebSocket-based connectivity to LiveKit servers for voice chat, position streaming, and messaging in the Explorer client. Supports Windows, macOS, and Linux.
  owner: explorer
  repository: https://github.com/decentraland/client-sdk-unity
  language: csharp
  layer: library
  role:
    - library
  data_domain: []
  ai-agent-context: ""

domain:
