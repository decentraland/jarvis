  concept_relationships:
    internal: []

    cross_service:
      - local_concept: LiveKit Client
        remote_service: unity-explorer
        remote_concept: Plugin System
        mapping_type: used_by
        description: Unity Explorer uses the LiveKit SDK for real-time communications (voice, chat, positions)

  invariants: []

  responsibilities:
    - Provide Unity SDK for connecting to LiveKit servers
    - Enable publishing and subscribing to audio, video, and data tracks
    - Support cross-platform real-time communication for desktop platforms

  out_of_scope:
    - LiveKit server infrastructure (external service)
    - iOS, Android, and WebGL support (planned but not yet available)

