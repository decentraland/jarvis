schema_version: "1.1"

service:
  name: "landing"
  display_name: "Decentraland Homepage"
  description: "The main Decentraland homepage at decentraland.org. Gatsby-based static site rendering the primary marketing landing page with CMS-driven content about the platform, creators, and community. Includes download pages for Explorer and Creator Hub, event listings, creator-focused pages, Discord invite, press/help pages, and onboarding flows. Deployed to Cloudflare Pages with edge routing via Cloudflare Worker."
  owner: "decentraland-foundation"
  repository: "https://github.com/decentraland/landing"
  language: "typescript"
  layer: "entry-points"
  role:
    - "client"
  data_domain: []
  ai-agent-context: "https://github.com/decentraland/landing/blob/main/docs/ai-agent-context.md"

domain:
  glossary:
    - term: "Landing Page"
      definition: "The main homepage of Decentraland that introduces the platform to new visitors and provides navigation to key areas like downloads, events, marketplace, and documentation."
      
    - term: "Contentful CMS"
      definition: "A headless content management system used to manage and deliver dynamic marketing content for the homepage, including hero copy, missions, social proof, FAQ, and banners. Data is sourced at build time via gatsby-source-contentful and at runtime via custom hooks."
      
    - term: "Static Site Generation"
      definition: "Gatsby's build process that generates static HTML pages at build time, providing fast page loads and SEO optimization. Pages are pre-built at deploy time."
      
    - term: "useLandingContentfulQuery"
      definition: "Custom React hook that fetches all landing page Contentful entries at runtime (hero, missions, social proof, FAQ, banners, what's hot, marquee) and returns them as a unified object consumed by the index page."
      
    - term: "Hot Scenes"
      definition: "Popular or trending scenes fetched from the Catalyst peer, displayed in the 'What's Hot' section. Cached for 1 minute using memoization."
      
    - term: "Download Flow"
      definition: "Process for detecting user's OS/architecture using user agent data, determining the correct Explorer installer URL (Windows .exe or macOS .dmg), and tracking download events via Segment analytics."
      
    - term: "Cloudflare Worker"
      definition: "Edge routing handler that runs on Cloudflare Pages to handle URL routing, redirects, and server-side logic before static assets are served."
      
    - term: "Contentful TypeScript Codegen"
      definition: "Tool that generates TypeScript type definitions from Contentful's schema to ensure type safety for CMS content. Types are in src/@types/contentful/index.d.ts."

  concept_relationships:
    internal:
      - from: "Landing Page"
        to: "Static Site Generation"
        relationship: "uses"
        description: "The landing page is built using Gatsby's static site generation to create optimized HTML pages"
        
      - from: "Landing Page"
        to: "Contentful CMS"
        relationship: "depends_on"
        description: "Dynamic content for the landing page is managed and fetched from Contentful CMS"
        
      - from: "useLandingContentfulQuery"
        to: "Contentful CMS"
        relationship: "depends_on"
        description: "Hook fetches all landing content from Contentful at runtime for the index page"
        
      - from: "Hot Scenes"
        to: "Landing Page"
        relationship: "belongs_to"
        description: "Hot scenes are displayed in the What's Hot section of the landing page"
        
      - from: "Download Flow"
        to: "Landing Page"
        relationship: "belongs_to"
        description: "Download pages are part of the landing site and detect OS/architecture for appropriate installer links"

    cross_service:
      - local_concept: "Landing Page"
        remote_service: "events"
        remote_concept: "Event"
        mapping_type: "references"
        description: "The landing page displays upcoming Decentraland events fetched from the events service API"
        
      - local_concept: "Hot Scenes"
        remote_service: "catalyst"
        remote_concept: "Scene"
        mapping_type: "references"
        description: "Hot scenes are fetched from the Catalyst peer to show popular/trending content in the What's Hot section"
        
      - local_concept: "Download Flow"
        remote_service: "auth"
        remote_concept: "Authentication"
        mapping_type: "transitions_to"
        description: "Authenticated download flow redirects users to auth service for wallet connection before download"

  invariants: []

  responsibilities:
    - Serve as the main entry point and homepage for Decentraland at decentraland.org
    - Render marketing landing page with animated hero, missions section, social proof, trending content, and CTA banners
    - Source marketing content from Contentful CMS at build time and runtime
    - Provide Explorer download pages for Windows and macOS with OS/architecture detection
    - Offer Creator Hub download page
    - Display event listings fetched from Events API
    - Render creator-focused pages (why create, create, connect, learn, FAQ)
    - Provide Discord community invite page
    - Serve press/help/markdown-rendered documentation pages
    - Handle invite flow for new user onboarding
    - Integrate rewards via hCaptcha and Rewards API for onboarding rewards
    - Provide Algolia-powered search functionality
    - Track analytics via Segment with extensive event tracking
    - Monitor errors via Sentry
    - Generate SEO metadata and Open Graph tags for social sharing
    - Deploy to Cloudflare Pages with Worker for edge routing and redirects
    - Support PWA capabilities via offline plugin
    - Fetch and display hot/popular scenes from Catalyst
    - Generate download links from GitHub releases for desktop client

  out_of_scope:
    - User-generated content, event creation, or community management
    - User authentication or profile management (handled by auth and profile sites)
    - Marketplace, NFT trading, or DAO governance (handled by marketplace and governance-ui)
    - Blog content (handled by separate blog-site app)
    - Jump-in / deep-link Explorer launch logic (handled by jump-site)
    - Wallet transaction signing (auth is read-only profile context)
    - Event creation or management (only displays events from Events API)
    - Real-time user interactions or communications

  owned_entities: []

api:
  openapi_url: ""

db:
  schema_url: ""

dependencies:
  services:
    - name: "events"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Fetch upcoming events to display on the event listing page"
      critical: false
      
    - name: "rewards"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Manage reward campaigns and wearable dispensers for onboarding rewards with hCaptcha verification"
      critical: false
      
    - name: "catalyst"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Fetch hot/popular scenes for the What's Hot section"
      critical: false

  external:
    - name: "Contentful CMS"
      purpose: "Content management system for homepage content (hero, missions, social proof, FAQ, banners, creators content). Space ID ea2ybdmmn1kv."
      type: "api"
      
    - name: "Algolia"
      purpose: "Search functionality for site content (app ID 1H67SAMO2T)"
      type: "api"
      
    - name: "Segment"
      purpose: "Analytics tracking and user behavior monitoring with extensive event tracking"
      type: "api"
      
    - name: "Sentry"
      purpose: "Error tracking and monitoring via browser SDK"
      type: "api"
      
    - name: "Rollbar"
      purpose: "Additional error reporting and logging"
      type: "api"
      
    - name: "Cloudflare Pages"
      purpose: "Deployment platform for static site hosting"
      type: "cdn"
      
    - name: "Cloudflare Workers"
      purpose: "Edge computing for dynamic routing, redirects, and server-side logic before serving static assets"
      type: "cdn"
      
    - name: "GitHub Releases API"
      purpose: "Fetch latest desktop client (Explorer) and Creator Hub release download URLs for Windows .exe and macOS .dmg installers"
      type: "api"
      
    - name: "CDN Data (cdn-data.decentraland.org)"
      purpose: "Serves download statistics and counts JSON for desktop client download tracking"
      type: "cdn"
      
    - name: "hCaptcha"
      purpose: "Bot protection for onboarding rewards via Rewards API integration"
      type: "other"
      
    - name: "Thirdweb SDK"
      purpose: "Wallet connectivity and blockchain interactions for authenticated download flows"
      type: "other"

events:
  publishes: []
  consumes: []

configuration:
  feature_flags: []

  key_env_vars:
    - name: "GATSBY_CONTENTFUL_SPACE_ID"
      description: "Contentful space ID for fetching CMS content (ea2ybdmmn1kv)"
      affects: "Content management and dynamic content retrieval at build and runtime"
      
    - name: "CONTENTFUL_ENVIRONMENT_ID"
      description: "Contentful environment ID (e.g., master, staging)"
      affects: "Which Contentful environment to fetch content from"
      
    - name: "CONTENTFUL_ACCESS_TOKEN"
      description: "Access token for Contentful API authentication"
      affects: "Authorization for fetching CMS content"
      
    - name: "CONTENTFUL_MANAGEMENT_TOKEN"
      description: "Management token for Contentful API (used for TypeScript type generation)"
      affects: "TypeScript type generation from Contentful schema via contentful-typescript-codegen"
      
    - name: "GATSBY_ALGOLIA_APP_KEY"
      description: "Algolia application ID (1H67SAMO2T)"
      affects: "Search functionality initialization"
      
    - name: "GATSBY_ALGOLIA_READY_KEY"
      description: "Algolia search-only API key"
      affects: "Site search capabilities and query execution"
      
    - name: "GATSBY_SEGMENT_KEY"
      description: "Segment analytics write key for event tracking"
      affects: "Analytics tracking and user behavior monitoring"
      
    - name: "GATSBY_SENTRY_SRC"
      description: "Sentry CDN script URL for error tracking SDK"
      affects: "Error monitoring and reporting integration"
      
    - name: "GATSBY_ROLLBAR_TOKEN"
      description: "Rollbar token for error logging"
      affects: "Additional error reporting and logging"
      
    - name: "GATSBY_SSO_URL"
      description: "Decentraland Single Sign-On service URL (id.decentraland.org)"
      affects: "User authentication and login flows"
      
    - name: "GATSBY_AUTH_URL"
      description: "Auth service endpoint for wallet connection"
      affects: "Authentication redirects for Play CTAs"
      
    - name: "GATSBY_REWARDS_API"
      description: "Rewards API base URL for onboarding rewards"
      affects: "Reward campaigns and wearable dispensers with hCaptcha integration"
      
    - name: "GATSBY_EVENTS_API_URL"
      description: "Events REST API base URL (events.decentraland.org/api)"
      affects: "Fetching event data for event listing page"
      
    - name: "GATSBY_DESKTOP_WINDOWS_TARGET"
      description: "Windows Explorer installer download URL from GitHub releases (Install-Decentraland.exe)"
      affects: "Windows client download link generation"
      
    - name: "GATSBY_DESKTOP_MACOS_TARGET"
      description: "macOS Explorer DMG download URL from GitHub releases (Decentraland.dmg)"
      affects: "macOS client download link generation"
      
    - name: "GATSBY_DOWNLOAD_COUNTS_URL"
      description: "CDN URL for download statistics JSON data (cdn-data.decentraland.org)"
      affects: "Display of total desktop client downloads on download pages"
      
    - name: "GATSBY_PROFILE_URL"
      description: "Catalyst peer URL for profile and avatar data (peer.decentraland.org)"
      affects: "Profile data lookups and hot scenes fetching"
      
    - name: "GATSBY_DOWNLOAD_URL"
      description: "Download page URL for internal linking"
      affects: "Navigation to download pages from CTAs"
      
    - name: "GATSBY_ONBOARDING_URL"
      description: "New-user onboarding URL with redirectTo parameter"
      affects: "Onboarding flow routing for new users"
      
    - name: "GATSBY_CREATOR_HUB_DOWNLOAD_URL"
      description: "Creator Hub download page path"
      affects: "Creator Hub download link generation"
      
    - name: "SITE_DOMAIN"
      description: "Canonical domain for sitemap and canonical tags (decentraland.org)"
      affects: "SEO configuration and canonical URL generation"

adrs: []
