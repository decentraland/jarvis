schema_version: "1.1"

service:
  name: chrome-devtool-protocol-unity
  display_name: Chrome DevTools Protocol Unity
  description: Chrome DevTools Protocol implementation for Unity, providing code generation utilities and integration between Chrome's debugging tools and the Unity engine. Uses REnumCLI for generating protocol enumeration files.
  owner: explorer
  repository: https://github.com/decentraland/chrome-devtool-protocol-unity
  language: csharp
  layer: library
  role:
    - library
  data_domain: []
  ai-agent-context: ""

domain:
  glossary: []

  concept_relationships:
    internal: []

    cross_service:
      - local_concept: DevTools Protocol
        remote_service: unity-explorer
        remote_concept: Scene Runtime
        mapping_type: used_by
        description: Unity Explorer uses the Chrome DevTools Protocol for debugging JavaScript scene runtimes

  invariants: []

  responsibilities:
    - Provide Chrome DevTools Protocol bindings for Unity/C#
    - Generate protocol enumeration files via REnumCLI
    - Enable JavaScript debugging capabilities in Unity applications

  out_of_scope:
    - Chrome browser integration
    - JavaScript execution (handled by ClearScript)

  owned_entities: []

api:
  openapi_url: ""

db:
  schema_url: ""

dependencies:
  services: []

  external:
    - name: Chrome DevTools Protocol
      purpose: Standard protocol for debugging and inspecting web content
      type: other

