schema_version: "1.1"

service:
  name: notifications-workers
  display_name: Notifications Workers
  description: Manages user notifications across the Decentraland platform. Split into Processor and Inbox workers for scalability. Handles notification production, storage, delivery via Server-Sent Events, and email notifications via SendGrid.
  owner: core-engineering
  repository: https://github.com/decentraland/notifications-workers
  language: typescript
  layer: feature-servers
  role:
    - worker
  data_domain:
    - notifications
    - subscriptions
  ai-agent-context: https://github.com/decentraland/notifications-workers/blob/main/docs/ai-agent-context.md

domain:
  glossary:
    - term: Notification
      definition: User alert generated from platform events (marketplace, social, profile updates) with metadata and delivery preferences.

    - term: Subscription
      definition: User preferences for notification channels (in-app, email) and types.

    - term: Server-Sent Events (SSE)
      definition: Real-time notification stream delivered to connected clients via HTTP.

  concept_relationships:
    internal:
      - from: Notification
        to: Subscription
        relationship: respects
        description: Notifications are delivered based on user subscription preferences

  invariants:
    - rule: Email notifications require confirmed email addresses
      enforced_at: domain_layer
      severity: hard

  responsibilities:
    - Produce notifications from external events
    - Store and validate notifications
    - Serve REST API for notification retrieval
    - Manage Server-Sent Events subscriptions
    - Handle email notifications via SendGrid
    - Manage user notification preferences

  owned_entities:
    - name: Notification
      description: User notification with metadata
      persistence: postgres
      identity_field: id

    - name: Subscription
      description: User notification preferences
      persistence: postgres
      identity_field: address

api:
  openapi_url: https://github.com/decentraland/notifications-workers/blob/main/docs/openapi.yaml

db:
  schema_url: https://github.com/decentraland/notifications-workers/blob/main/docs/database-schema.md

dependencies:
  services:
    - name: events-notifier
      relationship: async
      protocol: SNS/SQS
      purpose: Receives notification events
      critical: true

    - name: catalyst
      relationship: sync
      protocol: HTTP
      purpose: Fetches user profiles and avatars via lambdas client
      critical: false

  external:
    - name: PostgreSQL
      purpose: Notification storage, subscriptions
      type: storage

    - name: AWS SQS
      purpose: Consumes notification events
      type: messaging

    - name: SendGrid
      purpose: Email delivery
      type: api

    - name: Cloudflare Turnstile
      purpose: Challenge verification for anti-spam
      type: api

events:
  publishes: []
  consumes:
    - name: marketplace_events
      source_service: events-notifier
      description: Marketplace transactions
      channel: AWS SNS

configuration:
  key_env_vars:
    - name: HTTP_SERVER_PORT
      description: Port on which the HTTP server listens
      affects: Service availability and routing

    - name: HTTP_SERVER_HOST
      description: Host address for the HTTP server
      affects: Service network binding

    - name: ENV
      description: Environment name (affects email rendering and behavior)
      affects: Environment-specific configuration

    - name: PG_COMPONENT_PSQL_CONNECTION_STRING
      description: PostgreSQL connection string (alternative to individual components)
      affects: Database connection

    - name: PG_COMPONENT_PSQL_USER
      description: PostgreSQL user
      affects: Database authentication

    - name: PG_COMPONENT_PSQL_DATABASE
      description: PostgreSQL database name
      affects: Database connection

    - name: PG_COMPONENT_PSQL_PORT
      description: PostgreSQL port
      affects: Database connection

    - name: PG_COMPONENT_PSQL_HOST
      description: PostgreSQL host
      affects: Database connection

    - name: PG_COMPONENT_PSQL_PASSWORD
      description: PostgreSQL password
      affects: Database authentication

    - name: CDN_URL
      description: CDN URL for notification assets
      affects: Asset URLs in notifications

    - name: ACCOUNT_BASE_URL
      description: Decentraland account URL for email links
      affects: Email notification links

    - name: DECENTRALAND_URL
      description: Decentraland platform URL
      affects: Platform links in notifications

    - name: SIGNING_KEY
      description: Key for signing email unsubscribe tokens and notification links
      affects: Email security and token validation

    - name: SERVICE_BASE_URL
      description: Base URL for this notification service
      affects: Self-referencing URLs in notifications

    - name: AWS_SQS_ENDPOINT
      description: AWS SQS endpoint for queue consumption
      affects: Event consumption from SNS topics

    - name: SENDGRID_API_URL
      description: SendGrid API URL for email delivery
      affects: Email service connection

    - name: SENDGRID_API_KEY
      description: SendGrid API key for authentication
      affects: Email delivery

    - name: SENDGRID_EMAIL_FROM
      description: Sender email address for notifications
      affects: Email sender identity

    - name: SENDGRID_EMAIL_TEMPLATE_ID
      description: SendGrid template ID for notification emails
      affects: Email template selection

    - name: SENDGRID_SANDBOX_MODE
      description: Enable SendGrid sandbox mode for testing
      affects: Email delivery in testing

    - name: CATALYST_LAMBDAS_URL
      description: Catalyst lambdas URL for user profile data
      affects: Profile fetching for notification metadata

    - name: DWH_API_URL
      description: Data Warehouse API URL for analytics
      affects: Analytics integration

    - name: DWH_TOKEN
      description: Data Warehouse API authentication token
      affects: Analytics security

    - name: NOTIFICATION_SERVICE_TOKEN
      description: Token for internal service authentication
      affects: Service-to-service security

    - name: CLOUDFLARE_SECRET
      description: Cloudflare secret for challenge validation
      affects: Challenge verification security

    - name: CLOUDFLARE_CHALLENGE_URL
      description: Cloudflare Turnstile challenge URL for verification
      affects: Anti-spam protection

    - name: COMMIT_HASH
      description: Current commit hash for version tracking
      affects: Service status reporting

    - name: CURRENT_VERSION
      description: Current version for version tracking
      affects: Service status reporting
