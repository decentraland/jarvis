schema_version: "1.1"

service:
  name: auth-server
  display_name: Auth Server
  description: Facilitates secure communication between the Decentraland desktop client and browser-based authentication dApp. Enables the desktop client to execute wallet operations (transactions, signatures) using the user's browser wallet through a request-response relay pattern.
  owner: core-engineering
  repository: https://github.com/decentraland/auth-server
  language: typescript
  layer: feature-servers
  role:
    - auth
  data_domain:
    - authentication-requests
  ai-agent-context: https://github.com/decentraland/auth-server/blob/main/docs/ai-agent-context.md

domain:
  glossary:
    - term: Authentication Request
      definition: Encapsulates a wallet method call (eth_sendTransaction, personal_sign, dcl_personal_sign) that needs to be executed in the user's browser wallet. Includes unique ID, expiration timestamp, and verification code.
      examples:
        - Request to sign a message using personal_sign
        - Request to send an Ethereum transaction

    - term: Verification Code
      definition: Random number (0-99) generated for each request to provide visual confirmation that desktop client and browser dApp are processing the same request.

    - term: Request Lifecycle
      definition: State flow from creation → pending → (consumed/expired) → cleanup. Requests expire after 5 minutes by default.

  concept_relationships:
    internal:
      - from: Authentication Request
        to: Verification Code
        relationship: has_one
        description: Each authentication request includes a unique verification code for user confirmation

    cross_service:
      - local_concept: Authentication Request
        remote_service: auth-dapp
        remote_concept: Wallet Method Execution
        mapping_type: projects_as
        description: Authentication requests are executed by the browser-based auth dApp using the user's wallet

  invariants:
    - rule: Requests must expire after 5 minutes if not consumed
      enforced_at: domain_layer
      severity: hard

    - rule: Each request must have a unique verification code for the session
      enforced_at: domain_layer
      severity: hard

    - rule: Consumed requests cannot be reused
      enforced_at: domain_layer
      severity: hard

  responsibilities:
    - Creates and manages request objects that encapsulate wallet method calls (eth_sendTransaction, personal_sign, dcl_personal_sign)
    - Generates unique request IDs with expiration timestamps and visual verification codes
    - Relays wallet method execution results from browser dApp back to desktop client
    - Manages request lifecycle (creation, expiration, consumption, cleanup on socket disconnect)
    - Supports both WebSocket (Socket.IO) and HTTP polling communication patterns
    - Handles authentication flow with ephemeral wallet generation for identity creation

  out_of_scope:
    - Actual wallet operations execution (handled by browser wallet via auth dApp)
    - User profile management (handled by Catalyst)
    - Session management for in-world activities (handled by other services)

  owned_entities:
    - name: Authentication Request
      description: Wallet method call pending execution with lifecycle metadata
      persistence: postgres
      identity_field: requestId

api:
  openapi_url: https://github.com/decentraland/auth-server/blob/main/docs/openapi.yaml

db:
  schema_url: ""

dependencies:
  services: []

  external:
    - name: PostgreSQL
      purpose: Request storage and lifecycle management
      type: storage

    - name: Redis
      purpose: Optional caching layer (falls back to in-memory if not configured)
      type: storage

    - name: Browser Wallet
      purpose: Executes Ethereum transactions and signatures via auth dApp
      type: other

    - name: SendGrid
      purpose: Email notifications for onboarding nudges
      type: api

    - name: Slack
      purpose: Notifications for onboarding nudge emails sent
      type: api

events:
  publishes: []
  consumes: []

configuration:
  key_env_vars:
    - name: HTTP_SERVER_PORT
      description: Port on which the HTTP server listens (default 8080)
      affects: Service availability and routing

    - name: HTTP_SERVER_HOST
      description: Host address for the HTTP server (default 0.0.0.0)
      affects: Service network binding

    - name: CORS_ORIGIN
      description: Semicolon-separated regex patterns for allowed CORS origins (auth dApp URLs)
      affects: Cross-origin communication security

    - name: CORS_METHODS
      description: Allowed HTTP methods for CORS (default *)
      affects: Cross-origin request handling

    - name: REDIS_HOST
      description: Redis host URL for caching (optional, falls back to in-memory)
      affects: Caching performance

    - name: DCL_PERSONAL_SIGN_REQUEST_EXPIRATION_IN_SECONDS
      description: Expiration time in seconds for personal sign requests (default 600)
      affects: Sign-in request timeout

    - name: REQUEST_EXPIRATION_IN_SECONDS
      description: Expiration time in seconds for all other requests (default 300)
      affects: Request timeout

    - name: PG_COMPONENT_PSQL_CONNECTION_STRING
      description: PostgreSQL connection string for onboarding tracking (alternative to individual vars)
      affects: Database connectivity

    - name: PG_COMPONENT_PSQL_USER
      description: PostgreSQL user for authentication
      affects: Database authentication

    - name: PG_COMPONENT_PSQL_PASSWORD
      description: PostgreSQL password for authentication
      affects: Database authentication

    - name: PG_COMPONENT_PSQL_HOST
      description: PostgreSQL host (default localhost)
      affects: Database connectivity

    - name: PG_COMPONENT_PSQL_PORT
      description: PostgreSQL port (default 5432)
      affects: Database connectivity

    - name: PG_COMPONENT_PSQL_DATABASE
      description: PostgreSQL database name (default auth)
      affects: Database selection

    - name: PG_COMPONENT_PSQL_SCHEMA
      description: PostgreSQL schema name (default public)
      affects: Database schema selection

    - name: SENDGRID_API_KEY
      description: SendGrid API key for email notifications
      affects: Onboarding email nudge system

    - name: SENDGRID_FROM_EMAIL
      description: SendGrid sender email address (default hello@decentraland.org)
      affects: Email sender identity

    - name: SENDGRID_TEMPLATE_ID
      description: SendGrid dynamic template ID for onboarding emails (uses Handlebars vars)
      affects: Email template rendering

    - name: ONBOARDING_API_KEY
      description: API key for onboarding checkpoint endpoint (must match events-notifier)
      affects: Authorization for onboarding checkpoint updates

    - name: ONBOARDING_ADMIN_ENABLED
      description: Enable admin endpoints for onboarding testing (dev/staging only, default false)
      affects: Admin endpoint availability

    - name: SLACK_BOT_TOKEN
      description: Slack bot authentication token for notifications (optional)
      affects: Slack integration

    - name: SLACK_NUDGE_CHANNEL
      description: Slack channel for onboarding nudge notifications (default onboarding-nudges-sent)
      affects: Slack notification routing

adrs: []
