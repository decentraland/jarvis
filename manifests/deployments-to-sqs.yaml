schema_version: "1.1"

service:
  name: deployments-to-sqs
  display_name: Deployments to SQS
  description: Monitors Catalyst content servers for new entity deployments and publishes deployment events to AWS SNS. Acts as the event source for downstream optimization services that process wearables, emotes, and scenes.
  owner: core-engineering
  repository: https://github.com/decentraland/deployments-to-sqs
  language: typescript
  layer: feature-servers
  role:
    - worker
  data_domain: []
  ai-agent-context: https://github.com/decentraland/deployments-to-sqs/blob/main/docs/ai-agent-context.md

domain:
  glossary:
    - term: Deployment Event
      definition: Notification that a new entity (wearable, emote, scene) has been deployed to Catalyst, including entity metadata and content server URLs.

  concept_relationships:
    cross_service:
      - local_concept: Deployment Event
        remote_service: catalyst
        remote_concept: Entity Deployment
        mapping_type: derived_from
        description: Deployment events are derived from Catalyst entity deployments

  invariants:
    - rule: Only wearables, emotes, and scenes trigger events (profiles excluded)
      enforced_at: domain_layer
      severity: hard

  responsibilities:
    - Poll Catalyst pointer-changes endpoints
    - Detect new entity deployments
    - Filter by entity type
    - Publish deployment events to SNS

  out_of_scope:
    - Entity processing (handled by asset-bundle-converter)
    - Entity storage (handled by Catalyst)

  owned_entities: []

api:
  openapi_url: ""

db:
  schema_url: ""

dependencies:
  services:
    - name: catalyst
      relationship: sync
      protocol: HTTP
      purpose: Polls for new deployments
      critical: true

  external:
    - name: AWS SNS
      purpose: Publishes deployment events
      type: messaging

events:
  publishes:
    - name: entity_deployed
      description: New entity deployed to Catalyst
      channel: deployments-sns-${env}
      key_payload_fields:
        - entityId
        - entityType
        - pointers
        - deployer
        - timestamp

  consumes: []

configuration:
  feature_flags: []
  key_env_vars:
    - name: AWS_REGION
      description: AWS region for SNS and S3 resources
      affects: AWS service region configuration

    - name: SNS_ARN
      description: ARN of the SNS topic for deployment notifications
      affects: Deployment event routing

    - name: EVENTS_SNS_ARN
      description: ARN of the SNS topic for event notifications
      affects: Event notification routing

    - name: SNS_ENDPOINT
      description: Custom SNS endpoint for local development
      affects: Development and testing configuration

    - name: BUCKET
      description: S3 bucket name for storing processed snapshots
      affects: Snapshot storage location (uses local folder if not set)

    - name: HTTP_SERVER_PORT
      description: HTTP server port for health checks and metrics
      affects: Server listening port

    - name: HTTP_SERVER_HOST
      description: HTTP server host address
      affects: Server binding configuration

    - name: CONTENT_SERVER_URLS
      description: Comma-separated list of Catalyst content server URLs to monitor
      affects: Catalyst deployment monitoring sources

adrs: []
