      affects: "Download redirect when client not installed"

    - name: "HOME_URL"
      description: "Decentraland homepage URL"
      affects: "Home navigation links"

    - name: "CHAIN_ID"
      description: "EVM chain ID (1 = mainnet, 11155111 = Sepolia testnet)"
