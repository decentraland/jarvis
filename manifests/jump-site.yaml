schema_version: "1.1"

service:
  name: "jump-site"
  display_name: "Jump In Web (Deep Links)"
  description: "Vite/React SPA (served at jump.decentraland.org) that acts as a deep-link entry point into the Decentraland Explorer. Given a position and/or realm passed as query parameters, it attempts to launch the desktop Explorer client via the decentraland:// custom protocol URI scheme. If the desktop client is not detected as installed, it redirects the user to the download or onboarding flow."
  owner: "decentraland-foundation"
  repository: "https://github.com/decentraland/jump-site"
  language: "typescript"
  layer: "Feature Servers Layer"
  role:
    - "client"
  data_domain: []
  ai-agent-context: "https://github.com/decentraland/jump-site/blob/main/docs/ai-agent-context.md"

domain:
  glossary:
    - term: "World Preview"
      definition: "A preview card displaying metadata for custom Decentraland worlds (.eth domains), including title, description, and location image."
      examples:
        - "worldname.eth with title, description, and preview image"
      not_to_be_confused_with: ""
    - term: "Genesis City Location"
      definition: "A coordinate-based location in Decentraland's main realm, identified by x,y coordinates."
      examples:
        - "Position 0,0 in Genesis City"
      not_to_be_confused_with: ""
    - term: "Deep Link"
      definition: "A custom protocol URL (decentraland://) that launches the Decentraland Explorer desktop client to a specific location or world."
      examples:
        - "decentraland://?position=0,0&realm=main"
      not_to_be_confused_with: ""

  concept_relationships:
    internal:
      - from: "World Preview"
        to: "Deep Link"
        relationship: "generates"
        description: "Each world preview generates a deep link that launches the desktop client to that specific world"
      - from: "Genesis City Location"
        to: "Deep Link"
        relationship: "generates"
        description: "Each Genesis City location generates a deep link that launches the desktop client to those coordinates"

    cross_service:
      - local_concept: "World Preview"
        remote_service: "worlds-content-server"
        remote_concept: "World"
        mapping_type: "references"
        description: "World previews fetch metadata from worlds-content-server's /about endpoint for .eth domains"
      - local_concept: "Genesis City Location"
        remote_service: "places"
        remote_concept: "Place"
        mapping_type: "references"
        description: "Genesis City locations fetch place data from the places service API"
      - local_concept: "Genesis City Location"
        remote_service: "catalyst"
        remote_concept: "Scene Entity"
        mapping_type: "references"
        description: "Genesis City locations fetch scene and deployer information from catalyst's lambdas and content endpoints"

  invariants:
    - rule: "World names must be valid ENS names (ending with .eth)"
      enforced_at: "api_validation"
      severity: "hard"
    - rule: "Position coordinates must be in the format 'x,y'"
      enforced_at: "api_validation"
      severity: "hard"

  responsibilities:
    - Deep-link launch of Decentraland desktop Explorer using the decentraland:// custom protocol
    - Desktop client installation detection by monitoring window blur events after iframe injection
    - Mobile detection and disclaimer modal display instead of deep-link attempts
    - PlacesPage for Decentraland land coordinates and EventsPage for event-specific jump-in
    - Realm/world validation via peer health check and ENS name resolution
    - Place metadata fetching from Places API for scene title, description, image, and owner
    - Creator information fetching from Catalyst peer API for scene deployer data
    - Invalid page fallback when realm validation fails
    - Wallet-based authentication context support
    - Segment analytics tracking for click events, mobile detection, and client-not-installed events
    - Bot/crawler detection and static informational response

  out_of_scope:
    - Running the actual Decentraland Explorer client (only launches it)
    - Managing world or scene content (only displays previews)
    - Hosting or processing 3D assets
    - User profile editing or wallet transaction signing
    - Event creation or place management
    - Blog, marketplace, DAO, or other Decentraland product pages
    - Server-side rendering or SEO pre-rendering

  owned_entities: []

api:
  openapi_url: ""

db:
  schema_url: ""

dependencies:
  services:
    - name: "places"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Scene metadata (title, description, image) and world name lookup via PLACES_API_URL"
      critical: true

    - name: "worlds-content-server"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "World metadata and health for ENS-based worlds via WORLD_CONTENT_API_URL"
      critical: true

    - name: "catalyst"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Scene deployer info (name, address, avatar) via PEER_URL /about/scenes endpoint"
      critical: true

    - name: "events"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Event metadata for EventsPage jump-in via EVENTS_API_URL"
      critical: false

    - name: "auth"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Decentraland SSO authentication via AUTH_URL"
      critical: false

  external:
    - name: "Decentraland Explorer Desktop Client"
      purpose: "Launched via deep links (decentraland:// protocol) to enter the virtual world"
      type: "client"

    - name: "Segment"
      purpose: "Analytics tracking for click events, mobile detection, and error events"
      type: "api"

events:
  publishes: []
  consumes: []

configuration:
  feature_flags: []

  key_env_vars:
    - name: "VITE_REACT_APP_DCL_DEFAULT_ENV"
      description: "Active environment (dev or prd) selected at build time"
      affects: "Configuration selection from config/env/*.json"

    - name: "JUMP_IN_URL"
      description: "Base URL for this site (used in share links)"
      affects: "Share link generation"

    - name: "PEER_URL"
      description: "Decentraland Catalyst peer URL"
      affects: "Scene deployer data and peer health checks"

    - name: "PLACES_URL"
      description: "Places web app URL"
      affects: "External links to Places app"

    - name: "PLACES_API_URL"
      description: "Places REST API base URL"
      affects: "Scene metadata fetching"

    - name: "EVENTS_URL"
      description: "Events web app URL"
      affects: "External links to Events app"

    - name: "EVENTS_API_URL"
      description: "Events REST API base URL"
      affects: "Event metadata fetching for EventsPage"

    - name: "WORLD_CONTENT_API_URL"
      description: "World Content Server API base URL"
      affects: "ENS world validation and metadata"

    - name: "AUTH_URL"
      description: "Decentraland SSO auth URL"
      affects: "Wallet authentication redirects"

    - name: "ONBOARDING_URL"
      description: "New-user onboarding redirect URL"
      affects: "User onboarding flow"

    - name: "DOWNLOAD_URL"
