schema_version: "1.1"

service:
  name: "landing-site"
  display_name: "Landing Site (Modern)"
  description: "Modern Vite/React SPA serving as the new Decentraland main landing page, replacing the Gatsby-based landing app. Features hero section, catch the vibe, weekly rituals, lazy-loaded below-the-fold sections, OS-aware download options, wallet-based authentication (Magic SDK, WalletConnect), and analytics tracking."
  owner: "decentraland-foundation"
  repository: "https://github.com/decentraland/landing-site"
  language: "typescript"
  layer: "entry-points"
  role:
    - "client"
  data_domain: []
  ai-agent-context: "https://github.com/decentraland/landing-site/blob/main/docs/ai-agent-context.md"

domain:
  glossary:
    - term: "Landing Site"
      definition: "A modern, Vite-based web application that serves as an entry point to Decentraland, showcasing missions, creator tools, FAQs, and community features with wallet integration. Replaces the Gatsby-based landing app with a faster, more maintainable architecture."
      not_to_be_confused_with: "Landing (Gatsby-based homepage at github.com/decentraland/landing)"
      
    - term: "newUser param"
      definition: "URL query parameter (?newUser, ?newuser, ?new_user, ?new-user) that hides the navbar to create a clean onboarding experience for new users."
      
    - term: "DownloadOptions"
      definition: "Component that uses advanced user agent data to detect OS and CPU architecture, then resolves the appropriate Explorer download URL (Windows .exe or macOS .dmg) for the user's system."
      
    - term: "Lazy loading"
      definition: "Below-the-fold components are dynamically imported via React.lazy + Suspense to reduce initial bundle size and improve perceived performance."
      
    - term: "Catch the Vibe"
      definition: "Landing section featuring user-generated content cards with images and hover videos from the Decentraland community."
      
    - term: "Weekly Rituals"
      definition: "Carousel section showcasing recurring weekly events in Decentraland (Career Mondays, Takeover Tuesdays, Watch Party Wednesdays)."

  concept_relationships:
    internal:
      - from: "Landing Site"
        to: "DownloadOptions"
        relationship: "contains"
        description: "Landing page provides OS-aware Explorer download links"
        
      - from: "Lazy loading"
        to: "Landing Site"
        relationship: "belongs_to"
        description: "Below-the-fold sections are lazy-loaded to improve initial page load performance"

    cross_service:
      - local_concept: "User Profile"
        remote_service: "catalyst"
        remote_concept: "Avatar Profile"
        mapping_type: "references"
        description: "Landing site fetches user avatar profiles from Catalyst's peer endpoint for authenticated contexts"
        
      - local_concept: "Events"
        remote_service: "events-api"
        remote_concept: "Live Events"
        mapping_type: "references"
        description: "Landing site displays live events from the events API"
        
      - local_concept: "Hot Scenes"
        remote_service: "realm-provider"
        remote_concept: "Hot Scenes"
        mapping_type: "references"
        description: "Landing site displays trending scenes from realm provider"

  invariants: []

  responsibilities:
    - Serve as the new main Decentraland landing page, replacing the Gatsby-based landing app
    - Render marketing landing page with hero, catch the vibe, weekly rituals, and other promotional sections
    - Provide OS/architecture detection and appropriate Explorer download links (Windows .exe, macOS .dmg, Android APK, iOS App Store)
    - Integrate wallet-based authentication via Magic SDK and WalletConnect (wagmi/viem)
    - Handle sign-in redirect page for authentication callbacks
    - Support newUser query parameter to hide navbar for clean onboarding experience
    - Track analytics via Segment with event tracking utilities
    - Provide internationalization via react-intl
    - Detect WebGPU capability for enhanced rendering options
    - Display live events from events API
    - Display hot scenes from realm provider
    - Fetch and display user profiles from Catalyst peer
    - Show Explorer download statistics from CDN

  out_of_scope:
    - User authentication logic (delegates to auth service)
    - Hosting or distributing desktop client files
    - Profile creation or editing (only displays profiles from Catalyst)
    - Blockchain transactions or smart contract interactions
    - Blog content (handled by blog-site)
    - Event creation or management (handled by events site)
    - Marketplace, NFT trading, or DAO governance
    - Place discovery or world browsing
    - Community management or user-generated content
    - Jump-in deep-link Explorer launch (handled by jump-site)
    - Server-side rendering or static site generation
    - Content management system integration

  owned_entities: []

api:
  openapi_url: ""

db:
  schema_url: ""

dependencies:
  services:
    - name: "catalyst"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Fetch user avatar profiles from peer endpoint for authenticated contexts"
      critical: false
      
    - name: "auth"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "SSO authentication for wallet connection and onboarding flows"
      critical: false
      
    - name: "realm-provider"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Fetch hot scenes for trending content display"
      critical: false

  external:
    - name: "Events API"
      purpose: "Fetch live events for What's On section (events.decentraland.org/api)"
      type: "api"
      
    - name: "Magic SDK"
      purpose: "Email and social login provider for passwordless authentication and wallet creation"
      type: "api"
      
    - name: "WalletConnect"
      purpose: "Web3 wallet connection protocol for user authentication via wagmi/viem integration"
      type: "api"
      
    - name: "Segment"
      purpose: "Analytics tracking and user behavior monitoring with event tracking utilities"
      type: "api"
      
    - name: "CDN (cdn-data.decentraland.org)"
      purpose: "Hosts Explorer download statistics JSON file for download count display"
      type: "cdn"

events:
  publishes: []
  consumes: []

configuration:
  feature_flags: []

  key_env_vars:
    - name: "VITE_REACT_APP_DCL_DEFAULT_ENV"
      description: "Determines which environment configuration to use (dev, stg, prod)"
      affects: "Application environment and configuration selection via @dcl/ui-env"
      
    - name: "ONBOARDING_URL"
      description: "New-user onboarding URL with newUser flag and redirectTo parameter"
      affects: "Onboarding flow routing for new users after authentication"
      
    - name: "AUTH_URL"
      description: "Decentraland SSO authentication service URL (decentraland.org/auth)"
      affects: "User authentication flows and onboarding redirects"
      
    - name: "PEER_URL"
      description: "Decentraland Catalyst peer URL for profile operations (peer.decentraland.org)"
      affects: "User avatar profile fetching and auth profile context"
      
    - name: "MAGIC_API_KEY"
      description: "Magic SDK publishable API key for passwordless authentication"
      affects: "Email and social login functionality via Magic SDK"
      
    - name: "WALLET_CONNECT_PROJECT_ID"
      description: "WalletConnect project ID for Web3 wallet connections"
      affects: "Web3 wallet integration functionality via wagmi/viem"
      
    - name: "DOWNLOAD_COUNTS_URL"
      description: "CDN URL to JSON file containing Explorer download statistics"
      affects: "Download count display on landing and download pages"
      
    - name: "EVENTS_API_URL"
      description: "Events API endpoint URL (events.decentraland.org/api)"
      affects: "Live events data fetching for What's On section"
      
    - name: "HOT_SCENES_URL"
      description: "Realm provider hot scenes endpoint URL (realm-provider-ea.decentraland.org/hot-scenes)"
      affects: "Trending scenes data fetching for What's Hot section"
      
    - name: "JUMP_IN_URL"
      description: "Jump-in service URL for deep-linking to scenes (decentraland.org/jump)"
      affects: "Scene jump-in links and navigation"
      
    - name: "NOTIFICATIONS_API_URL"
      description: "Notifications API endpoint URL (notifications.decentraland.org)"
      affects: "User notifications fetching and display"
      
    - name: "DOWNLOAD_URL"
      description: "Download page URL (decentraland.org/download)"
      affects: "Download page navigation and links"
      
    - name: "WEARABLE_PREVIEW_URL"
      description: "Wearable preview service URL (wearable-preview.decentraland.org)"
      affects: "Wearable preview rendering and display"

adrs: []
