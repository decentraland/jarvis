schema_version: "1.1"

service:
  name: unity3d-nsubstitute
  display_name: Unity3D NSubstitute
  description: Unity package providing NSubstitute, a .NET mocking framework, for use in Unity Test Framework. Fork of Thundernerd/Unity3D-NSubstitute adapted for Decentraland's testing needs. Repository is archived as of August 2025.
  owner: explorer
  repository: https://github.com/decentraland/Unity3D-NSubstitute
  language: csharp
  layer: library
  role:
    - library
  data_domain: []
  ai-agent-context: ""

domain:
  glossary: []

  concept_relationships:
    internal: []

    cross_service:
      - local_concept: Mocking Framework
        remote_service: unity-explorer
        remote_concept: Plugin System
        mapping_type: used_by
        description: Used in Unity Explorer's unit tests for creating test doubles and verifying interactions

  invariants: []

  responsibilities:
    - Provide NSubstitute mocking framework as a Unity package
    - Enable creation of test substitutes for interfaces and virtual class members
    - Support argument matching, return value configuration, and call verification in tests

  out_of_scope:
    - Integration testing (this is for unit test mocking only)
    - Test execution framework (handled by Unity Test Framework)

  owned_entities: []

