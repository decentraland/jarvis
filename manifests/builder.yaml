schema_version: "1.1"

service:
  name: builder
  display_name: Decentraland Builder
  description: Web-based application for creating, editing, and publishing Decentraland content. Provides drag-and-drop scene creation (SDK6), Inspector-based editing (SDK7), wearable and emote design, LAND and Estate management, and Worlds deployment with permission controls.
  owner: sdk-team
  repository: https://github.com/decentraland/builder
  language: typescript
  layer: client
  role:
    - client
  data_domain: []
  ai-agent-context: https://github.com/decentraland/builder/blob/main/docs/ai-agent-context.md

domain:
  glossary:
    - term: Project/Scene
      definition: A 3D scene with entities, components, and assets that can be deployed to LAND or Worlds
      examples:
        - "SDK6 scene created with drag-and-drop editor"
        - "SDK7 scene created with Inspector integration"

    - term: Item
      definition: A wearable or emote with 3D models, metadata, and rarity that belongs to a collection
      examples:
        - "T-shirt wearable with common rarity"
        - "Dance emote with rare rarity"

    - term: Collection
      definition: A group of items (standard or third-party) that can be published on-chain
      examples:
        - "Standard DCL collection with 10 wearables"
        - "Third-party collection linked to external NFT contract"

    - term: LAND
      definition: Virtual real estate in Decentraland represented as NFT; smallest unit of owned space
      not_to_be_confused_with: Estate (which is a group of adjacent LANDs)

    - term: Estate
      definition: Group of adjacent LAND parcels managed as a single entity
      examples:
        - "Estate composed of 4 adjacent LAND parcels"

    - term: World
      definition: Personal space where users can deploy scenes without owning LAND
      examples:
        - "User creates a World named 'my-gallery.dcl.eth'"

    - term: DCL Name
      definition: Decentraland's native naming system; names can be linked to LAND, Worlds, Avatars, or wallet addresses, and can be transferred between users
      examples:
        - "User claims 'johndoe.dcl.eth'"
        - "Name linked to World for custom URL"

    - term: ENS Domain
      definition: External Ethereum Name Service domain that can be linked to LAND or Worlds for custom URLs
      not_to_be_confused_with: DCL Name (which is Decentraland's native naming system)

    - term: Curation
      definition: Review process for collections before they are approved for publication
      examples:
        - "Curator reviews collection for policy compliance"

    - term: Third-Party Collection
      definition: Linked wearables from external NFT contracts mapped to Decentraland items
      examples:
        - "BoredApe NFT mapped to Decentraland wearable"

  concept_relationships:
    internal:
      - from: Item
        to: Collection
        relationship: belongs_to
        description: Items must belong to a Collection before publication

      - from: Collection
        to: Curation
        relationship: transitions_to
        description: Collections must go through Curation before on-chain publication

      - from: LAND
        to: Estate
        relationship: belongs_to
        description: Multiple LAND parcels can be grouped into an Estate

      - from: Scene
        to: LAND
        relationship: deploys_to
        description: Scenes can be deployed to owned LAND parcels

      - from: Scene
        to: World
        relationship: deploys_to
        description: Scenes can be deployed to personal Worlds without owning LAND

    cross_service:
      - local_concept: Scene
        remote_service: catalyst
        remote_concept: Entity Deployment
        mapping_type: deploys_to
        description: Scenes are deployed as entities to Catalyst servers for Genesis City parcels

      - local_concept: Scene
        remote_service: worlds-content-server
        remote_concept: World Deployment
        mapping_type: deploys_to
        description: Scenes are deployed as entities to Worlds Content Server for named worlds

      - local_concept: Project
        remote_service: builder-server
        remote_concept: Stored Project
        mapping_type: equivalent
        description: Projects are stored and retrieved from Builder API backend

      - local_concept: Collection
        remote_service: builder-server
        remote_concept: Stored Collection
        mapping_type: equivalent
        description: Collections are stored in Builder API before on-chain publication

  invariants:
    - rule: Items must belong to a Collection before they can be published
      enforced_at: domain_layer
      severity: hard

    - rule: Collections must pass Curation before on-chain publication (for standard collections)
      enforced_at: api_validation
      severity: hard

    - rule: LAND deployments require ownership or operator permissions
      enforced_at: domain_layer
      severity: hard

    - rule: World deployments require authenticated signature via decentraland-crypto-fetch
      enforced_at: api_validation
      severity: hard

  responsibilities:
    - Provide web-based scene creation and editing for SDK6 and SDK7
    - Manage wearable and emote creation with 3D preview
    - Store projects, items, and collections via Builder API
    - Deploy scenes to LAND parcels via Catalyst servers
    - Deploy scenes to Worlds via Worlds Content Server
    - Manage LAND and Estate NFTs (transfer, operators, ENS linking)
    - Manage DCL Names (claim, transfer, link to LAND/Worlds/Avatars)
    - Link ENS domains to LAND parcels and Worlds
    - Provide curation workflow for reviewing collections
    - Manage World permissions (access, deployment, streaming)
    - Query blockchain data via The Graph subgraphs
    - Execute blockchain transactions via ethers.js

  out_of_scope:
    - Backend storage (delegated to builder-server)
    - Content distribution (delegated to Catalyst and Worlds Content Server)
    - Scene runtime execution (handled by Explorer clients)
    - Blockchain infrastructure (uses Ethereum RPC providers)
    - Wearable rendering in-world (handled by Explorer renderers)

  owned_entities: []

api:
  openapi_url: ""

db:
  schema_url: ""

dependencies:
  services:
    - name: builder-server
      relationship: sync
      protocol: HTTP
      purpose: Store and retrieve projects, items, collections, asset packs, and deployment records
      critical: true

    - name: catalyst
      relationship: sync
      protocol: HTTP
      purpose: Deploy scenes to Genesis City LAND parcels, fetch profile data, retrieve content entities
      critical: true

    - name: worlds-content-server
      relationship: sync
      protocol: HTTP
      purpose: Deploy scenes to personal Worlds, manage World settings and permissions, fetch World metadata
      critical: true

    - name: marketplace-server
      relationship: sync
      protocol: HTTP
      purpose: Retrieve marketplace items on sale, query order and transaction data
      critical: false

    - name: credits-server
      relationship: sync
      protocol: HTTP
      purpose: Query and manage user credits for publishing fees
      critical: false

  external:
    - name: The Graph (Subgraphs)
      purpose: Query on-chain data for LAND, Estates, Marketplace, Rentals, and ENS via GraphQL
      type: api

    - name: Ethereum RPC
      purpose: Execute blockchain transactions and read smart contract data via ethers.js
      type: blockchain

    - name: Transactions API
      purpose: Meta-transactions service for gasless blockchain operations
      type: api

    - name: DCL Lists Server
      purpose: Fetch lists and bans for content moderation
      type: api

    - name: Segment
      purpose: Analytics tracking for user behavior and feature usage
      type: other

    - name: Sentry
      purpose: Error tracking and crash reporting
      type: other

    - name: Intercom
      purpose: User support and messaging
      type: other

    - name: Contentful
      purpose: CMS for templates and educational content
      type: other

    - name: GitHub CDN
      purpose: Distribution of Inspector content and asset packs (builder-items.decentraland.org)
      type: cdn

events:
  publishes: []
  consumes: []

configuration:
  feature_flags:
    - name: REACT_APP_FF_BUILDER_MAINTENANCE
      description: Enable/disable maintenance mode for the Builder application
      default: ""

    - name: REACT_APP_FF_BUILDER_RENTALS
      description: Enable/disable LAND rentals feature
      default: ""

    - name: REACT_APP_FF_BUILDER_DCL_CONTROLLER_V2
      description: Enable/disable DCL Controller V2 feature
      default: ""

    - name: REACT_APP_FF_BUILDER_WORLDS_FOR_ENS_OWNERS
      description: Enable/disable Worlds for ENS owners feature
      default: ""

  key_env_vars:
    - name: VITE_REACT_APP_DCL_DEFAULT_ENV
      description: Default environment for UI configuration (dev, stg, prod); loads corresponding config from src/config/env/*.json
      affects: Environment-specific configuration loading (API URLs, contract addresses, feature flags)

    - name: VITE_BASE_URL
      description: Base URL for the application
      affects: Routing and link generation

    - name: VITE_REACT_APP_WEBSITE_VERSION
      description: Application version displayed in UI
      affects: Displayed version string

    - name: GEN_STATIC_LOCAL
      description: Generate static files locally during development
      affects: Build process and asset generation

    - name: VITE_INSPECTOR_PORT
      description: Local inspector dev server port for development mode (default 8000)
      affects: Development environment - where Inspector is served locally

    - name: VITE_BIN_INDEX_JS_DEV_PATH
      description: Absolute path to bin/index.js for Smart Items runtime in local asset-packs development
      affects: Development environment - local asset-packs JavaScript bundle location

    - name: VITE_BIN_INDEX_JS_DEV_PORT
      description: SDK7 dev server port for local asset-packs development (default 8001)
      affects: Development environment - Smart Items runtime dev server

    - name: CHAIN_ID
      description: Ethereum chain ID (1 for mainnet, 11155111 for Sepolia)
      affects: Blockchain network selection for wallet connections and contract interactions

    - name: ENVIRONMENT
      description: Runtime environment label (dev, stg, production)
      affects: Environment-specific behavior and logging

    - name: LOCAL_STORAGE_KEY
      description: LocalStorage key prefix for application state
      affects: Browser storage namespacing

    - name: EMAIL_SERVER_URL
      description: Newsletter subscription API endpoint
      affects: Email subscription functionality

    - name: PEER_URL
      description: Catalyst peer URL for scene deployment and content operations
      affects: Scene deployment target and profile fetching

    - name: ERC721_COLLECTION_BASE_URI
      description: Base URI for ERC721 collection metadata
      affects: Collection metadata URL generation

    - name: BUILDER_SERVER_URL
      description: Builder API endpoint for projects, items, and collections
      affects: Project storage and retrieval

    - name: MARKETPLACE_URL
      description: Legacy marketplace API endpoint
      affects: Marketplace data fetching

    - name: MARKETPLACE_API
      description: Current marketplace API endpoint
      affects: Marketplace items and order data

    - name: DOCS_URL
      description: Documentation URL
      affects: Help and documentation links

    - name: MARKETPLACE_WEB_URL
      description: Marketplace web interface URL
      affects: External marketplace navigation

    - name: CREATOR_HUB_DOWNLOAD_URL
      description: Creator Hub download page URL
      affects: Creator Hub download links

    - name: LAND_MANAGER_GRAPH_URL
      description: The Graph subgraph URL for LAND Manager
      affects: LAND and Estate data queries

    - name: MARKETPLACE_GRAPH_URL
      description: The Graph subgraph URL for Marketplace
      affects: Marketplace transaction queries

    - name: RENTALS_GRAPH_URL
      description: The Graph subgraph URL for Rentals
      affects: LAND rental data queries

    - name: SHARE_SCENE_URL
      description: Scene sharing service URL
      affects: Scene sharing functionality

    - name: INTERCOM_APP_ID
      description: Intercom application ID for user support
      affects: Support chat integration

    - name: SEGMENT_API_KEY
      description: Segment analytics write key for Builder
      affects: Analytics tracking

    - name: ROLLBAR_ACCESS_TOKEN
      description: Rollbar error tracking token
      affects: Error reporting and monitoring

    - name: MANA_TOKEN_CONTRACT_ADDRESS
      description: MANA token contract address on Ethereum
      affects: MANA token interactions

    - name: LAND_REGISTRY_CONTRACT_ADDRESS
      description: LAND Registry contract address
      affects: LAND NFT operations

    - name: ESTATE_REGISTRY_CONTRACT_ADDRESS
      description: Estate Registry contract address
      affects: Estate NFT operations

    - name: ENS_CONTRACT_ADDRESS
      description: ENS Registry contract address
      affects: ENS domain operations

    - name: ENS_GATEWAY
      description: ENS content gateway provider (limo)
      affects: ENS content resolution

    - name: RESOLVER_CONTRACT_ADDRESS
      description: ENS Resolver contract address
      affects: ENS name resolution

    - name: REGISTRAR_CONTRACT_ADDRESS
      description: DCL Names Registrar contract address
      affects: DCL Name registration and management

    - name: RENTALS_CONTRACT_ADDRESS
      description: Rentals contract address
      affects: LAND rental operations

    - name: EXPLORER_URL
      description: Decentraland Explorer play URL
      affects: Play links and navigation

    - name: TRANSACTIONS_API_URL
      description: Transactions API endpoint for meta-transactions
      affects: Gasless transaction support

    - name: ACCOUNT_URL
      description: Account management page URL
      affects: Account settings navigation

    - name: DISCORD_URL
      description: Discord community URL
      affects: Community links

    - name: WEARABLES_ZIP_INFRA_URL
      description: Linked wearables documentation URL
      affects: Help documentation for wearables

    - name: MIN_SALE_VALUE_IN_WEI
      description: Minimum marketplace sale value in wei
      affects: Marketplace sale validation

    - name: FORUM_URL
      description: Decentraland forum URL
      affects: Forum navigation links

    - name: WORLDS_CONTENT_SERVER
      description: Worlds Content Server API endpoint
      affects: World deployment and settings

    - name: PROFILE_URL
      description: User profile page URL
      affects: Profile navigation

    - name: SENTRY_DSN
      description: Sentry error tracking DSN
      affects: Error monitoring and crash reporting

    - name: DCL_LISTS_SERVER
      description: DCL Lists server for content moderation
      affects: Content moderation lists

    - name: INSPECTOR_CONTENT_URL
      description: Inspector content CDN URL for asset packs
      affects: Asset loading in Inspector

    - name: ENS_SUBGRAPH_URL
      description: The Graph subgraph URL for ENS
      affects: ENS domain data queries

    - name: DCL_NAME_STATS_URL
      description: DCL Name statistics service URL
      affects: Name statistics and analytics

    - name: ENS_DOMAINS_URL
      description: ENS Domains web interface URL
      affects: External ENS navigation

    - name: INSPECTOR_SEGMENT_API_KEY
      description: Segment analytics write key for Inspector
      affects: Inspector analytics tracking

    - name: INSPECTOR_SEGMENT_APP_ID
      description: Segment app identifier for Inspector
      affects: Inspector analytics identification

    - name: AUTH_URL
      description: Authentication service URL
      affects: User authentication flows

    - name: MARKETPLACE_SERVER_URL
      description: Marketplace server API endpoint (same as MARKETPLACE_API)
      affects: Marketplace data operations

    - name: WERT_PUBLISH_FEES_ENV
      description: Wert payment environment (prod/dev) for publishing fees
      affects: Payment processing environment

    - name: PEER_TESTING_URL
      description: Testing Catalyst peer URL
      affects: Testing environment scene deployments

    - name: CONTENTFUL_ENVIRONMENT
      description: Contentful environment ID (master/staging)
      affects: CMS content source

    - name: CONTENTFUL_SPACE_ID
      description: Contentful space ID for CMS content
      affects: CMS content fetching

    - name: CONTENTFUL_ADMIN_ENTITY_ID
      description: Contentful admin entity ID for admin templates
      affects: Admin UI content

    - name: CREDITS_SERVER_URL
      description: Credits server API endpoint
      affects: User credits queries and management

    - name: ENS_LIST_PAGE_SIZE
      description: Page size for ENS list queries
      affects: Pagination for ENS domain queries

adrs: []
