schema_version: "1.1"

service:
  name: archipelago-workers
  display_name: Archipelago Workers
  description: Monorepo containing three services that implement the Archipelago protocol for clustering users into dynamic islands based on their positions in Decentraland's metaverse. WS Connector is the client entry point with WebSocket auth and position tracking, Archipelago Core is the clustering engine that calls LiveKit API directly to generate room tokens, and Stats provides read-only monitoring. Enables scalable crowd management and efficient real-time communication for standalone realms.
  owner: core-engineering
  repository: https://github.com/decentraland/archipelago-workers
  language: typescript
  layer: entry-points
  role:
    - rt-gateway
    - worker
  data_domain:
    - islands
    - peers
  ai-agent-context: https://github.com/decentraland/archipelago-workers/blob/main/docs/ai-agent-context.md

domain:
  glossary:
    - term: Island
      definition: A dynamic group of users clustered by proximity in the metaverse, with configurable maximum occupancy. Islands are recalculated in real-time as users move.
      examples:
        - When 100 users are at the same location, they may be split into multiple overlapping islands
      not_to_be_confused_with: Parcels (geographic coordinates) or Realms (connectable servers)

    - term: Peer
      definition: An individual user/avatar in the Archipelago system, identified by Ethereum address and tracked for position updates and island assignments.

    - term: Parcel
      definition: Geographic coordinates in Decentraland where users are located, used to calculate proximity for island clustering.

    - term: Archipelago Protocol
      definition: Communication protocol for clustering users into islands and managing real-time peer-to-peer interactions via NATS messaging.

    - term: WS Connector
      definition: Persistent WebSocket gateway that clients connect to directly. Handles ECDSA challenge-response authentication, receives position heartbeats, publishes to NATS for Core, and forwards island assignments with LiveKit connection strings back to clients. The only entry point clients interact with.
      examples:
        - "Client connects → WS Connector sends challenge → Client signs with ephemeral key → WS Connector validates via @dcl/crypto → Peer registered"

    - term: Archipelago Core
      definition: Stateless island clustering engine that processes position updates from NATS, calculates dynamic island assignments, calls LiveKit API directly to generate room tokens, and publishes island_changed messages with embedded connection strings to NATS. Never directly contacted by clients.
      examples:
        - "Receives heartbeat from NATS → Recalculates islands → Calls LiveKit API for token → Publishes livekit:{host}?access_token={jwt} to NATS"

    - term: Archipelago Stats
      definition: Read-only monitoring service that aggregates peer count and island topology from NATS messages. Exposes REST endpoints for statistics and health checks. Not in the client data path.
      examples:
        - "Subscribes to peer heartbeats → Aggregates counts → Exposes /stats REST endpoint"

  concept_relationships:
    internal:
      - from: Island
        to: Peer
        relationship: has_many
        description: An Island contains multiple Peers that are clustered together based on proximity

      - from: Peer
        to: Parcel
        relationship: references
        description: A Peer has a current position defined by Parcel coordinates

      - from: Island
        to: Parcel
        relationship: references
        description: An Island is associated with a geographic area defined by Parcel coordinates

    cross_service:
      - local_concept: Peer
        remote_service: realm-provider
        remote_concept: User
        mapping_type: equivalent
        description: A Peer in Archipelago represents the same user entity that connects through the Realm Provider

      - local_concept: Island
        remote_service: comms-gatekeeper
        remote_concept: Communication Channel
        mapping_type: projects_as
        description: An Island defines which Peers can communicate with each other, enforced by comms-gatekeeper

  invariants:
    - rule: A Peer must have a valid Ethereum address and signature to connect
      enforced_at: ws-connector authentication layer
      severity: hard

    - rule: Islands are recalculated in real-time as users move, with no more than max occupancy per island
      enforced_at: core service clustering algorithm
      severity: hard

    - rule: Peer heartbeats must be received periodically or the peer is marked as disconnected
      enforced_at: core service subscriber
      severity: hard

  responsibilities:
    - WS Connector - Manage WebSocket connections with ECDSA challenge-response authentication, receive position heartbeats, publish to NATS, forward island assignments with LiveKit connection strings to clients, enforce platform deny list, kick duplicate sessions
    - Archipelago Core - Process position updates from NATS, implement dynamic island clustering (join distance 64 units, leave distance 80 units), call LiveKit API directly to generate room tokens, publish island_changed messages with embedded tokens, publish island topology and service heartbeat every 2 seconds
    - Archipelago Stats - Subscribe to NATS messages (heartbeats, disconnects, island topology, discovery), aggregate peer count and island data, expose REST endpoints for monitoring and analytics, integrate with Catalyst for content metadata

  out_of_scope:
    - Content storage or scene management (handled by Catalyst)
    - Voice/video communication (handled by LiveKit transport layer)
    - Content moderation (handled by police-server)
    - Access control rules (handled by comms-gatekeeper)

  owned_entities:
    - name: Peer
      description: User connected to the Archipelago system with position and island assignment
      persistence: in-memory
      identity_field: ethereumAddress

    - name: Island
      description: Dynamic cluster of peers grouped by proximity
      persistence: in-memory
      identity_field: islandId

api:
  openapi_url: https://github.com/decentraland/archipelago-workers/blob/main/docs/openapi.yaml

dependencies:
  services:
    - name: catalyst
      relationship: sync
      protocol: HTTP
      purpose: Content server for fetching scene entities and hot scenes data (used by stats service)
      critical: false

  external:
    - name: NATS
      purpose: Message broker for peer heartbeats, disconnect events, island changes, and service discovery
      type: messaging

    - name: LiveKit API
      purpose: Called by Archipelago Core to generate room tokens directly (not via comms-gatekeeper)
      type: other

    - name: "@dcl/crypto"
      purpose: Ethereum signature validation and AuthChain verification for WebSocket authentication
      type: other

    - name: "@dcl/protocol"
      purpose: Protobuf definitions for Heartbeat and IslandChangedMessage
      type: other

events:
  publishes:
    - name: island_changed
      description: Notifies when a peer is assigned to a different island
      channel: engine.peer.${peerId}.island_changed
      key_payload_fields:
        - peerId
        - islandId
        - peers

    - name: service_discovery
      description: Broadcasts service availability and status for discovery
      channel: engine.discovery
      key_payload_fields:
        - serviceId
        - status

    - name: island_status
      description: Reports current state of all islands
      channel: engine.islands
      key_payload_fields:
        - islands
        - peers

  consumes:
    - name: peer_heartbeat
      source_service: ws-connector
      description: Periodic heartbeat from connected peers with position updates
      channel: peer.${address}.heartbeat

    - name: peer_disconnect
      source_service: ws-connector
      description: Notification when a peer disconnects from WebSocket
      channel: peer.${address}.disconnect

configuration:
  key_env_vars:
    - name: NATS_URL
      description: Connection URL for NATS message broker
      affects: Event-driven communication and service discovery

    - name: ARCHIPELAGO_FLUSH_FREQUENCY
      description: Frequency (in seconds) to flush island state updates
      affects: Island state update rate

    - name: ARCHIPELAGO_JOIN_DISTANCE
      description: Distance threshold for joining islands (in meters)
      affects: Island clustering proximity algorithm

    - name: ARCHIPELAGO_LEAVE_DISTANCE
      description: Distance threshold for leaving islands (in meters)
      affects: Island clustering separation algorithm

    - name: ARCHIPELAGO_PARCEL_SIZE
      description: Size of parcels in meters (default 16)
      affects: Coordinate calculations

    - name: CHECK_HEARTBEAT_INTERVAL
      description: Interval to check for peer heartbeats (in milliseconds)
      affects: Peer disconnect detection timing

    - name: ARCHIPELAGO_STATUS_UPDATE_INTERVAL
      description: Interval for status updates (in milliseconds)
      affects: Status reporting frequency

    - name: HTTP_SERVER_PORT
      description: HTTP server port (different for each service - core:5000, ws-connector:5001, stats:5002)
      affects: Service endpoint accessibility

    - name: CONTENT_URL
      description: Catalyst content server URL for fetching scene entities (stats service only)
      affects: Hot scenes data retrieval

adrs:
  - id: ADR-204
    title: Archipelago Protocol Architecture
    url: https://adr.decentraland.org/adr/ADR-204
    relevance: Defines the core architecture and message formats for the Archipelago system
