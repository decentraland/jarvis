schema_version: "1.1"

service:
  name: social-service-ea
  display_name: Social Service EA
  description: Microservice handling social interactions for Decentraland. Enables users to create and manage communities, connect with friends, participate in voice chats, and engage in social activities within the metaverse.
  owner: core-engineering
  repository: https://github.com/decentraland/social-service-ea
  language: typescript
  layer: feature-servers
  role:
    - other
  data_domain:
    - communities
    - friendships
    - social-settings
  ai-agent-context: https://github.com/decentraland/social-service-ea/blob/main/docs/ai-agent-context.md

domain:
  glossary:
    - term: Community
      definition: Social group with customizable privacy (public/private) and visibility (listed/unlisted) settings, role-based permissions, and place associations.

    - term: Community Role
      definition: Permission level within a community (owner, moderator, member, none) determining user capabilities.

    - term: Community Request
      definition: Invitation or join request for community membership with approval workflow.

    - term: Private Voice Chat
      definition: One-on-one voice chat session between users with expiration time.

  concept_relationships:
    internal:
      - from: Community
        to: Community Member
        relationship: has_many
        description: Communities contain members with roles

      - from: Community
        to: Community Post
        relationship: has_many
        description: Communities have posts for announcements

      - from: Community
        to: Community Place
        relationship: has_many
        description: Communities can be associated with multiple Decentraland locations

    cross_service:
      - local_concept: Community
        remote_service: comms-gatekeeper
        remote_concept: Voice Chat
        mapping_type: projects_as
        description: Communities can have voice chat sessions managed by comms-gatekeeper

      - local_concept: Community Member
        remote_service: catalyst
        remote_concept: Profile
        mapping_type: references
        description: Community members reference Catalyst user profiles

  invariants:
    - rule: Community owners have full control over their communities
      enforced_at: domain_layer
      severity: hard

    - rule: Private communities require invitation or approval to join
      enforced_at: domain_layer
      severity: hard

  responsibilities:
    - Manage communities with privacy and visibility settings
    - Handle member management with role-based permissions
    - Process community posts with likes
    - Link communities with Decentraland places
    - Facilitate voice chat sessions
    - Manage friendships and social connections
    - Track user referrals and progress
    - Handle privacy controls and blocking

  owned_entities:
    - name: Community
      description: Social group with members and settings
      persistence: postgres
      identity_field: id

    - name: Friendship
      description: Social connection between users
      persistence: postgres
      identity_field: composite (user1, user2)

    - name: Community Post
      description: Announcement or update in community
      persistence: postgres
      identity_field: id

api:
  openapi_url: https://github.com/decentraland/social-service-ea/blob/main/docs/openapi.yaml

db:
  schema_url: https://github.com/decentraland/social-service-ea/blob/main/docs/database-schemas.md

dependencies:
  services:
    - name: catalyst
      relationship: sync
      protocol: HTTP
      purpose: User profiles and avatar data via Lambdas
      critical: false

    - name: comms-gatekeeper
      relationship: sync
      protocol: HTTP
      purpose: Voice chat token generation and room management
      critical: false

    - name: archipelago-workers
      relationship: sync
      protocol: HTTP
      purpose: User presence and online status from stats service
      critical: false

    - name: places-api
      relationship: sync
      protocol: HTTP
      purpose: Scene and world place information
      critical: false

    - name: notifications-workers
      relationship: sync
      protocol: HTTP
      purpose: Email notifications for social events
      critical: false

    - name: rewards-server
      relationship: sync
      protocol: HTTP
      purpose: Send rewards for referral campaigns
      critical: false

  external:
    - name: PostgreSQL
      purpose: Communities, members, posts, friendships, social settings
      type: storage
    - name: Redis
      purpose: Caching for performance
      type: storage
    - name: NATS
      purpose: Real-time updates and events
      type: messaging
    - name: AWS S3
      purpose: Media storage for community images
      type: storage
    - name: AWS SNS
      purpose: Event notifications for social events
      type: messaging

events:
  publishes:
    - name: friendship_created
      description: New friendship established
      channel: NATS
      key_payload_fields:
        - user1
        - user2

  consumes: []

configuration:
  key_env_vars:
    - name: PG_COMPONENT_PSQL_HOST
      description: PostgreSQL host for social service database
      affects: Database connectivity

    - name: PG_COMPONENT_PSQL_DATABASE
      description: PostgreSQL database name
      affects: Database selection

    - name: NATS_URL
      description: NATS server URL for pub/sub messaging
      affects: Real-time event distribution

    - name: CATALYST_LAMBDAS_URL_LOADBALANCER
      description: Catalyst Lambdas load balancer URL
      affects: User profile and avatar data retrieval

    - name: CATALYST_URL
      description: Catalyst content server URL
      affects: Content and profile retrieval

    - name: ARCHIPELAGO_STATS_URL
      description: Archipelago stats service URL
      affects: User presence and online status

    - name: COMMS_GATEKEEPER_URL
      description: Comms gatekeeper service URL
      affects: Voice chat token generation

    - name: COMMS_GATEKEEPER_AUTH_TOKEN
      description: Authentication token for comms-gatekeeper
      affects: Service-to-service authentication

    - name: PLACES_API_URL
      description: Places API URL for place information
      affects: Scene and world place data

    - name: NOTIFICATION_SERVICE_URL
      description: Notifications service URL
      affects: Email notification delivery

    - name: NOTIFICATION_SERVICE_TOKEN
      description: Authentication token for notification service
      affects: Email sending authorization

    - name: REWARD_SERVER_URL
      description: Rewards server URL for referral campaigns
      affects: Reward distribution

    - name: EVENTS_API_URL
      description: Events API URL
      affects: Event-related features

    - name: PROFILE_URL
      description: Profile service URL
      affects: Profile data retrieval

    - name: AWS_S3_BUCKET
      description: S3 bucket for media storage
      affects: Community image storage

    - name: AWS_SNS_ARN
      description: SNS topic ARN for event publishing
      affects: Social event notifications

    - name: PRIVATE_VOICE_CHAT_EXPIRATION_TIME
      description: Private voice chat expiration time in milliseconds
      affects: Voice chat session lifecycle

    - name: API_ADMIN_TOKEN
      description: Admin API authentication token
      affects: Administrative endpoint access

    - name: OPEN_AI_API_KEY
      description: OpenAI API key for AI compliance features
      affects: Content moderation and AI features

    - name: HTTP_SERVER_PORT
      description: Main HTTP server port
      affects: REST API endpoint

    - name: RPC_SERVER_PORT
      description: RPC/gRPC server port
      affects: gRPC endpoint for friendships

adrs:
  - id: ADR-44
    title: Signed Fetch Authentication
    url: https://adr.decentraland.org/adr/ADR-44
    relevance: Authentication for REST endpoints
