schema_version: "1.1"

service:
  name: worlds-content-server
  display_name: Worlds Content Server
  description: Content server specifically for Decentraland Worlds (named scenes). Enables deployment and retrieval of world scenes identified by DCL names rather than parcel coordinates. Supports global portable experiences and single-scene loading.
  owner: core-engineering
  repository: https://github.com/decentraland/worlds-content-server
  language: typescript
  layer: content
  role:
    - content
    - storage
  data_domain:
    - worlds
    - world-permissions
  ai-agent-context: https://github.com/decentraland/worlds-content-server/blob/main/docs/ai-agent-context.md

domain:
  glossary:
    - term: World
      definition: Scene identified by a DCL name rather than parcel coordinates, supporting portable and single-scene experiences. A World is a fully isolated realm where users can only see and interact with other players within that same World.

    - term: Addressable URN
      definition: Entity URN format enabling global portable experiences and single-scene loading.

    - term: World Permissions
      definition: JSON configuration controlling deployment, access, and streaming permissions (allow-list, unrestricted, shared-secret, NFT ownership). These permissions control comms access (who can enter and interact), but scene content files are always publicly accessible.

    - term: Global Portable Experience
      definition: Experiences loaded for all users via GLOBAL_PX query parameter, enabling cross-world features like event calendars.

    - term: Single Scene
      definition: Loading a specific scene instead of Genesis City via SPACE query parameter, useful for testing and isolated experiences.

  concept_relationships:
    internal:
      - from: World
        to: World Permissions
        relationship: has_one
        description: Each world has permissions configuration controlling access

    cross_service:
      - local_concept: World
        remote_service: catalyst
        remote_concept: Scene Entity
        mapping_type: equivalent
        description: Worlds are scenes with DCL name identifiers instead of coordinates

      - local_concept: World
        remote_service: world-storage-service
        remote_concept: World Storage
        mapping_type: references
        description: Worlds can have associated storage managed by world-storage-service

  invariants:
    - rule: Deployer must own the DCL name specified in scene.json
      enforced_at: domain_layer
      severity: hard

    - rule: World name in scene.json must match owned DCL name
      enforced_at: domain_layer
      severity: hard

  responsibilities:
    - Store and serve World entity deployments
    - Validate deployment ownership against DCL names
    - Provide content retrieval API for world scenes
    - Support addressable URNs for portable experiences
    - Manage world permissions configurations
    - Act as LiveKit gatekeeper for World scenes (controls comms access via ACLs)
    - Provide /world/{name}/about endpoint for realm connection and configuration
    - Validate that deployer wallet owns the DCL name specified in scene.json

  out_of_scope:
    - Genesis City parcels (handled by Catalyst)
    - World storage and environment variables (handled by world-storage-service)
    - Scene execution (handled by client/renderer)
    - Comms gatekeeping for Genesis City (handled by comms-gatekeeper)

  owned_entities:
    - name: World
      description: Named scene with permissions and metadata
      persistence: postgres
      identity_field: name

api:
  openapi_url: https://github.com/decentraland/worlds-content-server/blob/main/docs/openapi.yaml

db:
  schema_url: https://github.com/decentraland/worlds-content-server/blob/main/docs/database-schema.md

dependencies:
  services:
    - name: social-service-ea
      relationship: sync
      protocol: HTTP
      purpose: Validates community membership for world access control
      critical: false

    - name: comms-gatekeeper
      relationship: sync
      protocol: HTTP
      purpose: Checks if users are banned from specific scenes in worlds
      critical: false

    - name: notifications-workers
      relationship: sync
      protocol: HTTP
      purpose: Sends notifications to users (optional)
      critical: false

  external:
    - name: PostgreSQL
      purpose: World metadata, permissions, blocked wallets
      type: storage
    - name: AWS S3 / Local Disk
      purpose: Entity content storage via @dcl/catalyst-storage
      type: storage
    - name: DCL Names
      purpose: Ownership validation for world names
      type: blockchain

events:
  publishes:
    - name: world_deployed
      description: New world entity deployed
      channel: Internal (consumed by asset-bundle-registry)
      key_payload_fields:
        - worldName
        - entityId

  consumes: []

configuration:
  key_env_vars:
    - name: STORAGE_FOLDER
      description: Root directory for local content storage
      affects: Content storage location

    - name: BUCKET
      description: AWS S3 bucket for content storage (alternative to local storage)
      affects: Content storage backend

    - name: PG_COMPONENT_PSQL_CONNECTION_STRING
      description: PostgreSQL connection string for world metadata database
      affects: Database connectivity

    - name: RPC_URL
      description: Ethereum RPC endpoint for blockchain queries
      affects: DCL name ownership validation

    - name: MARKETPLACE_SUBGRAPH_URL
      description: The Graph subgraph URL for marketplace data
      affects: NFT and collection queries

    - name: SOCIAL_SERVICE_URL
      description: URL for social-service-ea API
      affects: Community membership validation

    - name: SOCIAL_SERVICE_API_KEY
      description: API key for authenticating with social-service-ea
      affects: Community membership validation

    - name: COMMS_GATEKEEPER_URL
      description: URL for comms-gatekeeper service
      affects: User ban status checks

    - name: COMMS_GATEKEEPER_AUTH_TOKEN
      description: Authentication token for comms-gatekeeper
      affects: User ban status checks

    - name: LIVEKIT_HOST
      description: LiveKit server hostname for comms
      affects: Real-time communication

    - name: LIVEKIT_API_KEY
      description: LiveKit API key
      affects: LiveKit room creation

    - name: LIVEKIT_API_SECRET
      description: LiveKit API secret
      affects: LiveKit authentication

    - name: NATS_URL
      description: NATS server URL for pub/sub messaging
      affects: Event publishing to WebSocket connector

    - name: REDIS_HOST
      description: Redis connection string for rate limiting
      affects: Shared secret rate limiting

    - name: NAME_VALIDATOR
      description: Name validation strategy (DCL_NAME_CHECKER or ON_CHAIN_DCL_NAME_CHECKER)
      affects: DCL name ownership validation method

    - name: WHITELIST_URL
      description: URL for worlds whitelist configuration
      affects: Deployment restrictions

    - name: DENYLIST_JSON_URL
      description: URL for name denylist configuration
      affects: Name validation

    - name: AWS_SNS_ARN
      description: SNS topic ARN for publishing world events
      affects: Event publishing

    - name: AWS_SQS_QUEUE_URL
      description: SQS queue URL for consuming events
      affects: Event consumption

    - name: SCENE_EVICTION_TTL_MS
      description: Time to keep undeployed scenes before deletion (ms)
      affects: Scene lifecycle management

    - name: HTTP_SERVER_PORT
      description: HTTP server port
      affects: Server listening port

    - name: HTTP_BASE_URL
      description: Public base URL for the server
      affects: URL generation in responses

    - name: NOTIFICATION_SERVICE_URL
      description: URL for notification service (optional)
      affects: User notifications

    - name: NOTIFICATION_SERVICE_TOKEN
      description: Authentication token for notification service
      affects: Notification service authentication

    - name: LAMBDAS_URL
      description: Catalyst lambdas base URL
      affects: Catalyst integration

    - name: CONTENT_URL
      description: Catalyst content base URL
      affects: Content retrieval

    - name: MAX_PARCELS
      description: Maximum parcels per world deployment
      affects: Deployment validation

    - name: MAX_SIZE
      description: Maximum deployment size in MB
      affects: Deployment validation

    - name: ALLOW_SDK6
      description: Whether to allow SDK6 deployments
      affects: SDK version validation

    - name: DEPLOYMENT_TTL
      description: Time window for deployment timestamps (ms)
      affects: Deployment validation

    - name: BUILDER_URL
      description: Builder platform URL for builder integration
      affects: Builder service integration

    - name: ALLOW_ENS_DOMAINS
      description: Whether to allow ENS domain deployments
      affects: Deployment validation

    - name: AUTH_SECRET
      description: Secret for signing and verifying authentication tokens
      affects: Token-based authentication

    - name: ETH_NETWORK
      description: Ethereum network to use (mainnet, sepolia)
      affects: Blockchain network selection

    - name: GLOBAL_SCENES_URN
      description: URN for global scenes configuration
      affects: Global portable experiences

    - name: SCENES_URN
      description: URN for scenes configuration
      affects: Scene loading configuration

    - name: COMMS_ROOM_PREFIX
      description: Prefix for comms room names
      affects: LiveKit room naming for world comms

    - name: SCENE_ROOM_PREFIX
      description: Prefix for scene-specific room names
      affects: LiveKit room naming for scenes

    - name: ENS_MAX_SIZE
      description: Maximum deployment size for ENS domains (MB)
      affects: ENS domain deployment size limit

    - name: SHARED_SECRET_MAX_ATTEMPTS_PER_MINUTE
      description: Rate limit for shared secret authentication attempts per minute
      affects: Rate limiting for shared secret access

    - name: AWS_REGION
      description: AWS region for S3 and SNS/SQS services
      affects: AWS service configuration
