schema_version: "1.1"

service:
  name: "sites"
  display_name: "Sites"
  description: "Unified Decentraland web app consolidating the landing page, blog, reels, report, communities, storage, cast, jump deep-links, and whats-on (events/places) into a single Vite/React SPA. Routes include /, /blog, /reels, /report, /social/communities/:id, /storage, /cast/*, /jump, and /whats-on."
  owner: "decentraland-foundation"
  repository: "https://github.com/decentraland/sites"
  language: "typescript"
  layer: "presentation"
  role:
    - "client"
  data_domain: []
  ai-agent-context: "https://github.com/decentraland/sites/blob/main/docs/ai-agent-context.md"

domain:
  glossary:
    - term: "Per-section Contentful entry IDs"
      definition: "Each landing section is a distinct Contentful entry whose ID is stored in configuration (e.g., CONTENTFUL_HOMEPAGE_HERO_ID, CONTENTFUL_LANDING_MISSIONS_V2_ID, CONTENTFUL_LANDING_FAQ_ID). RTK Query endpoints read the relevant ID from config and call /entries/{id}."
      
    - term: "resolveLinks helper"
      definition: "Helper function that recursively resolves Contentful entries containing {sys: {type: 'Link'}} references into fully hydrated objects before passing them to mappers."
      
    - term: "Section mappers"
      definition: "Dedicated mapper functions (mapHero, mapMissions, mapFaq, mapBannerCta, mapSocialProof, mapTextMarquee, mapWhatsHot) that transform raw Contentful responses into typed domain objects."
      
    - term: "newUser param"
      definition: "URL query parameter (?newUser, ?newuser, ?new_user, ?new-user) that hides the navbar to create a clean onboarding experience for new users."
      
    - term: "DownloadOptions"
      definition: "Component that uses @dcl/hooks's useAdvancedUserAgentData to detect OS and CPU architecture, then resolves the appropriate Explorer download URL from explorerDownloads.ts."
      
    - term: "Lazy loading"
      definition: "Below-the-fold components (Missions, BannerCTA, TrendingNews, SocialProof, TextMarquee, Faqs) are dynamically imported via React.lazy + Suspense to reduce initial bundle size."

  concept_relationships:
    internal:
      - from: "Section mappers"
        to: "resolveLinks helper"
        relationship: "depends_on"
        description: "Section mappers use resolveLinks to hydrate Contentful references before transformation"
        
      - from: "DownloadOptions"
        to: "Landing Site"
        relationship: "belongs_to"
        description: "Landing page provides OS-aware Explorer download links"
        
      - from: "Lazy loading"
        to: "Landing Site"
        relationship: "belongs_to"
        description: "Below-the-fold sections are lazy-loaded to improve initial page load performance"

    cross_service:
      - local_concept: "Landing Content"
        remote_service: "contentful"
        remote_concept: "Entry"
        mapping_type: "equivalent"
        description: "All landing page content sections are stored as Contentful entries accessed via per-section entry IDs"
        
      - local_concept: "User Profile"
        remote_service: "catalyst"
        remote_concept: "Avatar Profile"
        mapping_type: "references"
        description: "Landing site fetches user avatar profiles from Catalyst's peer endpoint for authenticated contexts"

  invariants:
    - rule: "Each content section must have a valid Contentful entry ID configured"
      enforced_at: "domain_layer"
      severity: "hard"
      
    - rule: "Contentful linked references must be resolved before rendering"
      enforced_at: "domain_layer"
      severity: "hard"

  responsibilities:
    - Hero section with animated content and primary CTA (download or play in browser)
    - Missions section (experience / create / influence cards)
    - BannerCTA sections (e.g., "Create Your Avatar", "Start Exploring")
    - TrendingNews / "What's Hot" section (trending scenes and events)
    - SocialProof section
    - FAQ accordion
    - TextMarquee scrolling banner
    - DownloadOptions with OS/architecture detection (Windows/macOS, arm64/amd64)
    - Lazy-loaded below-the-fold sections (React Suspense + lazy)
    - Wallet-based authentication via Magic SDK and WalletConnect (wagmi/viem)
    - Sign-in redirect page
    - Segment analytics tracking
    - Feature flags support
    - i18n via react-intl
    - newUser query param support to hide navbar for onboarding flow
    - Blog with posts, categories, authors, and search (/blog)
    - Reels frontend for viewing and sharing user snapshots (/reels)
    - Report page for user/content reporting (/report)
    - Communities UI for discovering and managing communities (/social/communities/:id)
    - Storage frontend (/storage)
    - Cast2 live streaming interface (/cast/*)
    - Jump deep-link launch of Decentraland Explorer (/jump)
    - Whats-on unified events and places discovery (/whats-on)
    - Legal and policy pages (/terms, /privacy, /content, /ethics, /brand, /security)

  out_of_scope:
    - Marketplace or DAO features
    - Server-side rendering (Gatsby/Next.js is not used)
    - Image uploads or CMS content authoring

  owned_entities: []

api:
  openapi_url: ""

db:
  schema_url: ""

dependencies:
  services:
    - name: "catalyst"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Fetch user avatar profiles from peer endpoint for authenticated contexts"
      critical: false
      
    - name: "auth"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "SSO authentication for wallet connection and onboarding flows"
      critical: false

    - name: "camera-reel-service"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Fetch snapshot metadata, image URLs, and user gallery listings (/reels)"
      critical: false

    - name: "credits-server"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Query user credit balances (/social/communities)"
      critical: false

    - name: "events"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Fetch community events, event metadata for jump-in, and whats-on listings"
      critical: false

    - name: "notifications"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Fetch in-app notifications for the notification bell (/blog)"
      critical: false

    - name: "places"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Scene metadata, world name lookup, and place discovery (/jump, /whats-on)"
      critical: false

    - name: "social-service-ea"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Fetch and manage community data, memberships, and join requests (/social/communities)"
      critical: false

    - name: "urn-resolver"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Resolve wearable URNs for visible people in snapshots (/reels)"
      critical: false

    - name: "worlds-content-server"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "World metadata and health for ENS-based worlds (/jump)"
      critical: false

  external:
    - name: "Contentful CMS"
      purpose: "All landing page content sections (hero, missions, FAQ, banners, social proof, marquee, trending news) fetched at runtime via REST API using per-section entry IDs"
      type: "api"
      
    - name: "Magic SDK"
      purpose: "Email and social login provider for passwordless authentication and wallet creation"
      type: "api"
      
    - name: "WalletConnect"
      purpose: "Web3 wallet connection protocol for user authentication via wagmi/viem integration"
      type: "api"
      
    - name: "Segment"
      purpose: "Analytics tracking and user behavior monitoring with event tracking utilities"
      type: "api"

events:
  publishes: []
  consumes: []

configuration:
  feature_flags: []

  key_env_vars:
    - name: "VITE_REACT_APP_DCL_DEFAULT_ENV"
      description: "Determines which environment configuration to use (dev, stg, prod)"
      affects: "Application environment and configuration selection via @dcl/ui-env"
      
    - name: "CONTENTFUL_SPACE_ID"
      description: "Contentful space ID"
      affects: "CMS content fetching"
      
    - name: "CONTENTFUL_ENVIRONMENT"
      description: "Contentful environment (e.g., master)"
      affects: "CMS content fetching"
      
    - name: "CONTENTFUL_HOMEPAGE_HERO_ID"
      description: "Contentful entry ID for hero section"
      affects: "Hero section content rendering"
      
    - name: "CONTENTFUL_LANDING_MISSIONS_V2_ID"
      description: "Contentful entry ID for missions section"
      affects: "Missions section content rendering"
      
    - name: "CONTENTFUL_LANDING_FAQ_ID"
      description: "Contentful entry ID for FAQ section"
      affects: "FAQ section content rendering"
      
    - name: "CONTENTFUL_LANDING_CREATE_AVATAR_ID"
      description: "Contentful entry ID for Create Avatar banner"
      affects: "Create Avatar banner content rendering"
      
    - name: "CONTENTFUL_LANDING_START_EXPLORING_ID"
      description: "Contentful entry ID for Start Exploring banner"
      affects: "Start Exploring banner content rendering"
      
    - name: "CONTENTFUL_LANDING_WHATS_HOT_ID"
      description: "Contentful entry ID for What's Hot section"
      affects: "What's Hot section content rendering"
      
    - name: "CONTENTFUL_LANDING_MARQUEE_ID"
      description: "Contentful entry ID for text marquee"
      affects: "Text marquee content rendering"
      
    - name: "CONTENTFUL_LANDING_SOCIAL_PROOF_ID"
      description: "Contentful entry ID for social proof section"
      affects: "Social proof section content rendering"
      
    - name: "CONTENTFUL_LANDING_INVITE_HERO_ID"
      description: "Contentful entry ID for invite hero"
      affects: "Invite hero content rendering"
      
    - name: "AUTH_URL"
      description: "Decentraland SSO authentication service URL"
      affects: "User authentication flows and onboarding redirects"
      
    - name: "PEER_URL"
      description: "Decentraland Catalyst peer URL for profile operations"
      affects: "User avatar profile fetching and auth profile context"
      
    - name: "ONBOARDING_URL"
      description: "New-user onboarding URL"
      affects: "Onboarding flow routing"
      
    - name: "MAGIC_API_KEY"
      description: "Magic SDK publishable API key"
      affects: "Email and social login functionality"
      
    - name: "WALLET_CONNECT_PROJECT_ID"
      description: "WalletConnect project ID"
      affects: "Web3 wallet integration functionality"
      
    - name: "SEGMENT_KEY"
      description: "Segment analytics write key"
      affects: "Analytics tracking"

adrs: []
