schema_version: "1.1"

service:
  name: credits-server
  display_name: Credits Server
  description: Manages user credits system for Decentraland, integrating on-chain credit consumption tracking with off-chain credit grants. Handles credit issuance, tracking, expiration, and status calculation by combining database-stored grants with Squid indexer on-chain consumption data.
  owner: core-engineering
  repository: https://github.com/decentraland/credits-server
  language: typescript
  layer: feature-servers
  role:
    - gateway
  data_domain:
    - credits
    - seasons
    - goals
  ai-agent-context: https://github.com/decentraland/credits-server/blob/main/docs/ai-agent-context.md

domain:
  glossary:
    - term: Credit
      definition: Off-chain grant of MANA that users can spend in smart contracts. Includes cryptographic signature for on-chain verification and tracks consumption via Squid indexer.

    - term: Credit Season
      definition: Time-bounded period during which credits are valid, with defined expiration dates.

    - term: Credit Status
      definition: State of a credit (AVAILABLE, PARTIALLY_USED, FULLY_USED, EXPIRED) calculated by combining database grants with on-chain consumption.

  concept_relationships:
    internal:
      - from: Credit
        to: Credit Season
        relationship: belongs_to
        description: Credits are issued within seasons and expire at season end

  invariants:
    - rule: Credits must have valid cryptographic signatures for smart contract verification
      enforced_at: domain_layer
      severity: hard

    - rule: Available credit amount equals granted amount minus on-chain consumption
      enforced_at: domain_layer
      severity: hard

  responsibilities:
    - Grant credits to users with cryptographic signatures
    - Track credit status by combining database and on-chain data
    - Manage credit seasons with expiration dates
    - Calculate available credit amounts
    - Integrate with Squid indexer for consumption tracking
    - Sign credits for smart contract verification

  out_of_scope:
    - On-chain credit consumption (handled by smart contracts)
    - Blockchain indexing (handled by Squid indexer)

  owned_entities:
    - name: Credit
      description: Off-chain credit grant with signature
      persistence: postgres
      identity_field: uuid

api:
  openapi_url: https://github.com/decentraland/credits-server/blob/main/docs/openapi.yaml

dependencies:
  services:
    - name: events
      relationship: sync
      protocol: HTTP
      purpose: Fetches Decentraland events for event-attendance goals
      critical: false

    - name: archipelago-workers
      relationship: sync
      protocol: HTTP
      purpose: Queries peer presence for scene visit verification
      critical: false

  external:
    - name: PostgreSQL
      purpose: Credits grants, seasons, goals, progress, and Squid indexer consumption data
      type: storage

    - name: Redis
      purpose: Optional caching layer for performance optimization
      type: storage

    - name: AWS SQS
      purpose: Queue for asynchronous processing
      type: messaging

    - name: AWS SNS
      purpose: Event publishing for notifications
      type: messaging

    - name: Slack
      purpose: Notifications and alerts for credit operations
      type: other

    - name: Ethereum RPC
      purpose: ENS resolution and blockchain interaction
      type: blockchain

    - name: Polygon RPC
      purpose: Credit contract interaction for season data
      type: blockchain

    - name: 0xSquid SDK
      purpose: Cross-chain credit routing functionality
      type: api

events:
  publishes: []
  consumes: []

configuration:
  key_env_vars:
    - name: HTTP_SERVER_PORT
      description: Port on which the HTTP server listens
      affects: Service availability and routing

    - name: HTTP_SERVER_HOST
      description: Host address for the HTTP server
      affects: Service network binding

    - name: ENV
      description: Environment name (local/dev/prod) affects behavior
      affects: Environment-specific configuration

    - name: PG_COMPONENT_PSQL_CONNECTION_STRING
      description: PostgreSQL connection string (alternative to individual components)
      affects: Database connection

    - name: PG_COMPONENT_PSQL_USER
      description: PostgreSQL user
      affects: Database authentication

    - name: PG_COMPONENT_PSQL_DATABASE
      description: PostgreSQL database name
      affects: Database connection

    - name: PG_COMPONENT_PSQL_PORT
      description: PostgreSQL port
      affects: Database connection

    - name: PG_COMPONENT_PSQL_HOST
      description: PostgreSQL host
      affects: Database connection

    - name: PG_COMPONENT_PSQL_PASSWORD
      description: PostgreSQL password
      affects: Database authentication

    - name: NOTIFICATIONS_PG_COMPONENT_PSQL_CONNECTION_STRING
      description: Notifications PostgreSQL connection string (alternative to individual components)
      affects: Notifications database connection

    - name: NOTIFICATIONS_PG_COMPONENT_PSQL_USER
      description: Notifications PostgreSQL user
      affects: Notifications database authentication

    - name: NOTIFICATIONS_PG_COMPONENT_PSQL_DATABASE
      description: Notifications PostgreSQL database name
      affects: Notifications database connection

    - name: NOTIFICATIONS_PG_COMPONENT_PSQL_PORT
      description: Notifications PostgreSQL port
      affects: Notifications database connection

    - name: NOTIFICATIONS_PG_COMPONENT_PSQL_HOST
      description: Notifications PostgreSQL host
      affects: Notifications database connection

    - name: NOTIFICATIONS_PG_COMPONENT_PSQL_PASSWORD
      description: Notifications PostgreSQL password
      affects: Notifications database authentication

    - name: PRIVATE_KEY
      description: Private key for credit signature generation
      affects: Credit cryptographic signing

    - name: CHAIN_ID
      description: Blockchain chain ID for credit operations (137 for Polygon)
      affects: Blockchain network selection

    - name: READ_ONLY_ADMIN_ADDRESSES
      description: Comma-separated list of read-only admin addresses
      affects: Authorization for read operations

    - name: READ_WRITE_ADMIN_ADDRESSES
