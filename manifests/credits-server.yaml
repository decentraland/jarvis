      affects: Authorization for write operations

    - name: AWS_SQS_QUEUE_URL
      description: AWS SQS queue URL for asynchronous processing
      affects: Queue-based task processing

    - name: AWS_SNS_ARN
      description: AWS SNS topic ARN for event publishing
      affects: Event publishing

    - name: BUCKET
      description: S3 bucket name for storage
      affects: Asset and data storage

    - name: BUCKET_ENDPOINT
      description: S3 bucket endpoint URL
      affects: S3 connection

    - name: AWS_REGION
      description: AWS region for S3 and other AWS services
      affects: AWS service routing

    - name: REDIS_HOST
      description: Redis host URL for caching (optional)
      affects: Caching performance

    - name: CREDITS_SERVER_URL
      description: Public URL of this service for SSE and external references
