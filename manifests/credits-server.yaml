      affects: Security for external call signatures

    - name: VALID_SELECTORS_TO_SIGN
      description: Comma-separated list of valid function selectors for external call signing
      affects: Security for external call signatures

    - name: API_ADMIN_TOKEN
      description: Admin API token for administrative endpoints
      affects: Admin API security

    - name: GRANTER_API_ADMIN_TOKEN
