schema_version: "1.1"

service:
  name: comms-gatekeeper
  display_name: Comms Gatekeeper
  description: Acts as the guardian of LiveKit tokens within Decentraland's communication architecture. Processes signed fetch requests from clients and generates tokens that grant access to LiveKit rooms dedicated to specific scenes or worlds. Manages scene administration, streaming access, voice chat, and user moderation. Issues LiveKit tokens as the mandatory credential for any client to enter the Genesis City platform and interact with other players.
  owner: core-engineering
  repository: https://github.com/decentraland/comms-gatekeeper
  language: typescript
  layer: real-time
  role:
    - auth
    - gateway
  data_domain:
    - scene-administration
    - streaming-access
    - scene-bans
    - voice-chat
  ai-agent-context: https://github.com/decentraland/comms-gatekeeper/blob/main/docs/ai-agent-context.md

domain:
  glossary:
    - term: LiveKit Token
      definition: Secure JWT token granting access to a specific LiveKit room for voice/video communication. Tokens include permissions, expiration, and user identity. This is the mandatory credential for any client to enter Genesis City and interact with other players — no token, no access.

    - term: Scene Administration
      definition: Permission system allowing designated users to manage access control, ban users, and control streaming in specific scenes.

    - term: Streaming Access
      definition: RTMP streaming URLs and keys granted to content creators for broadcasting to scenes, with time-to-live expiration.

    - term: Request-to-Speak
      definition: Moderation mechanism in community voice chats where users request permission from admins to speak.

    - term: Scene Ban
      definition: Administrative action blocking a user from accessing communication channels in a specific scene.

    - term: Platform Ban
      definition: A platform-level ban permanently blocks a user from obtaining any LiveKit token from comms-gatekeeper. Because a token is required to enter any Genesis City room, a platform-banned user is effectively excluded from all real-time interaction in Genesis City. Bans are stored in the scene_bans table (scene-scoped) and enforced synchronously at token issuance time — the request is rejected before any LiveKit call is made.

    - term: Genesis City Access Control
      definition: Comms Gatekeeper is the access authority for player-to-player interaction in Genesis City. It controls access to both scene-specific LiveKit rooms and island rooms managed by Archipelago. Without a valid token from this service, clients cannot join LiveKit rooms and interact with other players in Genesis City. This role is scoped to Genesis City only — Worlds use worlds-content-server for access control.

    - term: LiveKit Rooms
      definition: Each scene/world gets a dedicated LiveKit room identified by a room name (e.g., scene:realm:sceneId). The service controls access to both scene-specific LiveKit rooms (tied to a particular scene/parcel) and island rooms (the dynamic clustering rooms managed by Archipelago).

  concept_relationships:
    internal:
      - from: LiveKit Token
        to: Scene
        relationship: references
        description: Each LiveKit token grants access to a specific scene's communication room

      - from: Scene Administration
        to: Scene
        relationship: belongs_to
        description: Scene admins have permissions for specific scenes

      - from: Streaming Access
        to: Scene
        relationship: references
        description: Streaming access is granted per scene with TTL expiration

      - from: Scene Ban
        to: Scene
        relationship: belongs_to
        description: Bans are scoped to specific scenes

      - from: Platform Ban
        to: LiveKit Token
        relationship: blocks
        description: Platform bans prevent token issuance, effectively blocking all Genesis City access

    cross_service:
      - local_concept: LiveKit Token
        remote_service: comms-message-sfu
        remote_concept: Room Access
        mapping_type: projects_as
        description: LiveKit tokens enable access to LiveKit rooms managed by comms-message-sfu

      - local_concept: Scene
        remote_service: catalyst
        remote_concept: Scene Entity
        mapping_type: references
        description: Scene information is fetched from Catalyst for validation

      - local_concept: Scene
        remote_service: places-api
        remote_concept: Place
        mapping_type: equivalent
        description: Scene metadata is enriched with place information

  invariants:
    - rule: LiveKit tokens must expire after a configured TTL
      enforced_at: domain_layer
      severity: hard

    - rule: Only scene admins can ban users from scenes
      enforced_at: api_validation
      severity: hard

    - rule: Streaming access must have expiration timestamp
      enforced_at: database
      severity: hard

    - rule: Scene bans must be validated before token generation
      enforced_at: domain_layer
      severity: hard

    - rule: Platform bans are enforced synchronously at token issuance time before any LiveKit call is made
      enforced_at: domain_layer
      severity: hard

  responsibilities:
    - Issues LiveKit tokens that are the mandatory credential for any client to enter the Genesis City platform and interact with other players
    - Enforces platform-level user bans at connection time - banned users are rejected during token issuance and cannot re-enter any Genesis City room
    - Generates secure LiveKit tokens for scene/world-specific communication rooms
    - Controls access to both scene-specific LiveKit rooms and island rooms (dynamic clustering rooms managed by Archipelago)
    - Manages scene administration permissions (add/remove admins, ban users from individual scenes)
    - Provides RTMP streaming URLs and keys for content creators
    - Supports private voice chat sessions between users
    - Implements community voice chat with speaker management and request-to-speak functionality
    - Manages streaming access lifecycle with expiration and TTL
    - Handles user privacy settings and access control
    - Integrates with LiveKit webhooks for real-time event handling (room created/destroyed, participant joined/left)

  out_of_scope:
    - Actual voice/video streaming (handled by LiveKit)
    - Island clustering logic (handled by archipelago-workers)
    - Message routing and validation (handled by comms-message-sfu)
    - Content moderation of messages (handled by police-server)
    - Access control for Worlds (handled by worlds-content-server — Worlds may use separate LiveKit infrastructure)

  owned_entities:
    - name: Scene Admin
      description: User with administrative permissions for a scene
      persistence: postgres
      identity_field: composite (scene_id, eth_address)

    - name: Scene Stream Access
      description: RTMP streaming credentials for a scene
      persistence: postgres
      identity_field: id

    - name: Scene Ban
      description: User banned from scene communication
      persistence: postgres
      identity_field: composite (scene_id, eth_address)

    - name: Voice Chat User
      description: Participant in private or community voice chat
      persistence: postgres
      identity_field: composite (room_id, eth_address)

api:
  openapi_url: https://github.com/decentraland/comms-gatekeeper/blob/main/docs/openapi.yaml

db:
  schema_url: https://github.com/decentraland/comms-gatekeeper/blob/main/docs/database-schemas.md

dependencies:
  services:
    - name: catalyst
      relationship: sync
      protocol: HTTP
      purpose: Fetches scene metadata from content server via dcl-catalyst-client and validates DCL name ownership via Lambdas
      critical: true

    - name: worlds-content-server
      relationship: sync
      protocol: HTTP
      purpose: Fetches world permissions, scene data, and validates world access controls
      critical: true

    - name: places-api
      relationship: sync
      protocol: HTTP
      purpose: Enriches scene and world information with place metadata and status
      critical: false

    - name: social-service-ea
      relationship: sync
      protocol: HTTP
      purpose: Retrieves user privacy settings for voice chat and communication
      critical: false

    - name: notifications-workers
      relationship: sync
      protocol: HTTP
      purpose: Sends notifications to scene admins for streaming and moderation events
      critical: false

  external:
    - name: PostgreSQL
      purpose: Scene administration, streaming access, voice chat users, and ban records
      type: storage

    - name: LiveKit
      purpose: Real-time voice communication infrastructure for token generation and room management
      type: other

    - name: AWS SNS
      purpose: Event notifications for streaming and communication events
      type: messaging

events:
  publishes:
    - name: streaming_access_granted
      description: Published when streaming access is granted to a user
      channel: AWS SNS
      key_payload_fields:
        - sceneId
        - ethAddress
        - expiresAt

    - name: CommunityStreamingEnded
      description: Published when a community streaming session ends
      channel: AWS SNS
      key_payload_fields:
        - communityId
        - totalParticipants

    - name: PARTICIPANT_JOINED_ROOM
      description: Published when a participant joins a LiveKit room
      channel: AWS SNS
      key_payload_fields:
        - room
        - address

    - name: PARTICIPANT_LEFT_ROOM
      description: Published when a participant leaves a LiveKit room
      channel: AWS SNS
      key_payload_fields:
        - room
        - address
        - reason

    - name: SCENE_BAN_ADDED
      description: Published when a user is banned from a scene
      channel: AWS SNS
      key_payload_fields:
        - place_id
        - banned_address
        - banned_by
        - banned_at
        - scene_id
        - parcel
        - realm_name

    - name: SCENE_BAN_REMOVED
      description: Published when a user is unbanned from a scene
      channel: AWS SNS
      key_payload_fields:
        - place_id
        - banned_address
        - unbanned_by
        - unbanned_at
        - scene_id
        - parcel
        - realm_name

  consumes: []

configuration:
  key_env_vars:
    - name: PG_COMPONENT_PSQL_HOST
      description: PostgreSQL host for gatekeeper database
      affects: Database connectivity

    - name: PG_COMPONENT_PSQL_PORT
      description: PostgreSQL port for gatekeeper database
      affects: Database connectivity

    - name: PG_COMPONENT_PSQL_DATABASE
      description: PostgreSQL database name
      affects: Database selection

    - name: PG_COMPONENT_PSQL_USER
      description: PostgreSQL user for authentication
      affects: Database authentication

    - name: PG_COMPONENT_PSQL_PASSWORD
      description: PostgreSQL password for authentication
      affects: Database authentication

    - name: PROD_LIVEKIT_HOST
      description: Production LiveKit server host URL
      affects: Token generation for production environments

    - name: PROD_LIVEKIT_API_KEY
      description: Production LiveKit API key
      affects: Production token generation

    - name: PROD_LIVEKIT_API_SECRET
      description: Production LiveKit API secret
      affects: Production token signing

    - name: PREVIEW_LIVEKIT_HOST
      description: Preview/staging LiveKit server host URL
      affects: Token generation for preview environments

    - name: PREVIEW_LIVEKIT_API_KEY
      description: Preview LiveKit API key
      affects: Preview token generation

    - name: PREVIEW_LIVEKIT_API_SECRET
      description: Preview LiveKit API secret
      affects: Preview token signing

    - name: WORLD_CONTENT_URL
      description: URL for worlds-content-server API
      affects: World permissions and scene data retrieval

    - name: CATALYST_CONTENT_URL
      description: URL for Catalyst content server
      affects: Scene entity metadata retrieval

    - name: PLACES_API_URL
      description: URL for Places API
      affects: Place metadata and status retrieval

    - name: SOCIAL_SERVICE_URL
      description: URL for social-service-ea API
      affects: User privacy settings retrieval

    - name: NOTIFICATION_SERVICE_URL
      description: URL for notifications service
      affects: Sending notifications to scene admins

    - name: NOTIFICATION_SERVICE_TOKEN
      description: Authentication token for notifications service
      affects: Notification delivery authorization

    - name: LAMBDAS_URL
      description: Catalyst Lambdas URL for DCL name ownership validation
      affects: World ownership verification

    - name: DENYLIST_JSON_URL
      description: URL for denylist configuration
      affects: User and address filtering

    - name: COMMS_GATEKEEPER_AUTH_TOKEN
      description: Service-to-service authentication token
      affects: Inbound service authentication

    - name: AWS_SNS_ARN
      description: SNS topic ARN for event publishing
      affects: Event notification delivery

    - name: AWS_SNS_ENDPOINT
      description: AWS SNS endpoint URL for custom configurations
      affects: SNS service endpoint

    - name: VOICE_CHAT_CONNECTION_INTERRUPTED_TTL
      description: Voice chat connection interrupted TTL in milliseconds
      affects: Session expiration for interrupted connections

    - name: VOICE_CHAT_INITIAL_CONNECTION_TTL
      description: Voice chat initial connection TTL in milliseconds
      affects: Session expiration for new connections

    - name: COMMUNITY_VOICE_CHAT_NO_MODERATOR_TTL
      description: Community voice chat timeout when no moderator present (ms)
      affects: Moderation enforcement

    - name: VOICE_CHAT_EXPIRED_BATCH_SIZE
      description: Batch size for expired voice chat cleanup
      affects: Voice chat cleanup performance

    - name: COMMS_ROOM_PREFIX
      description: Prefix for LiveKit room names
      affects: Room naming convention

    - name: SCENE_ROOM_PREFIX
      description: Prefix for scene-specific LiveKit room names
      affects: Scene room naming convention

    - name: WORLD_ROOM_PREFIX
      description: Prefix for world-specific LiveKit room names
      affects: World room naming convention

    - name: PRIVATE_MESSAGES_ROOM_ID
      description: Room ID for private messages
      affects: Private messaging room identification

    - name: AUTHORITATIVE_SERVER_ADDRESS
      description: Public address for signed-fetch validation
      affects: ADR-44 authentication validation

    - name: SERVICE_BASE_URL
      description: Public base URL for the comms-gatekeeper service
      affects: Service URL construction and callback URLs

    - name: HTTP_SERVER_PORT
      description: HTTP server port
      affects: Server listening port

    - name: HTTP_SERVER_HOST
      description: HTTP server host
      affects: Server listening address

    - name: CAST2_URL
      description: URL for Cast service
      affects: Streaming integration

    - name: ENV
      description: Environment name (dev, stg, prod)
      affects: Environment-specific configuration

    - name: LOG_LEVEL
      description: Logging level (OFF, DEBUG, INFO, WARN, ERROR)
      affects: Log verbosity

    - name: ANALYTICS_CONTEXT
      description: Analytics context identifier
      affects: Analytics tagging

    - name: ANALYTICS_API_URL
      description: Analytics service URL
      affects: Analytics event delivery

    - name: ANALYTICS_API_TOKEN
      description: Analytics authentication token
      affects: Analytics authorization

    - name: WKC_METRICS_RESET_AT_NIGHT
      description: Whether to reset metrics at 00:00 UTC
      affects: Metrics behavior

    - name: CONTENT_CLIENT_CACHE_MAX
      description: Maximum number of entries in content client cache
      affects: Content client cache size

    - name: CONTENT_CLIENT_CACHE_TTL
      description: TTL for content client cache entries in milliseconds
      affects: Content client cache expiration

    - name: MODERATOR_TOKEN
      description: Token for moderator authentication (alternative to wallet signature)
      affects: Moderator authentication and authorization

adrs:
  - id: ADR-44
    title: Signed Fetch Authentication
    url: https://adr.decentraland.org/adr/ADR-44
    relevance: Defines authentication mechanism for all API endpoints
