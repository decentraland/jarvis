schema_version: "1.1"

service:
  name: dao-landing
  display_name: Decentraland DAO Landing
  description: Static marketing and informational page (served at dao.decentraland.org) for the Decentraland DAO. Introduces the DAO to new and existing community members, explains how governance works, visualises treasury and voting power data, and funnels visitors toward the full governance application. It does not support proposal creation or voting directly.
  owner: dapps
  repository: https://github.com/decentraland/dao-landing
  language: typescript
  layer: Feature Servers Layer
  role:
    - client
  data_domain: []
  ai-agent-context: https://github.com/decentraland/dao-landing/blob/master/docs/ai-agent-context.md

domain:
  glossary:
    - term: Proposal
      definition: Community governance proposal submitted to the Decentraland DAO for voting

    - term: Project
      definition: Grant-funded initiative tracked from proposal through completion

    - term: Vesting
      definition: Scheduled token release for grant recipients or contributors

    - term: VP Distribution
      definition: Voting power distribution breakdown showing sources (MANA, LAND, wearables, delegation, etc.)

    - term: Newsletter Subscription
      definition: User signup for DAO governance and project updates via email

  concept_relationships:
    internal:
      - from: Proposal
        to: Project
        relationship: transitions_to
        description: Approved grant proposals become tracked projects

      - from: Vesting
        to: Project
        relationship: belongs_to
        description: Vesting schedules are associated with grant projects

    cross_service:
      - local_concept: Proposal
        remote_service: governance
        remote_concept: Proposal
        mapping_type: equivalent
        description: Proposals are fetched from governance service API

      - local_concept: VP Distribution
        remote_service: governance
        remote_concept: Snapshot Voting Power
        mapping_type: projects_as
        description: Voting power data sourced from governance snapshot system

  invariants: []

  responsibilities:
    - Hero section with animated background and primary call-to-action
    - What is the DAO explainer with live proposal previews fetched from Governance API
    - Animated proposal carousel with infinite horizontal scroll via Framer Motion
    - How Does It Work step-by-step guide
    - Voting Power distribution pie chart per wallet address
    - VP carousel showcasing delegate/user VP breakdowns
    - Treasury section - live DAO treasury balance and 10-year vesting contract progress
    - Big CTA section linking to governance.decentraland.org
    - Newsletter subscription via Governance API
    - Footer with links to community resources (Discord, Forum, blog)
    - SEO head management and analytics integration

  out_of_scope:
    - Proposal creation, editing, or voting (handled by governance-ui at governance.decentraland.org)
    - Detailed transparency dashboards (handled by governance-ui transparency page)
    - User authentication (handled by auth)
    - Account management (handled by account)

  owned_entities: []

api:
  openapi_url: ""

db:
  schema_url: ""

dependencies:
  services:
    - name: governance
      relationship: sync
      protocol: HTTP
      purpose: Fetch proposals, projects, vesting data, VP distribution, and newsletter subscriptions
      critical: true

    - name: catalyst
      relationship: sync
      protocol: HTTP
      purpose: Fetch user profile information via PEER_URL
      critical: false

    - name: credits-server
      relationship: sync
      protocol: HTTP
      purpose: Credits integration (referenced in config but not actively used)
      critical: false

    - name: auth
      relationship: sync
      protocol: HTTP
      purpose: User authentication redirects
      critical: false

  external:
    - name: Transparency API
      purpose: DAO treasury balances and team/committee information from data.decentraland.vote
      type: api

    - name: Vesting Contract
      purpose: 10-year vesting contract data from hardcoded address 0x7a3abf8897f31b56f09c6f69d074a393a905c1ac
      type: blockchain

    - name: Segment
      purpose: Analytics and user behavior tracking
      type: api

    - name: Ethereum RPC
      purpose: Blockchain interaction for voting power and vesting queries
      type: blockchain

events:
  publishes: []
  consumes: []

configuration:
  feature_flags: []
  
  key_env_vars:
    - name: VITE_REACT_APP_DCL_DEFAULT_ENV
      description: Active environment (dev or prod) selected at build time - no staging environment defined
      affects: Configuration selection from config/env/*.json

    - name: CHAIN_ID
      description: Ethereum chain ID (1 = mainnet)
      affects: Blockchain network selection

    - name: PEER_URL
      description: Catalyst peer URL for profile data and identity module
      affects: User profile resolution

    - name: ENVIRONMENT
      description: Deployment environment identifier (production, dev)
      affects: Environment-specific configuration and logging

    - name: AUTH_URL
      description: Authentication service path (relative /auth)
      affects: User authentication redirect

    - name: LANDING_URL
      description: Canonical URL for this DAO landing site
      affects: SEO and self-referential links

    - name: SEGMENT_API_KEY
      description: Segment analytics write key
      affects: Analytics tracking

    - name: CREDITS_SERVER_URL
      description: Credits server URL (referenced in config but not actively used in landing flows)
      affects: Credits integration

adrs: []
