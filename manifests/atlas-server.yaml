schema_version: "1.1"

service:
  name: atlas-server
  display_name: Atlas Server
  description: Provides REST API for querying Decentraland's Genesis City map data (parcels, estates, districts) and generating map visualizations as PNG images. Serves as the data layer for the Decentraland Atlas interface.
  owner: core-engineering
  repository: https://github.com/decentraland/atlas-server
  language: typescript
  layer: feature-servers
  role:
    - gateway
  data_domain:
    - map-tiles
    - estates
    - districts
  ai-agent-context: https://github.com/decentraland/atlas-server/blob/main/docs/ai-agent-context.md

domain:
  glossary:
    - term: Tile
      definition: A single parcel coordinate on the Genesis City map with ownership, type (owned/unowned/plaza/road/district), and connectivity metadata.
      examples:
        - Parcel at coordinate 10,10 owned by an Ethereum address
      not_to_be_confused_with: Estate (which is a collection of parcels)

    - term: Estate
      definition: A collection of adjacent parcels owned by the same entity, represented as an NFT on the Ethereum blockchain.

    - term: District
      definition: A named region in Genesis City consisting of multiple parcels, often with a specific theme or purpose.
      examples:
        - Fashion Street
        - Dragon City

    - term: Contribution
      definition: Record of parcels contributed by an address to a specific district during the initial land auction.

  concept_relationships:
    internal:
      - from: Estate
        to: Tile
        relationship: has_many
        description: An Estate is composed of one or more adjacent Tiles

      - from: District
        to: Tile
        relationship: contains
        description: A District encompasses multiple Tiles in a geographic region

      - from: Contribution
        to: District
        relationship: references
        description: Contributions track parcel donations to Districts by address

    cross_service:
      - local_concept: Tile
        remote_service: marketplace-server
        remote_concept: Parcel Listing
        mapping_type: references
        description: Tiles can reference marketplace listings when parcels are on sale

  invariants:
    - rule: Tiles must have unique coordinate pairs (x, y)
      enforced_at: database
      severity: hard

    - rule: Estate tiles must be adjacent to at least one other tile in the same estate
      enforced_at: domain_layer
      severity: hard

  responsibilities:
    - Serve tile data for Genesis City parcels with ownership and metadata
    - Generate PNG map visualizations with customizable parameters
    - Provide OpenSea-compatible metadata for parcels and estates
    - Cache map tiles in S3 for performance
    - Query The Graph subgraph for blockchain ownership data
    - Support spatial queries with bounding box filters

  out_of_scope:
    - Blockchain transactions for land purchases (handled by marketplace contracts)
    - Content deployed to parcels (handled by Catalyst)
    - Real-time user positions (handled by Archipelago)
    - World (non-Genesis) map data (handled by worlds services)

  owned_entities:
    - name: Tile
      description: Parcel coordinate with ownership and metadata
      persistence: postgres
      identity_field: "id"

    - name: Map Image Cache
      description: Generated PNG map visualizations
      persistence: s3
      identity_field: cacheKey

api:
  openapi_url: https://github.com/decentraland/atlas-server/blob/main/docs/openapi.yaml

db:
  schema_url: ""

dependencies:
  services:
    - name: signatures-server
      relationship: sync
      protocol: HTTP
      purpose: Rentals signature validation
      critical: false

  external:
    - name: PostgreSQL
      purpose: Tile metadata, ownership data storage
      type: storage

    - name: AWS S3
      purpose: Cached map tiles and generated PNG images
      type: storage

    - name: The Graph (Decentraland Marketplace Subgraph)
      purpose: Blockchain indexer for parcel ownership, marketplace listings, contributions
      type: api

events:
  publishes: []
  consumes: []

configuration:
  key_env_vars:
    - name: HTTP_SERVER_PORT
      description: Port on which the HTTP server listens (default 5000)
      affects: Server binding

    - name: HTTP_SERVER_HOST
      description: Host address for the HTTP server (default 0.0.0.0)
      affects: Server binding

    - name: CORS_ORIGIN
      description: Allowed CORS origins for cross-origin requests (default *)
      affects: Cross-origin request security

    - name: CORS_METHOD
      description: Allowed CORS methods (default *)
      affects: Cross-origin request handling

    - name: SUBGRAPH_URL
      description: The Graph subgraph URL for blockchain data (parcels, estates, marketplace)
      affects: Ownership and marketplace data accuracy

    - name: SUBGRAPH_COMPONENT_QUERY_TIMEOUT
      description: Timeout in milliseconds for subgraph queries (default 30000)
      affects: Query performance and timeout handling

    - name: CHAIN_ID
      description: Ethereum chain ID (1 for mainnet)
      affects: Blockchain network selection

    - name: API_BATCH_SIZE
      description: Batch size for API queries (default 1000)
      affects: Query performance and pagination

    - name: API_CONCURRENCY
      description: Number of concurrent API requests (default 5)
      affects: Query performance and resource usage

    - name: REFRESH_INTERVAL
      description: Interval in seconds for data refresh (default 60)
      affects: Data freshness and cache updates

    - name: ATLAS_SERVER_URL
      description: Public URL of this atlas server (for URL generation)
      affects: Generated URLs and redirects

    - name: SIGNATURES_SERVER_URL
      description: Signatures validation server URL for rentals
      affects: Rentals signature verification

    - name: FF_URL
      description: Feature flags service URL
      affects: Feature flag configuration

    - name: AWS_S3_REGION
      description: AWS S3 region for map tile storage (default us-east-1)
      affects: S3 connectivity

    - name: AWS_ACCESS_KEY_ID
      description: AWS access key for S3 access
      affects: S3 authentication

    - name: AWS_SECRET_ACCESS_KEY
      description: AWS secret key for S3 access
      affects: S3 authentication

    - name: AWS_S3_BUCKET
      description: S3 bucket name for caching map tiles and images
      affects: Storage location

    - name: AWS_S3_ENDPOINT
      description: Custom S3 endpoint (for MinIO or custom S3)
      affects: S3 connectivity

    - name: CDN_URL
      description: CDN URL for serving cached images
      affects: Image delivery performance

    - name: LAND_CONTRACT_ADDRESS
      description: Ethereum LAND contract address
      affects: Blockchain contract queries

    - name: ESTATE_CONTRACT_ADDRESS
      description: Ethereum Estate contract address
      affects: Blockchain contract queries

    - name: IMAGE_BASE_URL
      description: Base URL for generated map images
      affects: Image URL generation

    - name: EXTERNAL_BASE_URL
      description: External base URL for API endpoints
      affects: API URL generation
