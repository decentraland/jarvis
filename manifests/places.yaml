schema_version: "1.1"

service:
  name: "places"
  display_name: "Decentraland Places Service"
  description: "A comprehensive API service for discovering, managing, and interacting with places in the Decentraland metaverse. Processes deployment notifications from Catalyst and World Content Servers, maintaining a searchable database of scenes (Genesis City) and worlds (private virtual spaces), with place discovery, user interactions (likes/favorites), category management, and real-time activity tracking."
  owner: "decentraland-foundation"
  repository: "https://github.com/decentraland/places"
  language: "typescript"
  layer: "feature"
  role:
    - "gateway"
    - "worker"
  data_domain:
    - "places"
    - "worlds"
    - "categories"
    - "user_favorites"
    - "user_likes"
  ai-agent-context: "https://github.com/decentraland/places/blob/master/docs/ai-agent-context.md"

domain:
  glossary:
    - term: "Place"
      definition: "A scene in Genesis City located at specific parcel coordinates, representing a visitable location in the main Decentraland world."
      examples:
        - "A scene at coordinates 10,20"
      not_to_be_confused_with: "World"
    - term: "World"
      definition: "A private virtual space accessed via unique URLs outside Genesis City, with its own namespace and content."
      examples:
        - "myworld.dcl.eth"
      not_to_be_confused_with: "Place"
    - term: "Base Position"
      definition: "The primary parcel coordinate where users spawn when entering a scene. Critical for Place UUID persistence logic per ADR-186."
      examples:
        - "0,0 for a scene starting at origin"
      not_to_be_confused_with: ""
    - term: "Positions Array"
      definition: "All parcel coordinates occupied by a scene. Format 'x,y' with range -150 to 150. Used for UUID persistence checks per ADR-186."
      examples:
        - "['0,0', '0,1', '1,0', '1,1'] for a 2x2 scene"
      not_to_be_confused_with: "Base Position"
    - term: "Place UUID (ADR-186)"
      definition: "Persistent identifier for a place that survives deployments when parcel coverage or base parcel remain consistent. Ensures favorites/likes/social data persist across scene updates."
      examples:
        - "UUID preserved: scene expands from 1x1 to 2x2"
        - "UUID preserved: parcels change but base parcel stays same"
        - "UUID changes: both parcels AND base parcel change"
      not_to_be_confused_with: ""
    - term: "Like Score"
      definition: "VP-weighted quality metric (0-1) based on Decentraland voting power from Snapshot. Aggregates user likes with voting power weighting."
      examples: []
      not_to_be_confused_with: "User Likes count"
    - term: "Content Rating"
      definition: "Age-appropriate classification for place content: PR (10+), E (all ages), T (13+), A (18+), R (18+ explicit)."
      examples:
        - "E for family-friendly art gallery"
        - "A for nightclub with mature themes"
      not_to_be_confused_with: ""
    - term: "Hot Scene"
      definition: "A place with active users currently present, tracked via Catalyst realm provider with real-time user counts."
      examples: []
      not_to_be_confused_with: "User Visits"
    - term: "User Visits"
      definition: "Count of unique users who visited a place in the last 30 days. Different from real-time user count."
      examples: []
      not_to_be_confused_with: "Hot Scene user count"
    - term: "Highlighted Place"
      definition: "Featured place with special promotion status, managed via admin UI at /admin/highlights/. Always returned first in destination queries."
      examples: []
      not_to_be_confused_with: ""
    - term: "Creator Address"
      definition: "Ethereum address of the scene creator, extracted from scene metadata during deployment processing. Indexed for efficient creator-based queries (used by tipping systems)."
      examples:
        - "0x1234...5678"
      not_to_be_confused_with: "Owner address"
    - term: "SDK Version"
      definition: "Runtime version extracted from runtimeVersion in scene.json during deployment. Used for filtering scenes by SDK version. Supports major version matching (e.g., sdk=7 matches 7.x.x). Places with null SDK values are treated as SDK6 (legacy scenes)."
      examples:
        - "7.3.27"
        - "6.11.0"
      not_to_be_confused_with: ""

  concept_relationships:
    internal:
      - from: "Place"
        to: "Positions Array"
        relationship: "has_many"
        description: "A place occupies one or more parcel coordinates in Genesis City"
      - from: "Place"
        to: "Base Position"
        relationship: "has_one"
        description: "A place has a single primary spawn coordinate"
      - from: "Place"
        to: "Place UUID (ADR-186)"
        relationship: "has_one"
        description: "Each place has a persistent UUID that may survive deployments per ADR-186 logic"
      - from: "Place"
        to: "Category"
        relationship: "has_many"
        description: "A place can belong to multiple categories via place_categories pivot table"
      - from: "User"
        to: "Place"
        relationship: "has_many"
        description: "A user can favorite or like multiple places"
      - from: "World"
        to: "Place"
        relationship: "is_a"
        description: "Worlds are conceptually similar to places but exist outside Genesis City with unique namespace"

    cross_service:
      - local_concept: "Place"
        remote_service: "catalyst"
        remote_concept: "Scene Entity"
        mapping_type: "derived_from"
        description: "Places are created from scene entity deployments published to Catalyst servers. Metadata is fetched via entity_id."
      - local_concept: "World"
        remote_service: "worlds-content-server"
        remote_concept: "World"
        mapping_type: "derived_from"
        description: "Worlds are created from world deployments published to World Content Servers. Metadata is fetched via entity_id."
      - local_concept: "Hot Scene"
        remote_service: "realm-provider"
        remote_concept: "Realm Scene"
        mapping_type: "references"
        description: "Hot scene data (active users) is fetched from realm provider's hot scenes endpoint"
      - local_concept: "User Visits"
        remote_service: "Data Team CDN"
        remote_concept: "Scene Stats"
        mapping_type: "references"
        description: "Visit statistics are fetched from Data Team CDN's scene statistics JSON files"

  invariants:
    - rule: "Place UUID must be preserved when new deployment encompasses all previous parcels OR maintains same base parcel (ADR-186)"
      enforced_at: "domain_layer"
      severity: "hard"
    - rule: "Place UUID must change when both parcels AND base parcel change (fundamental location change per ADR-186)"
      enforced_at: "domain_layer"
      severity: "hard"
    - rule: "Positions array must contain valid parcel coordinates in format 'x,y' with range -150 to 150"
      enforced_at: "api_validation"
      severity: "hard"
    - rule: "A place must have at least one category"
      enforced_at: "domain_layer"
      severity: "soft"
    - rule: "Content rating must be one of: PR, E, T, A, R"
      enforced_at: "api_validation"
      severity: "hard"
    - rule: "User can only like or dislike a place once (composite key: place_id, user)"
      enforced_at: "database"
      severity: "hard"

  responsibilities:
    - "Process deployment notifications from Catalyst (scenes) and World Content Servers (worlds) via AWS SQS"
    - "Maintain searchable database of places and worlds with full-text search"
    - "Implement Place UUID persistence logic per ADR-186 to preserve social data across deployments"
    - "Provide REST API for place discovery with filtering by category, position, popularity, SDK version, and creator"
    - "Track user interactions: likes (VP-weighted), dislikes, favorites"
    - "Manage place categories with automatic POI categorization"
    - "Monitor and serve real-time hot scenes data (active users from Catalyst realms)"
    - "Track and serve user visit statistics (unique users in last 30 days)"
    - "Support content moderation with content ratings and report generation"
    - "Generate S3 pre-signed upload URLs for content moderation reports"
    - "Manage highlighted places for featured promotion"
    - "Serve Gatsby frontend for place exploration interface"
    - "Provide specialized map endpoints optimized for coordinate-based queries"
    - "Index creator addresses for creator-based queries (tipping integration)"
    - "Extract and index SDK versions for version-based filtering"

  out_of_scope:
    - "Hosting scene content or 3D assets (handled by Catalyst and World Content Servers)"
    - "Processing or validating scene deployments (handled by Catalyst)"
    - "Managing world ownership or permissions (handled by World Content Servers)"
    - "Real-time communications or peer connectivity (handled by comms services)"
    - "User authentication beyond wallet signature verification"
    - "Processing payments or tips (only provides creator address data)"

  owned_entities:
    - name: "Place"
      description: "Scene in Genesis City with metadata, positions, categories, likes, favorites, and visit statistics"
      persistence: "postgres"
      identity_field: "id (UUID)"
      state_machine: ""
    - name: "World"
      description: "Private virtual space with metadata, world name, and social interactions"
      persistence: "postgres"
      identity_field: "id (UUID)"
      state_machine: ""
    - name: "Category"
      description: "Place categorization (art-gallery, social, game, etc.) with i18n translations"
      persistence: "postgres"
      identity_field: "id (UUID)"
      state_machine: ""
    - name: "PlaceCategory"
      description: "Many-to-many relationship between places and categories"
      persistence: "postgres"
      identity_field: "(place_id, category_id)"
      state_machine: ""
    - name: "UserFavorite"
      description: "User's favorited places"
      persistence: "postgres"
      identity_field: "(place_id, user)"
      state_machine: ""
    - name: "UserLike"
      description: "User likes/dislikes with VP-weighted scoring"
      persistence: "postgres"
      identity_field: "(place_id, user)"
      state_machine: ""

api:
  openapi_url: "https://github.com/decentraland/places/blob/master/docs/openapi.yaml"

db:
  schema_url: "https://github.com/decentraland/places/blob/master/docs/database-schemas.md"

dependencies:
  services:
    - name: "catalyst"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Fetch scene entity metadata and deployment information when processing SQS messages"
      critical: true
    - name: "worlds-content-server"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Fetch world metadata and deployment information when processing SQS messages"
      critical: true
    - name: "realm-provider"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Fetch real-time hot scenes data with active user counts from Catalyst realms"
      critical: false
    - name: "deployments-to-sqs"
      relationship: "async"
      protocol: "SNS/SQS"
      purpose: "Receive deployment notifications for scenes and worlds via SQS messages"
      critical: true

  external:
    - name: "AWS SQS"
      purpose: "Message queue for receiving deployment notifications from Catalyst and World Content Servers"
      type: "messaging"
    - name: "AWS S3"
      purpose: "Storage for content moderation reports with pre-signed upload URLs (60s expiry)"
      type: "storage"
    - name: "PostgreSQL"
      purpose: "Primary data store for places, worlds, categories, user interactions, and relationships"
      type: "storage"
    - name: "Data Team CDN (cdn-data.decentraland.org)"
      purpose: "Source of scene statistics and visit data (unique users in last 30 days)"
      type: "cdn"
    - name: "Snapshot (voting power)"
      purpose: "Source of user voting power data for VP-weighted like scoring"
      type: "api"

events:
  publishes: []

  consumes:
    - name: "scene_deployment"
      source_service: "catalyst"
      description: "Deployment notification for Genesis City scene with entity_id, content_server_url, positions, base_position, and deployment metadata"
      channel: "AWS SQS (QUEUE_URL)"
    - name: "world_deployment"
      source_service: "worlds-content-server"
      description: "Deployment notification for Decentraland World with entity_id, content_server_url, world name, and deployment metadata"
      channel: "AWS SQS (QUEUE_URL)"

configuration:
  feature_flags:
    - name: "NEW_ROLLOUT"
      description: "Enable new features rollout"
      default: "false"

  key_env_vars:
    - name: "CONNECTION_STRING"
      description: "PostgreSQL connection string for database access"
      affects: "All database operations - places, worlds, categories, user interactions"
    - name: "AWS_REGION"
      description: "AWS region for SQS service"
      affects: "SQS message consumption for deployment notifications"
    - name: "QUEUE_URL"
      description: "AWS SQS queue URL for deployment messages"
      affects: "Receiving scene and world deployment notifications"
    - name: "AWS_ENDPOINT"
      description: "AWS endpoint override for LocalStack in local development"
      affects: "Local development SQS emulation"
    - name: "AWS_ACCESS_KEY"
      description: "AWS access key for S3 report uploads"
      affects: "Content moderation report S3 operations"
    - name: "AWS_ACCESS_SECRET"
      description: "AWS secret key for S3 report uploads"
      affects: "Content moderation report S3 authentication"
    - name: "AWS_BUCKET_NAME"
      description: "S3 bucket name for content moderation reports"
      affects: "Report storage location"
    - name: "CATALYST_URL"
      description: "Default Catalyst server URL for scene metadata"
      affects: "Scene entity metadata fetching"
    - name: "REALM_PROVIDER_URL"
      description: "Realm provider API URL for hot scenes data"
      affects: "Real-time active user counts and hot scene tracking"
    - name: "DATA_TEAM_URL"
      description: "Data team CDN URL for scene statistics"
      affects: "User visit statistics retrieval"
    - name: "DATA_TEAM_AUTH_TOKEN"
      description: "Authentication token for data team ranking updates"
      affects: "Place and world ranking update endpoints authorization"
    - name: "PROFILE_URL"
      description: "Content server URL for user profiles"
      affects: "User profile data retrieval"
    - name: "PLACES_URL"
      description: "Places API base URL"
      affects: "API endpoint configuration"
    - name: "PLACES_ROOT_URL"
      description: "Places frontend base URL"
      affects: "Frontend routing and URL generation"
    - name: "PLACES_BASE_URL"
      description: "Public-facing places URL"
      affects: "Public URL references and social sharing"
    - name: "DECENTRALAND_URL"
      description: "Decentraland play URL"
      affects: "Jump-in links and play redirects"
    - name: "COMMS_GATEKEEPER_URL"
      description: "Comms Gatekeeper API for connected user counts"
      affects: "Real-time user count data"
    - name: "BOOTSTRAP_USER"
      description: "Initial admin user wallet address"
      affects: "Database seeding and admin permissions"
    - name: "BOOTSTRAP_CATALYST"
      description: "Default Catalyst server URL for bootstrapping"
      affects: "Initial Catalyst server configuration"
    - name: "ADMIN_ADDRESSES"
      description: "Comma-separated admin wallet addresses"
      affects: "Admin-only endpoint authorization"
    - name: "SLACK_WEBHOOK"
      description: "Slack webhook for general notifications"
      affects: "Service notification delivery"
    - name: "CONTENT_MODERATION_SLACK_WEBHOOK"
      description: "Slack webhook for moderation alerts"
      affects: "Content moderation alert delivery"

adrs:
  - id: "ADR-186"
    title: "Place UUID Persistence Across Deployments"
    url: "https://adr.decentraland.org/adr/ADR-186"
    relevance: "Defines UUID assignment logic that ensures favorites, likes, and social data persist when scenes update. UUID preserved if new deployment encompasses all previous parcels OR maintains same base parcel. UUID changes when both parcels AND base parcel change."
