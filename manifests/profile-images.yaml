schema_version: "1.1"

service:
  name: profile-images
  display_name: Profile Images
  description: Generates 2D profile images (body and face) from 3D avatar models. Uses producer-consumer pattern to monitor profile changes and render avatar images for display in applications and user interfaces.
  owner: core-engineering
  repository: https://github.com/decentraland/profile-images
  language: typescript
  layer: feature-servers
  role:
    - worker
  data_domain:
    - profile-images
  ai-agent-context: https://github.com/decentraland/profile-images/blob/main/docs/ai-agent-context.md

domain:
  glossary:
    - term: Profile Image
      definition: 2D rendered image (body or face) generated from 3D avatar model for display in applications.

    - term: Rendering Job
      definition: SQS message triggering 3D-to-2D avatar image generation.

  concept_relationships:
    cross_service:
      - local_concept: Profile Image
        remote_service: catalyst
        remote_concept: Profile Entity
        mapping_type: derived_from
        description: Profile images are rendered from Catalyst profile entities

  responsibilities:
    - Monitor Catalyst for profile changes
    - Queue rendering jobs to SQS
    - Render 3D avatars to 2D images
    - Upload generated images to S3
    - Retry failed rendering jobs

  owned_entities:
    - name: Profile Image
      description: Generated 2D avatar image
      persistence: s3
      identity_field: address

api:
  openapi_url: ""

dependencies:
  services:
    - name: catalyst
      relationship: sync
      protocol: HTTP
      purpose: Polls for profile deployments
      critical: true

  external:
    - name: AWS SQS
      purpose: Rendering job queue
      type: messaging
    - name: AWS S3
      purpose: Generated image storage
      type: storage

events:
  publishes: []
  consumes: []

configuration:
  key_env_vars:
    - name: HTTP_SERVER_HOST
      description: HTTP server host address
      affects: Server binding configuration

    - name: HTTP_SERVER_PORT
      description: HTTP server port
      affects: Server listening port

    - name: PEER_URL
      description: Catalyst peer URL for fetching profile entities
      affects: Source for profile data and pointer-changes monitoring

    - name: INTERVAL
      description: Polling interval in milliseconds for checking profile changes
      affects: Producer polling frequency

    - name: AWS_REGION
      description: AWS region for S3 and SQS resources
      affects: AWS service region configuration

    - name: BUCKET_NAME
      description: S3 bucket name for storing generated profile images
      affects: Image storage location

    - name: QUEUE_URL
      description: SQS queue URL for rendering jobs
      affects: Job queue location

    - name: DLQ_URL
      description: Dead letter queue URL for failed rendering jobs
      affects: Failed job retry queue

    - name: AUTH_SECRET
      description: Secret for authenticating API requests
      affects: API authentication and authorization
