schema_version: "1.1"

service:
  name: governance-ui
  display_name: Decentraland DAO Governance UI
  description: Full-featured governance dApp (served at governance.decentraland.org) for the Decentraland DAO. Lets community members browse, create, vote on, and track governance proposals, manage funded projects, view DAO transparency data, configure push/email notifications, and manage their governance profile. Frontend counterpart to the governance backend service.
  owner: dao
  repository: https://github.com/decentraland/governance-ui
  language: typescript
  layer: Feature Servers Layer
  role:
    - client
  data_domain: []
  ai-agent-context: https://github.com/decentraland/governance-ui/blob/master/docs/ai-agent-context.md

domain:
  glossary:
    - term: Proposal Form
      definition: Multi-step UI for creating different proposal types (poll, grant, catalyst, ban, hiring, pitch, tender, governance)

    - term: Voting Interface
      definition: UI for casting votes with voting power breakdown display

    - term: Proposal Timeline
      definition: Visual representation of proposal lifecycle stages and milestones

    - term: Grant Dashboard
      definition: Interface for tracking funded projects, milestones, and vesting schedules

    - term: Tender Board
      definition: UI for viewing open requests and submitting bids

    - term: VP Breakdown
      definition: Visual breakdown showing sources of user's voting power (MANA, LAND, ESTATE, delegation, etc.)

    - term: Markdown Editor
      definition: Rich text editor with preview for proposal descriptions and updates

  concept_relationships:
    internal:
      - from: Proposal Form
        to: Voting Interface
        relationship: transitions_to
        description: Created proposals become available for voting in the voting interface

      - from: Grant Dashboard
        to: Proposal Form
        relationship: references
        description: Grant tracking links back to original grant proposals

    cross_service:
      - local_concept: Voting Interface
        remote_service: governance
        remote_concept: Proposal
        mapping_type: projects_as
        description: UI voting actions interact with governance backend API

      - local_concept: VP Breakdown
        remote_service: snapshot
        remote_concept: Voting Power Distribution
        mapping_type: equivalent
        description: Voting power data sourced from Snapshot

      - local_concept: Proposal Form
        remote_service: discourse
        remote_concept: Forum Thread
        mapping_type: projects_as
        description: Proposals create corresponding forum threads

  invariants: []

  responsibilities:
    - Proposal browsing - filterable, searchable, paginated list of all DAO proposals
    - Proposal detail view - full proposal with voting, Discourse comments, co-authors, sentiment survey, result stance
    - Proposal submission - type-specific forms for Poll, Draft, Governance, Grant, POI, Ban Name, Catalyst, Linked Wearables, Pitch, Tender, Bid, Hiring, Council Decision Veto
    - Proposal editing and project updates
    - Governance profiles - per-address activity, VP, badges, delegations, votes cast
    - Projects dashboard - funded grant projects with milestones and updates tracking
    - Transparency page - DAO treasury balances, vesting contracts, monthly spend, committee members
    - Snapshot integration - VP snapshot voting and delegation contract interactions
    - Push Protocol notifications and newsletter subscriptions
    - Discourse forum thread linking per proposal
    - Legislative tracker component
    - Markdown editing with preview for proposals
    - Voting power breakdown by source display
    - Charts and analytics dashboards
    - Links to buy MANA, LAND, NAMES, and wearables
    - Wallet connection and Decentraland SSO authentication
    - Feature flags and maintenance mode support

  out_of_scope:
    - Proposal backend logic and vote tallying (handled by governance backend)
    - Snapshot voting infrastructure (handled by Snapshot Hub)
    - User authentication and wallet connection flows (handled by auth at decentraland.org/auth)
    - Account settings and MANA management (handled by account at account.decentraland.org)
    - DAO marketing/intro content (handled by dao-landing at dao.decentraland.org)

  owned_entities: []

api:
  openapi_url: ""

db:
  schema_url: ""

dependencies:
  services:
    - name: governance
      relationship: sync
      protocol: HTTP
      purpose: All proposal, project, vote, profile, budget, badge, and subscription data via GOVERNANCE_API
      critical: true

    - name: auth
      relationship: sync
      protocol: HTTP
      purpose: Wallet-based authentication flows
      critical: true

  external:
    - name: Snapshot Hub API
      purpose: Off-chain voting platform - VP data, voting, and delegation contract
      type: api

    - name: Snapshot GraphQL
      purpose: Snapshot subgraph for VP and voting queries
      type: api

    - name: Discourse
      purpose: Forum integration for proposal discussions via DISCOURSE_API
      type: api

    - name: Discord
      purpose: Profile verification links via DISCORD_PROFILE_VERIFICATION_URL
      type: api

    - name: DCL Data API
      purpose: DAO transparency balances and team data from decentraland-dao.github.io/transparency
      type: api

    - name: Push Protocol
      purpose: Push notifications for DAO events via PUSH_CHANNEL_ID
      type: api

    - name: Ethereum Wallet
      purpose: User authentication and vote signing
      type: other

    - name: Decentraland SSO
      purpose: Single Sign On for identity sharing via SSO_URL
      type: api

    - name: Feature Flags Service
      purpose: Feature toggle management via @dcl/feature-flags
      type: api

    - name: Segment
      purpose: Analytics tracking
      type: api

    - name: Vesting Dashboard
      purpose: External vesting dashboard link via VESTING_DASHBOARD_URL
      type: api

    - name: Snapshot Delegation Contract
      purpose: On-chain VP delegation contract interactions
      type: blockchain

    - name: Vesting Contracts
      purpose: On-chain vesting contract data
      type: blockchain

events:
  publishes: []
  consumes: []

configuration:
  feature_flags:
    - name: GRANT_PROPOSAL_SUBMIT_ENABLED
      description: Enable/disable grant proposal submission
      default: "true"

    - name: PITCH_PROPOSAL_SUBMIT_ENABLED
      description: Enable/disable pitch proposal submission
      default: "true"

  key_env_vars:
    - name: VITE_REACT_APP_DCL_DEFAULT_ENV
      description: Active environment (dev or prod) selected at build time - no staging environment
      affects: Configuration selection from config/env/*.json

    - name: GOVERNANCE_API
      description: Governance backend API base URL
      affects: All API requests for proposals, projects, votes, profiles, budgets, badges

    - name: GOVERNANCE_URL
      description: Public URL of this governance UI application
      affects: Application routing and canonical links

    - name: DEFAULT_CHAIN_ID
      description: Ethereum chain ID (1 = mainnet)
      affects: Blockchain network selection and wallet connection

    - name: SNAPSHOT_API
      description: Snapshot Hub REST API endpoint
      affects: Voting and VP data fetching

    - name: SNAPSHOT_URL
      description: Snapshot UI URL for external links
      affects: Links to Snapshot interface

    - name: SNAPSHOT_SPACE
      description: Snapshot space identifier (e.g., snapshot.dcl.eth)
      affects: Voting space selection

    - name: SNAPSHOT_QUERY_ENDPOINT
      description: Snapshot GraphQL subgraph endpoint
      affects: VP and voting queries

    - name: SNAPSHOT_DELEGATE_CONTRACT_ADDRESS
      description: On-chain delegation contract address
      affects: VP delegation features

    - name: SNAPSHOT_DURATION
      description: Default voting duration for proposals
      affects: Proposal creation defaults

    - name: SNAPSHOT_STATUS_ENABLED
      description: Enable Snapshot status integration
      affects: Voting status display

    - name: DISCOURSE_API
      description: Discourse forum API endpoint
      affects: Forum thread fetching and linking

    - name: DISCOURSE_USER
      description: Discourse bot user for creating proposal threads
      affects: Forum integration

    - name: DISCOURSE_CONNECT_THREAD
      description: Discourse thread ID for connect discussions
      affects: Forum navigation

    - name: DISCORD_PROFILE_VERIFICATION_URL
      description: Discord invite link for profile verification
      affects: Discord verification flow

    - name: JOIN_DISCORD_URL
      description: Discord community invite link
      affects: Community links

    - name: DCL_DATA_API
      description: Transparency API endpoint (decentraland-dao.github.io/transparency)
      affects: DAO treasury and team data

    - name: SSO_URL
      description: Decentraland SSO service URL (id.decentraland.org)
      affects: Authentication and identity sharing

    - name: PUSH_CHANNEL_ID
      description: Push Protocol channel ID for DAO notifications
      affects: Push notification subscription

    - name: BUY_MANA_URL
      description: External link for purchasing MANA tokens
      affects: User onboarding links

    - name: BUY_LAND_URL
      description: External link for purchasing LAND
      affects: User onboarding links

    - name: BUY_NAME_URL
      description: External link for purchasing NAMES
      affects: User onboarding links

    - name: BUY_WEARABLES_URL
      description: External link for purchasing wearables
      affects: User onboarding links

    - name: VESTING_DASHBOARD_URL
      description: External vesting dashboard URL
      affects: Vesting schedule navigation

    - name: SUBMISSION_THRESHOLD_POLL
      description: Minimum VP required to submit poll proposals
      affects: Poll submission validation

    - name: SUBMISSION_THRESHOLD_DRAFT
      description: Minimum VP required to submit draft proposals
      affects: Draft submission validation

    - name: SUBMISSION_THRESHOLD_GOVERNANCE
      description: Minimum VP required to submit governance proposals
      affects: Governance submission validation

    - name: SUBMISSION_THRESHOLD_GRANT
      description: Minimum VP required to submit grant proposals
      affects: Grant submission validation

    - name: SUBMISSION_THRESHOLD_HIRING
      description: Minimum VP required to submit hiring proposals
      affects: Hiring submission validation

    - name: SUBMISSION_THRESHOLD_PITCH
      description: Minimum VP required to submit pitch proposals
      affects: Pitch submission validation

    - name: SUBMISSION_THRESHOLD_TENDER
      description: Minimum VP required to submit tender proposals
      affects: Tender submission validation

    - name: SUBMISSION_THRESHOLD_COUNCIL_DECISION_VETO
      description: Minimum VP required to submit council decision veto proposals
      affects: Veto submission validation

    - name: GRANT_VP_THRESHOLD
      description: Minimum VP required for grant-related actions
      affects: Grant access control

    - name: REASON_THRESHOLD
      description: VP threshold above which a vote reason is required
      affects: Vote submission validation

    - name: SEGMENT_KEY
      description: Segment analytics write key
      affects: Analytics tracking

    - name: MAINTENANCE
      description: Maintenance mode flag
      affects: Site availability and maintenance layout display

    - name: PROD_ENV_VAR
      description: Production environment identifier
      affects: Environment-specific behavior

adrs: []
