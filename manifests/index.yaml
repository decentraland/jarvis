  description: >-
    Static site (default/only branch is `gh-pages`, published via GitHub Pages to the custom domain
    contracts.decentraland.org per the CNAME file) that is the canonical registry of Decentraland's deployed
    smart-contract addresses per network. The entire dataset lives in addresses.json (a flat "network -> contract name
    -> address" map covering mainnet, sepolia, goerli, matic/Polygon, mumbai, amoy, and arbitrum). links.html is a small
    vanilla-JS page that fetches addresses.json and renders each address as a clickable link to its block explorer
    (Etherscan/Polygonscan), with a copy-to-clipboard action. There is no package.json, source directory, build tooling,
    or ABI data in the repo — it is purely address data plus a browsing page. The decentraland/smart-contracts-workspace
