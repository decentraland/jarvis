schema_version: '1.0'
services:
- name: aang-renderer
  display_name: Aang Renderer
  description: WebGPU-based avatar and wearable preview renderer for Decentraland.
    Renders 3D previews of user profiles and wearables across multiple platforms including
    Marketplace, Authentication, Profile, Builder, and Configurator interfaces. Shares
    Toon and Scene shaders with the Unity Explorer for visual consistency.
  layer: client
  repository: https://github.com/decentraland/aang-renderer
  role:
  - client
  data_domain: []
  dependencies:
  - name: catalyst
    relationship: sync
    protocol: HTTP
- name: account
  display_name: Decentraland Account
  description: User account management dApp (served at account.decentraland.org) that
    allows authenticated users to manage their wallets, MANA token balances (Ethereum
    and Polygon), email notification subscriptions, and Marketplace Credits settings.
    Requires wallet-based authentication and gates all primary functionality behind
    protected routes.
  layer: Feature Servers Layer
  repository: https://github.com/decentraland/account
  role:
  - client
  data_domain: []
  dependencies:
  - name: credits-server
    relationship: sync
    protocol: HTTP
  - name: marketplace-server
    relationship: sync
    protocol: HTTP
  - name: transactions-api
    relationship: sync
    protocol: HTTP
  - name: catalyst
    relationship: sync
    protocol: HTTP
  - name: auth
    relationship: sync
    protocol: HTTP
- name: archipelago-workers
  display_name: Archipelago Workers
  description: Monorepo containing three services that implement the Archipelago protocol
    for clustering users into dynamic islands based on their positions in Decentraland's
    metaverse. Enables scalable crowd management and efficient real-time communication
    for standalone realms.
  layer: entry-points
  repository: https://github.com/decentraland/archipelago-workers
  role:
  - rt-gateway
  - worker
  data_domain:
  - islands
  - peers
  dependencies:
  - name: catalyst
    relationship: sync
    protocol: HTTP
- name: architecture
  display_name: Decentraland Architecture Diagram
  description: Repository containing the main Decentraland backend architecture diagram
    defined using D2 language. Provides comprehensive documentation of architectural
    layers (Entry Points, Real-Time, Content, Feature Servers), service responsibilities,
    and communication patterns to help understand how components interact.
  layer: Other
  repository: https://github.com/decentraland/architecture
  role:
  - other
  data_domain: []
  dependencies: []
- name: asset-bundle-converter
  display_name: Asset Bundle Converter
  description: Converts Decentraland scene assets (GLTF models, textures) into optimized
    Unity Asset Bundles for improved WebGL performance. Monitors deployment events
    and processes entities by re-importing GLTF files in Unity and packaging them
    into versioned, compressed Asset Bundles stored on CDN.
  layer: content
  repository: https://github.com/decentraland/asset-bundle-converter
  role:
  - worker
  data_domain:
  - asset-bundles
  dependencies:
  - name: catalyst
    relationship: sync
    protocol: HTTP
  - name: deployments-to-sqs
    relationship: async
    protocol: SNS/SQS
  - name: asset-bundle-registry
    relationship: async
    protocol: SNS/SQS
- name: asset-bundle-registry
  display_name: Asset Bundle Registry
  description: Orchestrates and tracks the availability of optimized Decentraland
    entities (scenes, worlds, wearables, emotes, profiles). Acts as a state management
    service coordinating between entity deployments, optimization services, and client
    requests to ensure optimized content is always available.
  layer: content
  repository: https://github.com/decentraland/asset-bundle-registry
  role:
  - worker
  data_domain:
  - entity-registry
  - optimization-status
  dependencies:
  - name: deployments-to-sqs
    relationship: async
    protocol: SNS/SQS
  - name: asset-bundle-converter
    relationship: async
    protocol: SNS/SQS
  - name: worlds-content-server
    relationship: both
    protocol: HTTP
  - name: catalyst
    relationship: sync
    protocol: HTTP
- name: atlas-server
  display_name: Atlas Server
  description: Provides REST API for querying Decentraland's Genesis City map data
    (parcels, estates, districts) and generating map visualizations as PNG images.
    Serves as the data layer for the Decentraland Atlas interface.
  layer: feature-servers
  repository: https://github.com/decentraland/atlas-server
  role:
  - gateway
  data_domain:
  - map-tiles
  - estates
  - districts
  dependencies:
  - name: signatures-server
    relationship: sync
    protocol: HTTP
- name: auth
  display_name: Decentraland Auth UI
  description: Centralized authentication and identity service for Decentraland. Handles
    wallet connection (MetaMask, WalletConnect, Coinbase), social login (Google, Discord,
    Apple, X), email OTP login, OAuth callbacks, new-user avatar setup, and mobile
    deep-link authentication flows. After successful authentication redirects users
    back to the originating Decentraland application.
  layer: feature-servers
  repository: https://github.com/decentraland/auth
  role:
  - client
  data_domain: []
  dependencies:
  - name: auth-server
    relationship: both
    protocol: WebSocket
  - name: catalyst
    relationship: sync
    protocol: HTTP
  - name: builder-server
    relationship: sync
    protocol: HTTP
  - name: events-notifier
    relationship: sync
    protocol: HTTP
  - name: social-service-ea
    relationship: sync
    protocol: HTTP
  - name: transactions-api
    relationship: sync
    protocol: HTTP
- name: auth-server
  display_name: Auth Server
  description: Facilitates secure communication between the Decentraland desktop client
    and browser-based authentication dApp. Enables the desktop client to execute wallet
    operations (transactions, signatures) using the user's browser wallet through
    a request-response relay pattern.
  layer: feature-servers
  repository: https://github.com/decentraland/auth-server
  role:
  - auth
  data_domain:
  - authentication-requests
  dependencies: []
- name: badges
  display_name: Badges
  description: Manages user achievements (badges) within the Decentraland ecosystem.
    Tracks user actions both in-world and on-platform to grant badges, publishes badge-granted
    events, and provides APIs for querying badge definitions and user achievements.
  layer: feature-servers
  repository: https://github.com/decentraland/badges
  role:
  - worker
  data_domain:
  - badges
  dependencies:
  - name: events-notifier
    relationship: async
    protocol: SNS/SQS
  - name: notifications-workers
    relationship: async
    protocol: SNS/SQS
  - name: catalyst
    relationship: sync
    protocol: HTTP
  - name: deployments-to-sqs
    relationship: async
    protocol: SNS/SQS
- name: block-indexer
  display_name: Block Indexer Library
  description: TypeScript component library that finds the blockchain block that was
    at the tip of the blockchain at a given timestamp. Provides efficient timestamp-to-block-number
    lookup with caching for Ethereum and other EVM-compatible chains, essential for
    historical queries and timestamp-based content validation.
  layer: Shared Libraries
  repository: https://github.com/decentraland/block-indexer
  role:
  - library
  data_domain: []
  dependencies: []
- name: blog-site
  display_name: Decentraland Blog UI
  description: Web application that renders blog content, category and author pages,
    search results, and SEO metadata. Integrates with Contentful CMS for content management
    and Algolia for search functionality.
  layer: feature-servers
  repository: https://github.com/decentraland/blog-site
  role:
  - client
  data_domain: []
  dependencies:
  - name: auth
    relationship: sync
    protocol: HTTP
  - name: catalyst
    relationship: sync
    protocol: HTTP
- name: builder
  display_name: Decentraland Builder
  description: Web-based application for creating, editing, and publishing Decentraland
    content. Provides drag-and-drop scene creation (SDK6), Inspector-based editing
    (SDK7), wearable and emote design, LAND and Estate management, and Worlds deployment
    with permission controls.
  layer: client
  repository: https://github.com/decentraland/builder
  role:
  - client
  data_domain: []
  dependencies:
  - name: builder-server
    relationship: sync
    protocol: HTTP
  - name: catalyst
    relationship: sync
    protocol: HTTP
  - name: worlds-content-server
    relationship: sync
    protocol: HTTP
  - name: marketplace-server
    relationship: sync
    protocol: HTTP
  - name: credits-server
    relationship: sync
    protocol: HTTP
- name: builder-client
  display_name: Builder Client
  description: TypeScript/JavaScript library providing a programmatic interface to
    the Decentraland Builder Server API. Enables developers to create, edit, and manage
    wearables and emotes without using the Builder UI, making it suitable for automation,
    bulk operations, and integration into other tools.
  layer: Shared Libraries
  repository: https://github.com/decentraland/builder-client
  role:
  - library
  - client
  data_domain: []
  dependencies:
  - name: builder-server
    relationship: sync
    protocol: HTTP
- name: builder-server
  display_name: Builder Server
  description: Backend service for the Decentraland Builder application. Provides
    REST APIs for creating and managing scene projects, wearable and emote collections,
    asset packs, and facilitates the publication workflow to the Decentraland platform.
  layer: feature
  repository: https://github.com/decentraland/builder-server
  role:
  - gateway
  data_domain:
  - scene_projects
  - collections
  - items
  - asset_packs
  dependencies:
  - name: catalyst
    relationship: sync
    protocol: HTTP
- name: camera-reel-service
  display_name: Camera Reel Service
  description: Manages camera images captured from Decentraland Explorer. Provides
    upload, storage, retrieval, and metadata management for user-generated screenshots
    with visibility controls and place associations.
  layer: feature-servers
  repository: https://github.com/decentraland/camera-reel-service
  role:
  - gateway
  data_domain:
  - camera-images
  dependencies: []
- name: catalyst
  display_name: Catalyst
  description: Monorepo containing the core Catalyst server implementation. Catalyst
    servers are the decentralized content infrastructure for Decentraland, bundling
    multiple services (Content Server, Lambdas, BFF, Archipelago) to provide entity
    storage, content delivery, peer communication, and client APIs.
  layer: content
  repository: https://github.com/decentraland/catalyst
  role:
  - content
  - storage
  data_domain:
  - entities
  - deployments
  - content-files
  dependencies:
  - name: archipelago-workers
    relationship: both
    protocol: WebSocket
- name: catalyst-contracts
  display_name: Catalyst Contracts Library
  description: TypeScript library providing smart contract addresses and ABIs for
    Decentraland blockchain contracts across multiple networks (Ethereum mainnet,
    Sepolia, Polygon, Mumbai, Amoy). Centralizes contract deployment information including
    LAND, Collections, Third Party Registry, POI, MANA token, Catalyst contracts,
    and name denylist across L1 and L2 networks.
  layer: Shared Libraries
  repository: https://github.com/decentraland/catalyst-contracts
  role:
  - library
  data_domain: []
  dependencies: []
- name: catalyst-storage
  display_name: '@dcl/catalyst-storage'
  description: Storage abstraction library providing unified API for file storage
    across multiple backends (S3, filesystem, in-memory). Handles content streaming,
    compression, and metadata for Catalyst content servers.
  layer: shared-library
  repository: https://github.com/decentraland/catalyst-storage
  role:
  - library
  data_domain: []
  dependencies: []
- name: chrome-devtool-protocol-unity
  display_name: Chrome DevTools Protocol Unity
  description: Chrome DevTools Protocol implementation for Unity, providing code generation
    utilities and integration between Chrome's debugging tools and the Unity engine.
  layer: library
  repository: https://github.com/decentraland/chrome-devtool-protocol-unity
  role:
  - library
  data_domain: []
  dependencies: []
- name: clearscript
  display_name: ClearScript
  description: Decentraland fork of Microsoft's ClearScript library, providing V8
    JavaScript engine integration for Unity. Used as the JavaScript execution engine
    for SDK7 scene runtimes in the Explorer client.
  layer: library
  repository: https://github.com/decentraland/ClearScript
  role:
  - library
  data_domain: []
  dependencies: []
- name: client-sdk-unity
  display_name: LiveKit Client SDK Unity
  description: Decentraland fork of the LiveKit Unity SDK, enabling real-time video,
    audio, and data communication features within Unity applications for voice chat
    and messaging in the Explorer client.
  layer: library
  repository: https://github.com/decentraland/client-sdk-unity
  role:
  - library
  data_domain: []
  dependencies: []
- name: comms-gatekeeper
  display_name: Comms Gatekeeper
  description: Acts as the guardian of LiveKit tokens within Decentraland's communication
    architecture. Processes signed fetch requests from clients and generates tokens
    that grant access to LiveKit rooms dedicated to specific scenes or worlds. Manages
    scene administration, streaming access, voice chat, and user moderation. Issues
    LiveKit tokens as the mandatory credential for any client to enter the Genesis
    City platform and interact with other players.
  layer: real-time
  repository: https://github.com/decentraland/comms-gatekeeper
  role:
  - auth
  - gateway
  data_domain:
  - scene-administration
  - streaming-access
  - scene-bans
  - voice-chat
  dependencies:
  - name: catalyst
    relationship: sync
    protocol: HTTP
  - name: worlds-content-server
    relationship: sync
    protocol: HTTP
  - name: places-api
    relationship: sync
    protocol: HTTP
  - name: social-service-ea
    relationship: sync
    protocol: HTTP
  - name: notifications-workers
    relationship: sync
    protocol: HTTP
- name: comms-message-sfu
  display_name: Comms Message SFU
  description: Real-time message routing and validation service for Decentraland's
    LiveKit communications infrastructure. Acts as a LiveKit participant that receives
    directed chat messages, validates community context, and re-publishes them to
    appropriate recipients.
  layer: real-time
  repository: https://github.com/decentraland/comms-message-sfu
  role:
  - rt-gateway
  data_domain: []
  dependencies:
  - name: social-service-ea
    relationship: sync
    protocol: HTTP
- name: content-validator
  display_name: Content Validator Library
  description: Decentraland entity deployment validation library for Catalyst servers
    that provides comprehensive validation functions for entity structure, metadata,
    access permissions, content integrity, and size constraints. Ensures only valid
    and authorized content is deployed to the Decentraland content network.
  layer: Shared Libraries
  repository: https://github.com/decentraland/content-validator
  role:
  - library
  data_domain: []
  dependencies: []
- name: core-components
  display_name: Core Components Library
  description: Monorepo of reusable TypeScript components and utilities for the Decentraland
    backend ecosystem. Provides standardized implementations for infrastructure concerns
    including HTTP servers, databases, caching, messaging, observability, and distributed
    tracing that are shared across multiple Decentraland services.
  layer: Shared Libraries
  repository: https://github.com/decentraland/core-components
  role:
  - library
  data_domain: []
  dependencies: []
- name: creator-hub
  display_name: Decentraland Creator Hub
  description: Cross-platform Electron desktop application for creating, editing,
    and deploying Decentraland SDK7 scenes. Provides visual scene editing via embedded
    Inspector, asset management with curated Smart Items, and deployment to Genesis
    City, Worlds, or custom servers. Monorepo includes asset-packs (3D assets and
    Smart Items), inspector (web-based 3D editor), and creator-hub (desktop app).
  layer: client
  repository: https://github.com/decentraland/creator-hub
  role:
  - client
  data_domain: []
  dependencies:
  - name: worlds-content-server
    relationship: sync
    protocol: HTTP
  - name: social-service-ea
    relationship: sync
    protocol: HTTP
  - name: atlas-server
    relationship: sync
    protocol: HTTP
  - name: asset-bundle-registry
    relationship: sync
    protocol: HTTP
  - name: auth-server
    relationship: sync
    protocol: HTTP
  - name: catalyst
    relationship: sync
    protocol: HTTP
- name: credits-server
  display_name: Credits Server
  description: Manages user credits system for Decentraland, integrating on-chain
    credit consumption tracking with off-chain credit grants. Handles credit issuance,
    tracking, expiration, and status calculation by combining database-stored grants
    with Squid indexer on-chain consumption data.
  layer: feature-servers
  repository: https://github.com/decentraland/credits-server
  role:
  - gateway
  data_domain:
  - credits
  - seasons
  - goals
  dependencies:
  - name: events
    relationship: sync
    protocol: HTTP
  - name: archipelago-workers
    relationship: sync
    protocol: HTTP
- name: dao-landing
  display_name: Decentraland DAO Landing
  description: Static marketing and informational page (served at dao.decentraland.org)
    for the Decentraland DAO. Introduces the DAO to new and existing community members,
    explains how governance works, visualises treasury and voting power data, and
    funnels visitors toward the full governance application. It does not support proposal
    creation or voting directly.
  layer: Feature Servers Layer
  repository: https://github.com/decentraland/dao-landing
  role:
  - client
  data_domain: []
  dependencies:
  - name: governance
    relationship: sync
    protocol: HTTP
  - name: catalyst
    relationship: sync
    protocol: HTTP
  - name: credits-server
    relationship: sync
    protocol: HTTP
  - name: auth
    relationship: sync
    protocol: HTTP
- name: dapps-template
  display_name: Decentraland dApps Template
  description: Starter template repository for creating new Decentraland dApp user
    interfaces. Provides pre-configured build tools, testing setup, linting, environment
    management, and UI component integration following Decentraland best practices.
  layer: feature-servers
  repository: https://github.com/decentraland/dapps-template
  role:
  - library
  data_domain: []
  dependencies: []
- name: decentraland-crypto-middleware
  display_name: Decentraland Crypto Middleware
  description: Multi-framework authentication middleware for verifying requests signed
    with @decentraland/SignedFetch. Provides integrations for Express, Koa, PassportJS,
    and Well-Known Components to authenticate Decentraland users via cryptographic
    signature verification.
  layer: shared-library
  repository: https://github.com/decentraland/decentraland-crypto-middleware
  role:
  - library
  data_domain: []
  dependencies:
  - name: catalyst
    relationship: sync
    protocol: HTTP
- name: decentraland-dapps
  display_name: Decentraland dApps Library
  description: Shared React/Redux library providing common modules, components, and
    utilities for Decentraland web applications. Includes wallet management, transaction
    handling, authorization, translations, analytics, storage, modals, toasts, and
    UI containers with i18n support.
  layer: feature-servers
  repository: https://github.com/decentraland/decentraland-dapps
  role:
  - library
  data_domain: []
  dependencies: []
- name: decentraland-gatsby
  display_name: Decentraland Gatsby
  description: Gatsby-based framework providing common components, plugins, and utilities
    for building Decentraland web applications. Includes server-side rendering, database
    migrations, authentication middleware, background jobs, metrics collection, email
    templates, and internationalization support.
  layer: feature-servers
  repository: https://github.com/decentraland/decentraland-gatsby
  role:
  - library
  data_domain: []
  dependencies: []
- name: deployments-to-sqs
  display_name: Deployments to SQS
  description: Monitors Catalyst content servers for new entity deployments and publishes
    deployment events to AWS SNS. Acts as the event source for downstream optimization
    services that process wearables, emotes, and scenes.
  layer: feature-servers
  repository: https://github.com/decentraland/deployments-to-sqs
  role:
  - worker
  data_domain: []
  dependencies:
  - name: catalyst
    relationship: sync
    protocol: HTTP
- name: events
  display_name: Community Events
  description: Full-stack web application that manages community events within the
    Decentraland virtual world. Allows users to create, discover, and attend events
    in both land-based locations (Genesis City) and virtual worlds, providing a dApp
    interface with recurrent events, schedules, notifications, and social sharing
    capabilities.
  layer: Feature Servers Layer
  repository: https://github.com/decentraland/events
  role:
  - gateway
  data_domain:
  - events
  - schedules
  - event-attendance
  dependencies:
  - name: catalyst
    relationship: sync
    protocol: HTTP
  - name: social-service-ea
    relationship: sync
    protocol: HTTP
  - name: notifications-workers
    relationship: async
    protocol: SNS/SQS
  - name: events-notifier
    relationship: async
    protocol: SNS/SQS
  - name: worlds-content-server
    relationship: sync
    protocol: HTTP
  - name: badges
    relationship: async
    protocol: SNS/SQS
- name: events-notifier
  display_name: Events Notifier
  description: Monitors blockchain events and publishes notifications to internal
    event-driven systems. Runs scheduled cron jobs that query The Graph subgraphs
    to detect marketplace transactions, rentals, and royalties, then publishes structured
    events for downstream consumers.
  layer: feature-servers
  repository: https://github.com/decentraland/events-notifier
  role:
  - worker
  data_domain:
  - event-cursors
  dependencies: []
- name: exploration-games
  display_name: Exploration Games
  description: Manages exploration games and related functionality within Decentraland.
    Provides services for game discovery, participation tracking, and reward distribution
    for exploration-based gameplay experiences.
  layer: feature-servers
  repository: https://github.com/decentraland/exploration-games
  role:
  - gateway
  data_domain:
  - exploration-games
  - player-progress
  dependencies:
  - name: reward-server
    relationship: sync
    protocol: HTTP
- name: explorer-automation
  display_name: Explorer Automation
  description: UI automation tests for the Decentraland Explorer client using AltTester
    SDK and NUnit, following the Page Object Model pattern. Provides end-to-end test
    coverage for Explorer UI panels, navigation, and keyboard shortcuts.
  layer: testing
  repository: https://github.com/decentraland/explorer-automation
  role:
  - test
  data_domain: []
  dependencies:
  - name: unity-explorer
    relationship: sync
    protocol: AltTester
- name: gltf-validator-ts
  display_name: GLTF Validator (TypeScript)
  description: TypeScript implementation of GLTF/GLB validation compatible with the
    official Khronos validator. Validates GLTF 2.0 files for specification compliance,
    extension support, and structural correctness with detailed error reporting.
  layer: library
  repository: https://github.com/decentraland/gltf-validator-ts
  role:
  - library
  data_domain: []
  dependencies: []
- name: governance
  display_name: Decentraland DAO Governance
  description: Backend service and frontend application for Decentraland's DAO governance
    hub. Manages proposal lifecycle (creation, voting, enactment), integrates with
    Snapshot for voting, Discourse for forums, Discord for community notifications,
    and tracks voting power across multiple blockchain assets (MANA, LAND, ESTATE,
    NAMES, Wearables).
  layer: feature-servers
  repository: https://github.com/decentraland/governance
  role:
  - gateway
  data_domain:
  - proposals
  - votes
  - badges
  - grants
  - tenders
  - projects
  dependencies: []
- name: governance-ui
  display_name: Decentraland DAO Governance UI
  description: Full-featured governance dApp (served at governance.decentraland.org)
    for the Decentraland DAO. Lets community members browse, create, vote on, and
    track governance proposals, manage funded projects, view DAO transparency data,
    configure push/email notifications, and manage their governance profile. Frontend
    counterpart to the governance backend service.
  layer: Feature Servers Layer
  repository: https://github.com/decentraland/governance-ui
  role:
  - client
  data_domain: []
  dependencies:
  - name: governance
    relationship: sync
    protocol: HTTP
  - name: auth
    relationship: sync
    protocol: HTTP
- name: hashing
  display_name: '@dcl/hashing'
  description: Hashing utilities library that provides content identifier calculation
    functions for Decentraland. Generates IPFSv1 compatible hashes (ba-prefixed) for
    content addressing and ADR-32 compliant entity hashing for on-chain storage.
  layer: Shared Libraries
  repository: https://github.com/decentraland/hashing
  role:
  - library
  data_domain: []
  dependencies: []
- name: internal-tools
  display_name: Decentraland Internal Tools
  description: Internal operations and moderation dashboard for the Decentraland platform.
    Used by platform moderators, community managers, and operations teams to perform
    admin tasks — banning users, managing communities, granting credits, and inspecting
    real-time LiveKit rooms — all gated behind wallet-based authentication and role-specific
    access controls.
  layer: client
  repository: https://github.com/decentraland/internal-tools
  role:
  - client
  data_domain: []
  dependencies:
  - name: comms-gatekeeper
    relationship: sync
    protocol: HTTP
  - name: credits-server
    relationship: sync
    protocol: HTTP
  - name: catalyst
    relationship: sync
    protocol: HTTP
  - name: archipelago-workers
    relationship: sync
    protocol: HTTP
  - name: worlds-content-server
    relationship: sync
    protocol: HTTP
- name: js-sdk-toolchain
  display_name: Decentraland SDK Toolchain
  description: Monorepo containing the core packages for Decentraland's SDK7 and development
    tools. Provides the Entity Component System (ECS), React bindings, runtime definitions,
    and CLI tools for building, testing, and deploying Decentraland scenes using TypeScript/JavaScript.
  layer: library
  repository: https://github.com/decentraland/js-sdk-toolchain
  role:
  - library
  data_domain: []
  dependencies: []
- name: jump-site
  display_name: Jump In Web (Deep Links)
  description: Vite/React SPA (served at jump.decentraland.org) that acts as a deep-link
    entry point into the Decentraland Explorer. Given a position and/or realm passed
    as query parameters, it attempts to launch the desktop Explorer client via the
    decentraland:// custom protocol URI scheme. If the desktop client is not detected
    as installed, it redirects the user to the download or onboarding flow.
  layer: Feature Servers Layer
  repository: https://github.com/decentraland/jump-site
  role:
  - client
  data_domain: []
  dependencies:
  - name: places
    relationship: sync
    protocol: HTTP
  - name: worlds-content-server
    relationship: sync
    protocol: HTTP
  - name: catalyst
    relationship: sync
    protocol: HTTP
  - name: events
    relationship: sync
    protocol: HTTP
  - name: auth
    relationship: sync
    protocol: HTTP
- name: lamb2
  display_name: Lambdas v2
