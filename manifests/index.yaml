schema_version: "1.0"

services:
  - name: archipelago-workers
    display_name: Archipelago Workers
    description: Monorepo containing three services that implement the Archipelago protocol for clustering users into dynamic islands based on their positions in Decentraland's metaverse. Enables scalable crowd management and efficient real-time communication for standalone realms.
    layer: entry-points
    repository: https://github.com/decentraland/archipelago-workers
    dependencies:
      - name: realm-provider
        relationship: sync
      - name: catalyst
        relationship: sync

  - name: architecture
    display_name: Decentraland Architecture Diagram
    description: Repository containing the main Decentraland backend architecture diagram defined using D2 language. Provides comprehensive documentation of architectural layers (Entry Points, Real-Time, Content, Feature Servers), service responsibilities, and communication patterns to help understand how components interact.
    layer: Other
    repository: https://github.com/decentraland/architecture
    dependencies: []

  - name: asset-bundle-converter
    display_name: Asset Bundle Converter
    description: Converts Decentraland scene assets (GLTF models, textures) into optimized Unity Asset Bundles for improved WebGL performance. Monitors deployment events and processes entities by re-importing GLTF files in Unity and packaging them into versioned, compressed Asset Bundles stored on CDN.
    layer: content
    repository: https://github.com/decentraland/asset-bundle-converter
    dependencies:
      - name: catalyst
        relationship: sync
      - name: deployments-to-sqs
        relationship: async
      - name: asset-bundle-registry
        relationship: async

  - name: asset-bundle-registry
    display_name: Asset Bundle Registry
    description: Orchestrates and tracks the availability of optimized Decentraland entities (scenes, worlds, wearables, emotes, profiles). Acts as a state management service coordinating between entity deployments, optimization services, and client requests to ensure optimized content is always available.
    layer: content
    repository: https://github.com/decentraland/asset-bundle-registry
    dependencies:
      - name: deployments-to-sqs
        relationship: async
      - name: asset-bundle-converter
        relationship: async
      - name: worlds-content-server
        relationship: both
      - name: catalyst
        relationship: sync

  - name: atlas-server
    display_name: Atlas Server
    description: Provides REST API for querying Decentraland's Genesis City map data (parcels, estates, districts) and generating map visualizations as PNG images. Serves as the data layer for the Decentraland Atlas interface.
    layer: feature-servers
    repository: https://github.com/decentraland/atlas-server
    dependencies: []

  - name: auth-server
    display_name: Auth Server
    description: Facilitates secure communication between the Decentraland desktop client and browser-based authentication dApp. Enables the desktop client to execute wallet operations (transactions, signatures) using the user's browser wallet through a request-response relay pattern.
    layer: feature-servers
    repository: https://github.com/decentraland/auth-server
    dependencies: []

  - name: badges
    display_name: Badges
    description: Manages user achievements (badges) within the Decentraland ecosystem. Tracks user actions both in-world and on-platform to grant badges, publishes badge-granted events, and provides APIs for querying badge definitions and user achievements.
    layer: feature-servers
    repository: https://github.com/decentraland/badges
    dependencies:
      - name: events-notifier
        relationship: async
      - name: notifications-workers
        relationship: async
      - name: catalyst
        relationship: sync
      - name: deployments-to-sqs
        relationship: async

  - name: block-indexer
    display_name: Block Indexer Library
    description: TypeScript component library that finds the blockchain block that was at the tip of the blockchain at a given timestamp. Provides efficient timestamp-to-block-number lookup with caching for Ethereum and other EVM-compatible chains, essential for historical queries and timestamp-based content validation.
    layer: Shared Libraries
    repository: https://github.com/decentraland/block-indexer
    dependencies: []

  - name: camera-reel-service
    display_name: Camera Reel Service
    description: Manages camera images captured from Decentraland Explorer. Provides upload, storage, retrieval, and metadata management for user-generated screenshots with visibility controls and place associations.
    layer: feature-servers
    repository: https://github.com/decentraland/camera-reel-service
    dependencies: []

  - name: catalyst-contracts
    display_name: Catalyst Contracts Library
    description: TypeScript library providing smart contract addresses and ABIs for Decentraland blockchain contracts across multiple networks (Ethereum mainnet, Sepolia, Polygon, Mumbai, Amoy). Centralizes contract deployment information including LAND, Collections, Third Party Registry, POI, MANA token, Catalyst contracts, and name denylist across L1 and L2 networks.
    layer: Shared Libraries
    repository: https://github.com/decentraland/catalyst-contracts
    dependencies: []

  - name: catalyst-storage
    display_name: "@dcl/catalyst-storage"
    description: Storage abstraction library providing unified API for file storage across multiple backends (S3, filesystem, in-memory). Handles content streaming, compression, and metadata for Catalyst content servers.
    layer: shared-library
    repository: https://github.com/decentraland/catalyst-storage
    dependencies: []

  - name: catalyst
    display_name: Catalyst
    description: Monorepo containing the core Catalyst server implementation. Catalyst servers are the decentralized content infrastructure for Decentraland, bundling multiple services (Content Server, Lambdas, BFF, Archipelago) to provide entity storage, content delivery, peer communication, and client APIs.
    layer: content
    repository: https://github.com/decentraland/catalyst
    dependencies:
      - name: archipelago-workers
        relationship: both

  - name: comms-gatekeeper
    display_name: Comms Gatekeeper
    description: Acts as the guardian of LiveKit tokens within Decentraland's communication architecture. Processes signed fetch requests from clients and generates tokens that grant access to LiveKit rooms dedicated to specific scenes or worlds. Manages scene administration, streaming access, voice chat, and user moderation.
    layer: real-time
    repository: https://github.com/decentraland/comms-gatekeeper
    dependencies:
      - name: catalyst
        relationship: sync
      - name: social-service-ea
        relationship: sync
      - name: comms-message-sfu
        relationship: sync

  - name: comms-message-sfu
    display_name: Comms Message SFU
    description: Real-time message routing and validation service for Decentraland's LiveKit communications infrastructure. Acts as a LiveKit participant that receives directed chat messages, validates community context, and re-publishes them to appropriate recipients.
    layer: real-time
    repository: https://github.com/decentraland/comms-message-sfu
    dependencies:
      - name: social-service-ea
        relationship: sync
      - name: comms-gatekeeper
        relationship: sync

  - name: content-validator
    display_name: Content Validator Library
    description: Decentraland entity deployment validation library for Catalyst servers that provides comprehensive validation functions for entity structure, metadata, access permissions, content integrity, and size constraints. Ensures only valid and authorized content is deployed to the Decentraland content network.
    layer: Shared Libraries
    repository: https://github.com/decentraland/content-validator
    dependencies: []

  - name: core-components
    display_name: Core Components Library
    description: Monorepo of reusable TypeScript components and utilities for the Decentraland backend ecosystem. Provides standardized implementations for infrastructure concerns including HTTP servers, databases, caching, messaging, observability, and distributed tracing that are shared across multiple Decentraland services.
    layer: Shared Libraries
    repository: https://github.com/decentraland/core-components
    dependencies: []

  - name: credits-server
    display_name: Credits Server
    description: Manages user credits system for Decentraland, integrating on-chain credit consumption tracking with off-chain credit grants. Handles credit issuance, tracking, expiration, and status calculation by combining database-stored grants with Squid indexer on-chain consumption data.
    layer: feature-servers
    repository: https://github.com/decentraland/credits-server
    dependencies: []

  - name: decentraland-crypto-middleware
    display_name: "Decentraland Crypto Middleware"
    description: Multi-framework authentication middleware for verifying requests signed with @decentraland/SignedFetch. Provides integrations for Express, Koa, PassportJS, and Well-Known Components to authenticate Decentraland users via cryptographic signature verification.
    layer: shared-library
    repository: https://github.com/decentraland/decentraland-crypto-middleware
    dependencies:
      - name: catalyst
        relationship: sync

  - name: deployments-to-sqs
    display_name: Deployments to SQS
    description: Monitors Catalyst content servers for new entity deployments and publishes deployment events to AWS SNS. Acts as the event source for downstream optimization services that process wearables, emotes, and scenes.
    layer: feature-servers
    repository: https://github.com/decentraland/deployments-to-sqs
    dependencies:
      - name: catalyst
        relationship: sync

  - name: events-notifier
    display_name: Events Notifier
    description: Monitors blockchain events and publishes notifications to internal event-driven systems. Runs scheduled cron jobs that query The Graph subgraphs to detect marketplace transactions, rentals, and royalties, then publishes structured events for downstream consumers.
    layer: feature-servers
    repository: https://github.com/decentraland/events-notifier
    dependencies: []

  - name: events
    display_name: Community Events
    description: Full-stack web application that manages community events within the Decentraland virtual world. Allows users to create, discover, and attend events in both land-based locations (Genesis City) and virtual worlds, providing a dApp interface with recurrent events, schedules, notifications, and social sharing capabilities.
    layer: Feature Servers Layer
    repository: https://github.com/decentraland/events
    dependencies:
      - name: catalyst
        relationship: sync
      - name: social-service-ea
        relationship: sync
      - name: notifications-workers
        relationship: async
      - name: events-notifier
        relationship: async
      - name: worlds-content-server
        relationship: sync
      - name: badges
        relationship: async

  - name: exploration-games
    display_name: Exploration Games
    description: Manages exploration games and related functionality within Decentraland. Provides services for game discovery, participation tracking, and reward distribution for exploration-based gameplay experiences.
    layer: feature-servers
    repository: https://github.com/decentraland/exploration-games
    dependencies: []

  - name: hashing
    display_name: "@dcl/hashing"
    description: Hashing utilities library that provides content identifier calculation functions for Decentraland. Generates IPFSv1 compatible hashes (ba-prefixed) for content addressing and ADR-32 compliant entity hashing for on-chain storage.
    layer: shared-library
    repository: https://github.com/decentraland/hashing
    dependencies: []

  - name: lamb2
    display_name: Lambdas v2
    description: Provides utility APIs for Decentraland clients to interact with Catalyst Content Servers. Replaces the legacy lambdas service with improved architecture, offering entity resolution, ownership validation, asset queries, and client helper functions.
    layer: content
    repository: https://github.com/decentraland/lamb2
    dependencies:
      - name: catalyst
        relationship: sync

  - name: linker-server
    display_name: Linker Server
    description: Acts as an intermediary for deploying content to Decentraland's Catalyst network. Validates authorization for specific parcels and proxies upload requests to Catalyst with server-signed authentication.
    layer: feature-servers
    repository: https://github.com/decentraland/linker-server
    dependencies:
      - name: catalyst
        relationship: sync

  - name: marketplace-server
    display_name: Marketplace Server
    description: Provides comprehensive marketplace APIs for the Decentraland Marketplace. Enables browsing, searching, and interacting with NFTs (wearables, emotes, LAND, estates, ENS names), managing trades and orders, and accessing marketplace analytics.
    layer: feature-servers
    repository: https://github.com/decentraland/marketplace-server
    dependencies: []

  - name: notifications-workers
    display_name: Notifications Workers
    description: Manages user notifications across the Decentraland platform. Split into Processor and Inbox workers for scalability. Handles notification production, storage, delivery via Server-Sent Events, and email notifications via SendGrid.
    layer: feature-servers
    repository: https://github.com/decentraland/notifications-workers
    dependencies:
      - name: events-notifier
        relationship: async

  - name: platform-crypto-middleware
    display_name: Platform Authentication Middleware
    description: Multi-framework HTTP middleware library for authenticating requests signed with @decentraland/SignedFetch. Validates cryptographic signatures (AuthChain) in HTTP headers to verify request authenticity and extract wallet addresses, supporting optional and required authentication modes.
    layer: Shared Libraries
    repository: https://github.com/decentraland/platform-crypto-middleware
    dependencies: []

  - name: police-server
    display_name: Police Server
    description: Moderation and monitoring service for Decentraland's voice communications. Monitors LiveKit rooms, enforces rate limits to prevent spam, and automatically revokes permissions from abusive participants.
    layer: real-time
    repository: https://github.com/decentraland/police-server
    dependencies: []

  - name: profile-images
    display_name: Profile Images
    description: Generates 2D profile images (body and face) from 3D avatar models. Uses producer-consumer pattern to monitor profile changes and render avatar images for display in applications and user interfaces.
    layer: feature-servers
    repository: https://github.com/decentraland/profile-images
    dependencies:
      - name: catalyst
        relationship: sync

  - name: prometheus-nats-exporter
    display_name: Prometheus NATS Exporter
    description: Docker wrapper for the official NATS Prometheus exporter that exposes NATS messaging metrics for Prometheus monitoring. Runs as a sidecar container alongside NATS servers to provide observability into message broker performance and health.
    layer: Other
    repository: https://github.com/decentraland/prometheus-nats-exporter
    dependencies:
      - name: NATS Server
        relationship: sync

  - name: protocol
    display_name: Protocol Definitions
    description: Protobuf protocol definitions for Decentraland that define the communication contracts between client, kernel, Unity renderer, SDK toolchain, and comms services. Provides code generation for TypeScript and other languages to ensure type-safe cross-service and cross-platform communication.
    layer: Shared Libraries
    repository: https://github.com/decentraland/protocol
    dependencies: []

  - name: realm-provider
    display_name: Realm Provider
    description: Provides realm configuration service for Decentraland clients. Implements ADR-110 realm descriptions, enabling clients to discover and connect to available Catalyst nodes, Lambdas services, and communication realms.
    layer: feature-servers
    repository: https://github.com/decentraland/realm-provider
    dependencies:
      - name: catalyst
        relationship: sync
      - name: archipelago-workers
        relationship: sync

  - name: reels
    display_name: "Reels Frontend"
    description: Gatsby-based static site frontend for viewing and sharing Decentraland user snapshots (reels). Displays photo metadata including location, visible users, wearables, and realm information with Open Graph support for social media sharing. Deployed to Cloudflare Workers.
    layer: entry-points
    repository: https://github.com/decentraland/reels
    dependencies:
      - name: camera-reel-service
        relationship: sync
      - name: urn-resolver
        relationship: sync

  - name: referral
    display_name: Reward Services
    description: Comprehensive reward and campaign management system for the Decentraland ecosystem that enables creation of reward campaigns, distribution of NFTs and tokens, management of referral codes, blockchain transaction handling, and tracking of user referrals with support for multiple blockchain networks (Ethereum, Polygon).
    layer: Feature Servers Layer
    repository: https://github.com/decentraland/referral
    dependencies:
      - name: catalyst
        relationship: sync
      - name: archipelago-workers
        relationship: sync

  - name: schemas
    display_name: Decentraland Schemas
    description: Shared TypeScript type definitions and JSON Schema validators for all Decentraland data structures. Provides compile-time type safety and runtime validation for entities, profiles, scenes, wearables, events, and marketplace data across the entire platform.
    layer: shared-library
    repository: https://github.com/decentraland/schemas
    dependencies: []

  - name: snapshots-fetcher
    display_name: "@dcl/snapshots-fetcher"
    description: Component library for fetching and synchronizing entity snapshots from Catalyst content servers. Downloads entity deployments with their content files, supports incremental snapshot synchronization, and provides resilient fetching with retry logic and queue management.
    layer: shared-library
    repository: https://github.com/decentraland/snapshots-fetcher
    dependencies:
      - name: catalyst
        relationship: sync

  - name: social-service-ea
    display_name: Social Service EA
    description: Microservice handling social interactions for Decentraland. Enables users to create and manage communities, connect with friends, participate in voice chats, and engage in social activities within the metaverse.
    layer: feature-servers
    repository: https://github.com/decentraland/social-service-ea
    dependencies:
      - name: catalyst
        relationship: sync
      - name: comms-gatekeeper
        relationship: sync
      - name: archipelago-workers
        relationship: sync

  - name: urn-resolver
    display_name: "@dcl/urn-resolver"
    description: TypeScript library that resolves and parses Decentraland asset URNs within the urn:decentraland namespace. Provides type-safe parsing of LAND, wearables, collections v1/v2, and third-party assets for ownership validation and content URL generation.
    layer: shared-library
    repository: https://github.com/decentraland/urn-resolver
    dependencies: []

  - name: world-storage-service
    display_name: World Storage Service
    description: Provides secure, isolated storage and environment variable access for Decentraland worlds. Acts as an API gateway for persistent storage and secrets management for Authoritative Servers running server-side scene code.
    layer: feature-servers
    repository: https://github.com/decentraland/world-storage-service
    dependencies:
      - name: worlds-content-server
        relationship: sync

  - name: worlds-content-server
    display_name: Worlds Content Server
    description: Content server specifically for Decentraland Worlds (named scenes). Enables deployment and retrieval of world scenes identified by DCL names rather than parcel coordinates. Supports global portable experiences and single-scene loading.
    layer: content
    repository: https://github.com/decentraland/worlds-content-server
    dependencies: []
