  description: The main Decentraland homepage at decentraland.org. Gatsby-based static
    site rendering the primary marketing landing page with CMS-driven content about
    the platform, creators, and community. Includes download pages for Explorer and
    Creator Hub, event listings, creator-focused pages, Discord invite, press/help
