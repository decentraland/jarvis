- name: rpc-gateway
  display_name: Decentraland RPC Gateway
  description: >-
    Decentraland's hosted JSON-RPC gateway, reachable at https://rpc.decentraland.org/<network>, used to read from and
    interact with EVM chains (and the Decentraland contracts deployed on them) without depending on a third-party RPC
    provider. This is shared platform infrastructure, not a code repository — the endpoint is documented as the
    preferred RPC in the smart-contracts-workspace AI Agent Context. Any service, dApp, tool, script, or agent that
    needs to perform a blockchain query (eth_call, eth_getLogs, balance/allowance reads, broadcasting a signed
    transaction, etc.) against a Decentraland-supported network should route it through this gateway. It is the "how to
    reach it" half of a blockchain query; pair it with the `contracts` registry, which is the "what address" half.
