schema_version: "1.1"

service:
  name: auth
  display_name: Decentraland Auth UI
  description: Browser-based authentication dApp that enables wallet operations for the Decentraland desktop client. Partners with auth-server to execute wallet method calls (transactions, signatures) in the user's browser wallet through Socket.IO and HTTP relay patterns.
  owner: dapps
  repository: https://github.com/decentraland/auth
  language: typescript
  layer: feature-servers
  role:
    - client
  data_domain: []
  ai-agent-context: ""

domain:
  glossary:
    - term: Wallet Method Call
      definition: Request to execute an Ethereum operation (eth_sendTransaction, personal_sign, dcl_personal_sign) in the user's browser wallet

    - term: Request ID
      definition: Unique identifier for an authentication request that links desktop client and browser execution

    - term: Verification Code
      definition: Visual confirmation number displayed on both desktop and browser to verify they are processing the same request

    - term: Avatar Setup
      definition: Process for creating or updating user avatar with wearables and customization

    - term: Mobile Auth
      definition: Authentication flow for mobile devices using OAuth and Magic Link

  concept_relationships:
    internal:
      - from: Request ID
        to: Verification Code
        relationship: has_one
        description: Each request includes a verification code for visual confirmation

    cross_service:
      - local_concept: Wallet Method Call
        remote_service: auth-server
        remote_concept: Authentication Request
        mapping_type: equivalent
        description: Browser executes wallet method calls relayed from auth-server

      - local_concept: Avatar Setup
        remote_service: catalyst
        remote_concept: Profile
        mapping_type: projects_as
        description: Avatar changes are published to Catalyst as profile updates

  invariants: []

  responsibilities:
    - Display pending authentication requests from desktop client via auth-server
    - Execute wallet method calls in user's browser wallet
    - Show verification codes for request confirmation
    - Relay execution results back through auth-server to desktop client
    - Handle avatar setup and customization flow
    - Manage mobile authentication using OAuth providers
    - Provide login interface for wallet connection
    - Handle wearable preview and selection

  out_of_scope:
    - Request storage and lifecycle management (handled by auth-server)
    - Profile storage (handled by Catalyst)
    - Wallet operations themselves (handled by browser wallet extensions)

  owned_entities: []

api:
  openapi_url: ""

db:
  schema_url: ""

dependencies:
  services:
    - name: auth-server
      relationship: both
      protocol: WebSocket
      purpose: Receive authentication requests and relay wallet execution results
      critical: true

    - name: auth-server
      relationship: sync
      protocol: HTTP
      purpose: HTTP polling alternative for authentication requests
      critical: true

    - name: catalyst
      relationship: sync
      protocol: HTTP
      purpose: Fetch and update user profiles and avatars
      critical: true

    - name: builder-server
      relationship: sync
      protocol: HTTP
      purpose: Fetch wearable and asset data for avatar setup
      critical: false

    - name: events-notifier
      relationship: sync
      protocol: HTTP
      purpose: Track user onboarding events
      critical: false

    - name: social-service-ea
      relationship: sync
      protocol: HTTP
      purpose: Referral system integration
      critical: false

    - name: transactions-api
      relationship: sync
      protocol: HTTP
      purpose: Meta-transaction support for gasless transactions
      critical: false

  external:
    - name: Ethereum Wallet
      purpose: Execute wallet operations in browser (MetaMask, WalletConnect, etc.)
      type: other

    - name: Magic Link
      purpose: OAuth-based authentication for mobile devices
      type: api

    - name: Segment
      purpose: Analytics and user behavior tracking
      type: api

    - name: Sentry
      purpose: Error tracking and monitoring
      type: api

    - name: Intercom
      purpose: User support chat widget
      type: api

    - name: Feature Flags Service
      purpose: Feature toggle management
      type: api

    - name: Wearable Preview Service
      purpose: Render previews of wearables and avatar customizations
      type: api

events:
  publishes: []
  consumes: []

configuration:
  feature_flags: []
  
  key_env_vars:
    - name: VITE_REACT_APP_DCL_DEFAULT_ENV
      description: Default environment (dev, stg, prod) selected at build time
      affects: Configuration selection from config/env/*.json

    - name: AUTH_SERVER_URL
      description: Auth server WebSocket and HTTP endpoint
      affects: Authentication request relay and wallet method execution

    - name: BUILDER_SERVER_URL
      description: Builder server API endpoint
      affects: Wearable and asset data fetching

    - name: DOWNLOAD_URL
      description: Desktop client download URL
      affects: Download link for desktop application

    - name: EVENTS_NOTIFIER_URL
      description: Events notifier API endpoint
      affects: User onboarding event tracking

    - name: FEATURE_FLAGS_URL
      description: Feature flags service endpoint
      affects: Feature toggle management

    - name: FEATURE_FLAGS_INTERVAL
      description: Polling interval for feature flags refresh (milliseconds)
      affects: Feature flag update frequency

    - name: INTERCOM_APP_ID
      description: Intercom support widget ID
      affects: User support chat integration

    - name: META_TRANSACTION_SERVER_URL
      description: Meta-transaction API endpoint (transactions-api)
      affects: Gasless transaction support

    - name: PEER_URL
      description: Catalyst peer URL
      affects: Profile and avatar data fetching

    - name: PLACES_API_URL
      description: Places API endpoint
      affects: Location and place data

    - name: PROFILE_CONSISTENCY_CHECK_TIMEOUT
      description: Timeout in milliseconds for profile consistency checks
      affects: Avatar update validation timing

    - name: REFERRAL_SERVER_URL
      description: Referral server API endpoint (social-service-ea)
      affects: Referral system integration

    - name: SEGMENT_API_KEY
      description: Segment analytics write key
      affects: Analytics tracking

    - name: SENTRY_DSN
      description: Sentry error monitoring DSN
      affects: Error tracking for web

    - name: SENTRY_DSN_MOBILE
      description: Sentry error monitoring DSN for mobile
      affects: Error tracking for mobile devices

    - name: WEARABLE_PREVIEW_URL
      description: Wearable preview service endpoint
      affects: Avatar customization preview rendering

    - name: ENVIRONMENT
      description: Environment name (dev, stg, prod)
      affects: Environment-specific behavior and logging

adrs: []
