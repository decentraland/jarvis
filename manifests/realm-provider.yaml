schema_version: "1.1"

service:
  name: realm-provider
  display_name: Realm Provider
  description: Provides realm configuration service for Decentraland clients. Implements ADR-110 realm descriptions, enabling clients to discover and connect to available Catalyst nodes, Lambdas services, and communication realms.
  owner: core-engineering
  repository: https://github.com/decentraland/realm-provider
  language: typescript
  layer: feature-servers
  role:
    - discovery
  data_domain:
    - realms
  ai-agent-context: https://github.com/decentraland/realm-provider/blob/main/docs/ai-agent-context.md

domain:
  glossary:
    - term: Realm
      definition: Communication/render configuration specifying which Catalyst, Lambdas, and comms services to use for client connections. The realm is a description layer only — it tells clients where to connect, not whether they are authorized.

    - term: MAIN Realm
      definition: Default realm managed by Archipelago workers for Genesis City communication.

    - term: Hot Scenes
      definition: Popular/active scenes for user discovery and realm selection.

  concept_relationships:
    cross_service:
      - local_concept: Realm
        remote_service: catalyst
        remote_concept: Catalyst Node
        mapping_type: references
        description: Realms specify which Catalyst nodes clients should connect to

      - local_concept: MAIN Realm
        remote_service: archipelago-workers
        remote_concept: Archipelago Configuration
        mapping_type: equivalent
        description: MAIN realm configuration comes from Archipelago workers

  responsibilities:
    - List available realms in Catalyst Network
    - Provide realm descriptions with service endpoints
    - Expose hot scenes data
    - Provide MAIN realm information
    - Enable dynamic realm selection and load balancing

  out_of_scope:
    - Comms access control and gatekeeping (handled by comms-gatekeeper for Genesis City and worlds-content-server for Worlds)
    - LiveKit token issuance and room management
    - User validation and authentication
    - State management (service is stateless and aggregates configuration from other services)

  owned_entities: []

api:
  openapi_url: https://github.com/decentraland/realm-provider/blob/main/docs/openapi.yaml

dependencies:
  services:
    - name: catalyst
      relationship: sync
      protocol: HTTP
      purpose: Queries Catalyst nodes for scene entities and realm information
      critical: true

    - name: archipelago-workers
      relationship: both
      protocol: HTTP
      purpose: MAIN realm status and configuration (stats and ws-connector services)
      critical: true

  external:
    - name: Content Client
      purpose: DCL Catalyst Client library for fetching content entities
      type: api

events:
  publishes: []
  consumes: []

configuration:
  key_env_vars:
    - name: ARCHIPELAGO_STATS_URL
      description: URL for archipelago stats service (core status and user counts)
      affects: MAIN realm availability and user counts

    - name: ARCHIPELAGO_WS_CONNECTOR_URL
      description: URL for archipelago WebSocket connector
      affects: MAIN realm adapter configuration

    - name: CONTENT_URL
      description: Catalyst content server URL for fetching scene entities
      affects: Scene and thumbnail retrieval

    - name: ETH_NETWORK
      description: Ethereum network (mainnet, sepolia)
      affects: Blockchain network selection

    - name: BLACKLISTED_CATALYST
      description: Semicolon-separated list of blacklisted Catalyst URLs
      affects: Catalyst node filtering

    - name: HTTP_SERVER_HOST
      description: HTTP server host
      affects: Server listening address

    - name: HTTP_SERVER_PORT
      description: HTTP server port
      affects: Server listening port

    - name: HTTP_BASE_URL
      description: Public base URL (auto-detected if not set)
      affects: URL generation in responses

    - name: WKC_METRICS_RESET_AT_NIGHT
      description: Whether to reset metrics at 00:00 UTC
      affects: Metrics behavior

    - name: COMMIT_HASH
      description: Git commit hash for version tracking (optional)
      affects: Service version information

    - name: CURRENT_VERSION
      description: Service version number (optional)
      affects: Service version information

adrs:
  - id: ADR-110
    title: Realm Descriptions
    url: https://adr.decentraland.org/adr/ADR-110
    relevance: Defines realm configuration format and API
