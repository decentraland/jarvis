schema_version: "1.1"

service:
  name: "profile"
  display_name: "Decentraland Profile UI"
  description: "Vite+React SPA (served at profile.decentraland.org) that displays public user profiles within the Decentraland ecosystem. Shows a player's avatar, owned wearables and NFTs, creations (published items), Decentraland Worlds they own, referral rewards, and social relationships (friends, mutual friends, blocked users). Acts as the public-facing identity page for any Decentraland wallet address."
  owner: "decentraland-foundation"
  repository: "https://github.com/decentraland/profile"
  language: "typescript"
  layer: "Feature Servers Layer"
  role:
    - "client"
  data_domain: []
  ai-agent-context: "https://github.com/decentraland/profile/blob/master/docs/ai-agent-context.md"

domain:
  glossary:
    - term: "Profile"
      definition: "A user's public identity in Decentraland, consisting of avatar configuration, display name, connected social accounts, and owned digital assets (wearables, emotes, names)."
      examples: []
      not_to_be_confused_with: ""
    - term: "Avatar"
      definition: "The 3D representation of a user in Decentraland, customizable with wearables and emotes."
      examples: []
      not_to_be_confused_with: ""
    - term: "Wearable"
      definition: "A virtual clothing or accessory item that can be equipped on an avatar (hats, shoes, outfits, accessories)."
      examples: []
      not_to_be_confused_with: "Emote"
    - term: "Emote"
      definition: "An animation that avatars can perform to express emotions or actions (dance, wave, clap)."
      examples: []
      not_to_be_confused_with: "Wearable"
    - term: "Decentraland Name"
      definition: "A unique username (ENS name) registered on Ethereum that serves as a user's display name in Decentraland."
      examples:
        - "myname.dcl.eth"
      not_to_be_confused_with: "Avatar display name"
    - term: "Referral Program"
      definition: "A system that rewards users for inviting new users to Decentraland, tracked and managed through the referral server."
      examples: []
      not_to_be_confused_with: ""

  concept_relationships:
    internal:
      - from: "Profile"
        to: "Avatar"
        relationship: "has_one"
        description: "Each profile has a single avatar configuration"
      - from: "Profile"
        to: "Wearable"
        relationship: "has_many"
        description: "A profile owns multiple wearable items that can be equipped on the avatar"
      - from: "Profile"
        to: "Emote"
        relationship: "has_many"
        description: "A profile owns multiple emote animations"
      - from: "Profile"
        to: "Decentraland Name"
        relationship: "has_one"
        description: "A profile may have one registered Decentraland name (ENS)"

    cross_service:
      - local_concept: "Profile"
        remote_service: "catalyst"
        remote_concept: "Avatar Profile"
        mapping_type: "equivalent"
        description: "Profile data is fetched and updated via catalyst's peer lambdas endpoint"
      - local_concept: "Friend"
        remote_service: "social-service-ea"
        remote_concept: "Friendship"
        mapping_type: "equivalent"
        description: "Friend management is handled through social-service-ea's gRPC API"
      - local_concept: "Wearable"
        remote_service: "marketplace-server"
        remote_concept: "NFT"
        mapping_type: "references"
        description: "Wearable ownership and metadata are queried from marketplace-server API"
      - local_concept: "Referral Progress"
        remote_service: "social-api"
        remote_concept: "Referral"
        mapping_type: "references"
        description: "Referral program progress is tracked and managed via social-api referral endpoints"

  invariants: []

  responsibilities:
    - Avatar rendering - display a player's 3D avatar with equipped wearables
    - Wearables and NFTs - paginated, filterable inventory of owned items from the Decentraland Marketplace
    - Creations - list of wearable/emote items the user has published as a creator
    - Worlds - display Decentraland Worlds owned or deployed by the user
    - Friendship actions - send/cancel/accept friend requests and block/unblock users via @dcl/social-rpc-client
    - Friends counter and mutual friends counter display
    - Referral system - show the user's referral tier, progress toward rewards, and claimed reward images
    - Identity - resolve wallet address to display name, has-claimed-name status, and linked accounts
    - Feature flags - runtime feature toggling
    - Analytics - page and event tracking via Segment
    - Internationalization - react-intl for UI strings
    - Tab navigation - support for overview, wearables, nfts, creations, worlds tabs

  out_of_scope:
    - Event management (handled by Events service at events.decentraland.org)
    - Community creation or moderation (handled by Social service at social.decentraland.org)
    - Reward distribution and campaign management (handled by Referral/Rewards service at rewards.decentraland.org)
    - Marketplace trading - buying, selling, bidding (handled by Marketplace app)
    - In-world avatar customization (handled by Decentraland Explorer)
    - Storing or hosting avatar data (handled by catalyst)
    - Processing friend requests or social graph logic (handled by social-service-ea)

  owned_entities: []

api:
  openapi_url: ""

db:
  schema_url: ""

dependencies:
  services:
    - name: "catalyst"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Fetch user profile/avatar data via PEER_URL lambdas endpoint"
      critical: true

    - name: "social-service-ea"
      relationship: "both"
      protocol: "WebSocket"
      purpose: "Real-time friendship and block operations via SOCIAL_RPC_URL using @dcl/social-rpc-client"
      critical: true

    - name: "marketplace-server"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "REST API for NFTs, wearable catalog, orders, rentals via MARKETPLACE_SERVER_URL"
      critical: true

    - name: "worlds-content-server"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "List of Worlds owned by a wallet via WORLDS_CONTENT_SERVER_URL"
      critical: false

    - name: "credits-server"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Query user's credit balance and credit-related information via CREDITS_SERVER_URL"
      critical: false

    - name: "referral"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Referral progress and reward tiers via REFERRAL_SERVER_URL"
      critical: false

    - name: "auth"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Decentraland wallet-based SSO via AUTH_URL"
      critical: true

  external:
    - name: "The Graph (Marketplace Subgraph)"
      purpose: "On-chain collection data via MARKETPLACE_GRAPH_URL"
      type: "api"

    - name: "Segment"
      purpose: "Analytics and event tracking via SEGMENT_API_KEY"
      type: "api"

    - name: "Sentry"
      purpose: "Error tracking and monitoring via SENTRY_DSN"
      type: "api"

    - name: "Wearable Preview Service"
      purpose: "3D avatar/item preview renderer via WEARABLE_PREVIEW_URL"
      type: "api"

events:
  publishes: []
  consumes: []

configuration:
  feature_flags: []

  key_env_vars:
    - name: "VITE_REACT_APP_DCL_DEFAULT_ENV"
      description: "Active environment (dev, stg, or prd) selected at build time"
      affects: "Configuration selection from config/env/*.json"

    - name: "PEER_URL"
      description: "Catalyst peer URL for profile/avatar data"
      affects: "Profile data retrieval via lambdas endpoint"

    - name: "SOCIAL_RPC_URL"
      description: "WebSocket URL for Social RPC service"
      affects: "Real-time friendship and block operations via @dcl/social-rpc-client"

    - name: "MARKETPLACE_SERVER_URL"
      description: "Marketplace REST API base URL"
      affects: "NFT and wearable data queries"

    - name: "MARKETPLACE_GRAPH_URL"
      description: "The Graph subgraph URL for collections"
      affects: "On-chain collection data queries"

    - name: "WORLDS_CONTENT_SERVER_URL"
      description: "Worlds Content Server API URL"
      affects: "World information retrieval"

    - name: "CREDITS_SERVER_URL"
      description: "Credits server URL"
      affects: "Credit balance queries"

    - name: "REFERRAL_SERVER_URL"
      description: "Referral progress API base URL"
      affects: "Referral tier and progress data"

    - name: "WEARABLE_PREVIEW_URL"
      description: "Wearable/avatar 3D preview service URL"
      affects: "Avatar and item preview rendering"

    - name: "AUTH_URL"
      description: "SSO auth endpoint"
      affects: "Wallet-based authentication flows"

    - name: "SEGMENT_API_KEY"
      description: "Segment analytics write key"
      affects: "Analytics and event tracking"

    - name: "SENTRY_DSN"
      description: "Sentry error reporting DSN"
      affects: "Error monitoring"

    - name: "EXPLORER_URL"
      description: "Decentraland Explorer (play) URL"
      affects: "Links to enter the virtual world"

    - name: "MARKETPLACE_URL"
      description: "Marketplace frontend URL"
      affects: "Links to marketplace"

    - name: "BUILDER_URL"
      description: "Builder application URL"
      affects: "Links to builder tool"

    - name: "DOCS_URL"
      description: "Decentraland documentation URL"
      affects: "Help and documentation links"

    - name: "SYNAPSE_URL"
      description: "Synapse social platform URL"
      affects: "Social platform navigation"

    - name: "INVITE_REFERRER_URL"
      description: "Invite referrer page URL"
      affects: "Referral invitation links"

    - name: "PROFILE_URL"
      description: "Profile site URL (self-referential)"
      affects: "Profile navigation and canonical URLs"

    - name: "CHAIN_ID"
      description: "Ethereum chain ID (1 = mainnet, 11155111 = Sepolia)"
      affects: "Blockchain network selection"

    - name: "NETWORK"
      description: "Network identifier (MAINNET, SEPOLIA)"
      affects: "Network-specific behavior"

    - name: "ENVIRONMENT"
      description: "Environment name (dev, stg, prd)"
      affects: "Environment-specific behavior and logging"

adrs: []
