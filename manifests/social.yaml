schema_version: "1.1"

service:
  name: "social"
  display_name: "Decentraland Social dApp"
  description: "The web interface for Decentraland social features, enabling users to discover, create, and manage communities. Provides functionality for viewing community profiles, member management, event listings, and community requests. Integrates with social-service-ea backend for social graph and community data."
  owner: "decentraland-foundation"
  repository: "https://github.com/decentraland/social"
  language: "typescript"
  layer: "client"
  role:
    - "client"
  data_domain: []
  ai-agent-context: ""

domain:
  glossary:
    - term: "Community"
      definition: "A social group in Decentraland where users can join, interact, and participate in shared activities. Communities have members, roles, and events."
      examples:
        - "Art Gallery Community"
        - "Gaming Guild"
      not_to_be_confused_with: ""
    - term: "Community Member"
      definition: "A user who has joined a community and has a specific role (member, moderator, admin)."
      examples: []
      not_to_be_confused_with: ""
    - term: "Community Request"
      definition: "A request to join a community that requires approval from community administrators or moderators. Can be pending, approved, rejected, or cancelled."
      examples: []
      not_to_be_confused_with: ""
    - term: "Community Event"
      definition: "An event organized by a community, displayed in the community's event feed with details like time, location, and description."
      examples: []
      not_to_be_confused_with: "Platform-wide event"
    - term: "Request Type"
      definition: "The type of community request: REQUEST_TO_JOIN (user requests to join community) or INVITE (community invites a user)."
      examples: []
      not_to_be_confused_with: ""
    - term: "Request Status"
      definition: "The status of a community request: PENDING, APPROVED, REJECTED, or CANCELLED."
      examples: []
      not_to_be_confused_with: ""
    - term: "Role"
      definition: "A user's permission level within a community: MEMBER (basic access), MODERATOR (can manage members), or ADMIN (full control)."
      examples: []
      not_to_be_confused_with: ""

  concept_relationships:
    internal:
      - from: "Community"
        to: "Community Member"
        relationship: "has_many"
        description: "A community has multiple members with different roles"
      - from: "Community"
        to: "Community Event"
        relationship: "has_many"
        description: "A community can organize multiple events"
      - from: "Community Member"
        to: "Role"
        relationship: "has_one"
        description: "Each community member has one role (member, moderator, or admin)"
      - from: "Community Request"
        to: "Request Type"
        relationship: "has_one"
        description: "Each request has a type (join request or invite)"
      - from: "Community Request"
        to: "Request Status"
        relationship: "has_one"
        description: "Each request has a status (pending, approved, rejected, cancelled)"

    cross_service:
      - local_concept: "Community"
        remote_service: "social-service-ea"
        remote_concept: "Community"
        mapping_type: "equivalent"
        description: "Community data is fetched from and managed via social-service-ea backend API"
      - local_concept: "Community Member"
        remote_service: "social-service-ea"
        remote_concept: "Community Member"
        mapping_type: "equivalent"
        description: "Member data and relationships are managed by social-service-ea"
      - local_concept: "Community Request"
        remote_service: "social-service-ea"
        remote_concept: "Membership Request"
        mapping_type: "equivalent"
        description: "Join requests and invites are processed through social-service-ea"
      - local_concept: "Community Event"
        remote_service: "events"
        remote_concept: "Event"
        mapping_type: "references"
        description: "Community events are fetched from the events service API"
      - local_concept: "Profile"
        remote_service: "catalyst"
        remote_concept: "Avatar Profile"
        mapping_type: "references"
        description: "User profile data is fetched from catalyst peer lambdas"

  invariants:
    - rule: "A user can only have one role per community at a time"
      enforced_at: "domain_layer"
      severity: "hard"
    - rule: "A user cannot create duplicate join requests for the same community"
      enforced_at: "api_validation"
      severity: "hard"
    - rule: "Only community admins and moderators can approve or reject join requests"
      enforced_at: "domain_layer"
      severity: "hard"

  responsibilities:
    - "Display community profiles with member counts, descriptions, and images"
    - "Enable users to discover and browse communities"
    - "Manage community membership (join, leave, view members)"
    - "Handle community join requests (create, cancel, approve, reject)"
    - "Display community events and activities"
    - "Show user's membership requests and invitations"
    - "Display community member lists with roles"
    - "Provide user profile information within community context"
    - "Integrate Web3 wallet connection for authenticated actions"
    - "Use signed fetch for authenticated API requests with user identity"

  out_of_scope:
    - "Storing community data (handled by social-service-ea)"
    - "Managing community permissions and access control logic (handled by social-service-ea)"
    - "Processing join request approvals (handled by social-service-ea)"
    - "Hosting community events (only displays them)"
    - "Creating or managing events (handled by events service)"
    - "Storing user profiles (handled by catalyst)"
    - "Real-time chat or messaging within communities"

  owned_entities: []

api:
  openapi_url: ""

db:
  schema_url: ""

dependencies:
  services:
    - name: "social-service-ea"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Fetch and manage community data, memberships, and join requests via REST API"
      critical: true
    - name: "events"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Fetch community events and activities"
      critical: false
    - name: "catalyst"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Fetch user profile and avatar data via peer lambdas"
      critical: false
    - name: "credits-server"
      relationship: "sync"
      protocol: "HTTP"
      purpose: "Query user credit balances and credit-related information"
      critical: false

  external:
    - name: "Magic SDK"
      purpose: "Passwordless authentication and wallet creation service"
      type: "api"
    - name: "Thirdweb"
      purpose: "Web3 SDK for blockchain interactions and wallet connections"
      type: "api"
    - name: "Assets CDN"
      purpose: "Content delivery network for community images, logos, and static assets"
      type: "cdn"
    - name: "Segment"
      purpose: "Analytics tracking for user behavior and feature usage"
      type: "api"

events:
  publishes: []
  consumes: []

configuration:
  feature_flags: []

  key_env_vars:
    - name: "VITE_REACT_APP_DCL_DEFAULT_ENV"
      description: "Determines which environment configuration to use (dev, stg, prd)"
      affects: "Application environment and configuration selection"
    - name: "SOCIAL_SERVICE_URL"
      description: "URL for social-service-ea backend API"
      affects: "All community data fetching and management operations"
    - name: "EVENTS_API_URL"
      description: "URL for events service API"
      affects: "Community event data retrieval"
    - name: "CATALYST_LAMBDAS_URL"
      description: "URL for catalyst lambdas endpoint"
      affects: "User profile data queries"
    - name: "PEER_URL"
      description: "Catalyst peer URL for profile data"
      affects: "Avatar and profile information retrieval"
    - name: "CREDITS_SERVER_URL"
      description: "URL for credits server"
      affects: "User credit balance queries"
    - name: "ASSETS_CDN_URL"
      description: "URL for assets CDN"
      affects: "Community images and static asset loading"
    - name: "MAGIC_API_KEY"
      description: "Magic SDK API key for passwordless authentication"
      affects: "User authentication via Magic"
    - name: "THIRDWEB_CLIENT_ID"
      description: "Thirdweb client ID for Web3 SDK"
      affects: "Blockchain interactions and wallet connections"
    - name: "VITE_SEGMENT_DEV_API_KEY"
      description: "Segment analytics API key for development"
      affects: "Analytics tracking in development"
    - name: "VITE_SEGMENT_STG_API_KEY"
      description: "Segment analytics API key for staging"
      affects: "Analytics tracking in staging"
    - name: "VITE_SEGMENT_PRD_API_KEY"
      description: "Segment analytics API key for production"
      affects: "Analytics tracking in production"
    - name: "AUTH_URL"
      description: "Authentication service URL"
      affects: "User authentication flows"

adrs: []
