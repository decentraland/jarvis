schema_version: "1.1"

service:
  name: linker-server
  display_name: Linker Server
  description: Acts as an intermediary for deploying content to Decentraland's Catalyst network. Validates authorization for specific parcels and proxies upload requests to Catalyst with server-signed authentication.
  owner: core-engineering
  repository: https://github.com/decentraland/linker-server
  language: typescript
  layer: feature-servers
  role:
    - gateway
  data_domain: []
  ai-agent-context: https://github.com/decentraland/linker-server/blob/main/docs/ai-agent-context.md

domain:
  glossary:
    - term: Parcel Authorization
      definition: Permission granted to specific users to deploy content to Foundation-owned parcels.

    - term: Auth Chain
      definition: Chain of signed messages proving ownership of a wallet address.

  concept_relationships:
    internal:
      - from: Auth Chain
        to: Parcel Authorization
        relationship: validates
        description: Auth chain signatures are verified to ensure user is authorized to deploy to specific parcels
    cross_service:
      - local_concept: Parcel Authorization
        remote_service: catalyst
        remote_concept: Scene Deployment
        mapping_type: controls_access_to
        description: Parcel authorizations determine which users can deploy scenes to Foundation-owned parcels

  invariants:
    - rule: Users must be pre-authorized to deploy to specific parcels
      enforced_at: api_validation
      severity: hard

  responsibilities:
    - Validate parcel deployment authorization
    - Verify auth chain signatures
    - Proxy entity uploads to Catalyst
    - Sign entities with server wallet

  out_of_scope:
    - Managing parcel ownership records
    - Validating content entity schemas
    - Storing deployed content
    - User authentication beyond auth chain verification

  owned_entities: []

api:
  openapi_url: https://github.com/decentraland/linker-server/blob/main/docs/openapi.yaml

db:
  schema_url: ""

dependencies:
  services:
    - name: catalyst
      relationship: sync
      protocol: HTTP
      purpose: Proxies content deployments
      critical: true

  external:
    - name: AWS Secrets Manager
      purpose: Stores server wallet private key
      type: other
    - name: GitHub Pages
      purpose: Authorization data source
      type: other

events:
  publishes: []
  consumes: []

configuration:
  feature_flags: []
  key_env_vars:
    - name: HTTP_SERVER_PORT
      description: HTTP server port for API endpoints
      affects: Server listening port

    - name: HTTP_SERVER_HOST
      description: HTTP server host address
      affects: Server binding configuration

    - name: ENVIRONMENT
      description: Environment identifier (stg or prd)
      affects: Environment-specific configuration

    - name: AWS_REGION
      description: AWS region for Secrets Manager
      affects: Secret retrieval configuration

    - name: AWS_SECRET_ID
      description: AWS Secrets Manager secret ID for server wallet private key
      affects: Server signing key retrieval

    - name: CATALYST_DOMAIN
      description: Catalyst content server domain
      affects: Deployment target for content entities

    - name: AUTHORIZATIONS_URL
      description: URL to fetch parcel authorization data from (GitHub Pages)
      affects: Authorization data source

    - name: AUTHORIZATIONS_UPDATE_INTERVAL_MS
      description: Interval in milliseconds for refreshing authorization data
      affects: Authorization cache refresh frequency

adrs: []
