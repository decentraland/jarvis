schema_version: "1.0"

# Cross-service dependency graph
# Generated from individual service manifests

nodes:
  - name: example-service              # matches service.name in manifest
    display_name: Example Service
    layer: string                       # infrastructure | platform | application | client
    repository: https://github.com/decentraland/example-service

edges:
  - from: example-service              # caller / dependent
    to: other-service                   # callee / dependency
    relationship: string                # sync | async | event
    protocol: string                    # HTTP | WebSocket | gRPC | SNS/SQS | GraphQL | NATS
    description: string

event_flows:
  - publisher: example-service
    event_name: user.created
    channel: string                     # nats | sqs | sns | kafka | redis | webhook
    consumers:
      - notifications-workers
      - badges
